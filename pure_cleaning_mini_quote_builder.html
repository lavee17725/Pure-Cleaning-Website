<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Mini Quote Builder — Pure Cleaning</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--sky:#2d7dd2;--gold:#f4a620;--gold-d:#c47f00;--green:#1d9e75;--red:#e53e3e;--white:#fff;--bg:#fdf8f2;--text:#1a1f2e;--muted:#6b7280;--border:#e8e2d8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--navy);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:17px;font-weight:700;color:#fff;letter-spacing:.5px;}
.logo span{color:var(--gold);}
.back-link{font-size:13px;color:var(--gold);text-decoration:none;font-weight:600;}
.wrap{max-width:520px;margin:0 auto;padding:1.5rem 1.25rem 6rem;}

/* Customer header card */
.cust-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:1rem 1.25rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(26,31,46,.05);}
.cust-name{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.cust-meta{font-size:13px;color:var(--muted);}

/* Main job card */
.job-card{background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1.75rem;}
.job-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--green);margin-bottom:.5rem;display:flex;align-items:center;gap:5px;}
.job-services{font-size:15px;font-weight:500;color:var(--text);margin-bottom:.375rem;}
.job-price{font-size:26px;font-weight:700;color:var(--navy);letter-spacing:-.5px;}
.job-meta{font-size:12px;color:var(--muted);margin-top:.25rem;}

/* Section headers */
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:1.75rem 0 .875rem;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* Add-on row */
.addon-row{background:var(--white);border:1.5px solid var(--border);border-radius:13px;margin-bottom:.75rem;overflow:hidden;transition:border-color .15s;}
.addon-row.enabled{border-color:var(--sky);}
.addon-toggle-hdr{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.addon-check{flex-shrink:0;width:20px;height:20px;border:2px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--white);}
.addon-row.enabled .addon-check{background:var(--sky);border-color:var(--sky);}
.addon-check-icon{font-size:12px;color:#fff;display:none;}
.addon-row.enabled .addon-check-icon{display:block;}
.addon-label{font-size:15px;font-weight:600;color:var(--text);}
.addon-icon{font-size:17px;flex-shrink:0;}
.addon-body{display:none;padding:0 15px 14px;}
.addon-row.enabled .addon-body{display:block;}
.price-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.625rem;}
.price-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:5px;}
.price-input-wrap{position:relative;}
.price-input-wrap::before{content:'$';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--muted);pointer-events:none;}
.price-input{width:100%;padding:10px 10px 10px 24px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color .15s;}
.price-input:focus{border-color:var(--sky);}
.note-input{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;resize:none;min-height:64px;transition:border-color .15s;}
.note-input:focus{border-color:var(--sky);}
.reset-link{font-size:11px;color:var(--sky);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:4px 0;text-decoration:underline;margin-top:2px;display:inline-block;}

/* Custom add-on */
.custom-addon-row{background:var(--white);border:1.5px solid var(--sky);border-radius:13px;padding:14px 15px;margin-bottom:.75rem;}
.custom-row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.custom-row-title{font-size:14px;font-weight:600;color:var(--navy);}
.custom-remove{background:none;border:none;color:#d1d5db;font-size:18px;cursor:pointer;padding:0;line-height:1;transition:color .15s;}
.custom-remove:hover{color:var(--red);}
.name-input{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;margin-bottom:.625rem;transition:border-color .15s;}
.name-input:focus{border-color:var(--sky);}
.add-custom-btn{display:flex;align-items:center;gap:7px;background:none;border:1.5px dashed var(--border);border-radius:11px;padding:11px 16px;width:100%;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--sky);cursor:pointer;transition:all .15s;margin-top:.25rem;}
.add-custom-btn:hover{background:#f0f6ff;border-color:var(--sky);}

/* Section cards */
.sec-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:1.25rem;}
.sec-card-hdr{padding:13px 15px 10px;border-bottom:1px solid var(--border);}
.sec-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--navy);margin-bottom:3px;}
.sec-card-sub{font-size:12px;color:var(--muted);line-height:1.5;}
.sec-card.bundle .sec-card-hdr{background:#f8faff;}
.sec-card.bundle .sec-card-title{color:#1d4ed8;}
.sec-card.protect .sec-card-hdr{background:#faf5ff;}
.sec-card.protect .sec-card-title{color:#7e22ce;}
.sec-card.fix .sec-card-hdr{background:#fff7ed;}
.sec-card.fix .sec-card-title{color:#c2410c;}
.sec-card .addon-row{border-radius:0;border:none;border-bottom:1px solid var(--border);margin-bottom:0;}
.sec-card .addon-row:last-child{border-bottom:none;}
.sec-card .addon-row.enabled{background:#f0f6ff;}
.addon-bundle-note{font-size:11px;color:var(--muted);padding:0 15px 8px 47px;font-style:italic;}
/* Sealing interest checkboxes */
.sealing-interests{padding:2px 0;}
.sealing-opt{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;cursor:pointer;border-bottom:1px solid var(--border);-webkit-tap-highlight-color:transparent;transition:background .1s;}
.sealing-opt:last-child{border-bottom:none;}
.sealing-opt:hover{background:#faf5ff;}
.sealing-opt.enabled{background:#faf5ff;}
.si-check{flex-shrink:0;width:20px;height:20px;border:2px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--white);margin-top:1px;}
.sealing-opt.enabled .si-check{background:#a855f7;border-color:#a855f7;}
.si-check-icon{font-size:12px;color:#fff;display:none;}
.sealing-opt.enabled .si-check-icon{display:block;}
.si-text{flex:1;}
.si-label{font-size:15px;font-weight:600;color:var(--text);}
.si-sub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}

/* Custom note */
.note-field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;}
.big-note{width:100%;padding:13px 14px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;resize:vertical;min-height:100px;transition:border-color .15s;}
.big-note:focus{border-color:var(--sky);}
.char-count{font-size:11px;color:var(--muted);text-align:right;margin-top:3px;}

/* Action buttons */
.actions{display:flex;flex-direction:column;gap:10px;margin-top:2rem;}
.btn{min-height:52px;padding:13px 20px;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;width:100%;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold-d);}
.btn-gold:disabled{background:#e8e2d8;color:#b0a99a;cursor:not-allowed;}
.btn-outline{background:none;border:2px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--sky);color:var(--sky);}

/* Loading / error */
.center-msg{text-align:center;padding:4rem 1rem;}
.center-msg .icon{font-size:48px;margin-bottom:1rem;}
.center-msg h2{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:.5rem;}
.center-msg p{font-size:14px;color:var(--muted);}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.3);transition:transform .3s ease;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Date suggestion cards */
.date-card{background:var(--white);border:1.5px solid var(--border);border-radius:13px;margin-bottom:.75rem;padding:13px 15px;transition:opacity .15s;}
.date-card.excluded{opacity:.38;}
.date-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.date-chip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 8px;border-radius:20px;}
.date-chip.best{background:#dcfce7;color:#166534;}
.date-chip.alt{background:#eff6ff;color:#1d4ed8;}
.date-toggle-btn{font-size:11px;font-weight:600;color:var(--muted);background:none;border:1.5px solid var(--border);border-radius:8px;padding:3px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.date-toggle-btn.on{color:var(--green);border-color:#86efac;background:#f0fdf4;}
.date-display{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:3px;}
.date-reason{font-size:12px;color:var(--muted);margin-bottom:8px;}
.date-replace-btn{font-size:12px;color:var(--sky);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;text-decoration:underline;}
.date-custom-input-wrap{display:none;margin-top:8px;}
.date-custom-input-wrap.open{display:block;}
.date-custom-input{width:100%;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .15s;}
.date-custom-input:focus{border-color:var(--sky);}
.add-date-btn{display:flex;align-items:center;gap:7px;background:none;border:1.5px dashed var(--border);border-radius:11px;padding:11px 16px;width:100%;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--sky);cursor:pointer;transition:all .15s;margin-top:.25rem;}
.add-date-btn:hover{background:#f0f6ff;border-color:var(--sky);}
.addon-savings{font-size:13px;font-weight:700;color:var(--green);margin:.375rem 0 .5rem;}
/* Offering toggles */
.offer-toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 15px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s;}
.offer-toggle-row:hover{background:var(--bg);}
.offer-label{font-size:14px;font-weight:600;color:var(--text);}
.offer-sub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
.toggle-switch{position:relative;width:44px;height:24px;background:#d1d5db;border-radius:12px;transition:background .2s;flex-shrink:0;}
.toggle-switch.on{background:var(--green);}
.toggle-knob{position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle-switch.on .toggle-knob{transform:translateX(20px);}
</style>
</head>
<body>
<div class="header">
  <a id="backLink" href="/pure_cleaning_calendar.html" class="back-link">← Back</a>
  <div class="logo">🌴 Pure <span>Cleaning</span></div>
  <div style="width:60px;"></div>
</div>

<div class="wrap" id="mainWrap">
  <div class="center-msg"><div class="icon">⏳</div><h2>Loading…</h2></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PCPC_API = 'https://purecleaning-api.tylerfumero.workers.dev';

const STANDARD_ADDONS = [
  {id:'roof_cleaning', name:'Roof Cleaning',              icon:'🏠'},
  {id:'rinse_walls',   name:'Rinse Walls & Windows',      icon:'🪟'},
  {id:'driveway',      name:'Driveway Cleaning',          icon:'🛣️'},
  {id:'patio',         name:'Patio Cleaning',             icon:'🪨'},
  {id:'pool_deck',     name:'Pool Deck Cleaning',         icon:'🏊'},
  {id:'walkways',      name:'Walkways / Sidewalks',       icon:'🚶'},
  {id:'paver_sand',    name:'Paver Joint Sand',           icon:'🧱'},
  {id:'rust',          name:'Rust Removal',               icon:'🔧'},
  {id:'awnings',       name:'Awning Cleaning',            icon:'🪟'},
];

// Section 3 always-visible add-ons
const PROBLEM_FIX_IDS  = []; // awnings removed — rarely performed; use Add Custom Service instead

const ROOF_METHOD_LABELS = {
  softwash:'Softwash',
  power_wash_chemical:'Power wash + chemical',
  power_wash_no_chemical:'Power wash, no chemical'
};

const ROOF_TYPE_LABELS = {
  shingle:'Shingle', large_barrel:'Large Barrel tile', short_barrel:'Short Barrel tile',
  barrel_tile:'Barrel tile', flat_tile:'Flat tile', v_shape:'V-shape tile',
  venezuelan_tile:'Venezuelan tile', metal:'Metal', other:'Other'
};

// Returns which add-ons to offer in Section 1 based on what's already in the main job
function getBundleSaveItems() {
  const booked = getBookedServiceIds();
  const hasRoof     = booked.has('roof_cleaning');
  const hasDriveway = booked.has('driveway');
  const hasPatio    = booked.has('patio');
  if (hasRoof && hasDriveway && hasPatio) return []; // all three booked — hide section
  const items = [];
  if (!hasRoof)     items.push('roof_cleaning');
  if (!hasDriveway) items.push('driveway');
  if (!hasPatio)    items.push('patio');
  // Walls: only when roof NOT in main job (roof auto-bundles walls)
  if (!hasRoof && !booked.has('rinse_walls')) items.push('rinse_walls');
  return items;
}

// Suggested starting prices Mom can adjust; worker addons-config overrides when fetched
const ADDON_DEFAULTS = {
  roof_cleaning: {bundle: 250, standalone: 400},
  driveway:      {bundle: 150, standalone: 225},
  patio:         {bundle: 125, standalone: 200},
  pool_deck:     {bundle: 175, standalone: 250},
  walkways:      {bundle: 75,  standalone: 125},
  paver_sand:    {bundle: 125, standalone: 200},
  rust:          {bundle: 100, standalone: 175},
  awnings:       {bundle: 50,  standalone: 100},
};

// Always show these regardless of what's booked (can't see the property)
const ALWAYS_SHOW_ADDONS = new Set(['paver_sand', 'rust']);

function getBookedServiceIds() {
  const qs = customer?.quoteStatus || {};
  // Prefer structured array from new service picker
  if (qs.servicesAgreed?.structured?.length) {
    return new Set(qs.servicesAgreed.structured);
  }
  // Fallback: parse mainServices text for known keywords
  const text = (qs.mainServices || qs.notes || '').toLowerCase();
  const booked = new Set();
  if (/roof/.test(text))                      booked.add('roof_cleaning');
  if (/driveway/.test(text))                  booked.add('driveway');
  if (/patio/.test(text))                     booked.add('patio');
  if (/pool/.test(text))                      booked.add('pool_deck');
  if (/walkway|sidewalk/.test(text))          booked.add('walkway');
  if (/entranceway|entrance/.test(text))      booked.add('entranceway');
  if (/rinse walls|rinse_walls/.test(text))   booked.add('rinse_walls');
  return booked;
}

function getRelevantAddons() {
  const booked = getBookedServiceIds();
  return STANDARD_ADDONS.filter(a => {
    if (ALWAYS_SHOW_ADDONS.has(a.id)) return true;          // always suggest
    if (booked.has(a.id)) return false;                     // already booked
    if (a.id === 'walkways' && booked.has('driveway')) return false;  // auto-bundled with driveway
    if (a.id === 'walkways' && booked.has('walkway'))  return false;  // same service, different id
    return true;
  });
}

let customer         = null;
let defaults         = {};
let sealingOffered   = true;  // default ON — show sealing offer on agreement page
let rustOffered      = true;  // default ON — show rust offer on agreement page
let _addonRoofMethod = null;  // roof method when roof offered as add-on
let customRows       = [];
let customIdCounter  = 0;
let _dateSuggestions = []; // [{date,display,dayName,rig,rigLabel,reason,label,enabled,custom}]

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const rawPhone = new URLSearchParams(window.location.search).get('phone');
  if (!rawPhone) { showError('No customer phone specified.'); return; }
  const phone = rawPhone.replace(/\D/g, '').slice(-10); // normalize to digits

  try {
    const [dbRes, addonsRes] = await Promise.all([
      fetch(`${PCPC_API}/customers`),
      fetch(`${PCPC_API}/addons-config`)
    ]);
    const db = await dbRes.json();
    // Normalize both sides. When duplicates exist (CSV record + new phone-quote record),
    // prefer the one with an active phone-quote state.
    const matches = (db.customers || []).filter(c => (c.phone||'').replace(/\D/g,'').slice(-10) === phone);
    if (!matches.length) { showError('Customer not found for phone: ' + phone); return; }
    customer = matches.find(c => c.quoteStatus?.state === 'phone_quoted_pending_mini_quote')
            || matches.find(c => c.quoteStatus?.mainServices || c.quoteStatus?.servicesAgreed)
            || matches[matches.length - 1]; // last-inserted as final fallback

    // Set back link → new_customer pre-loaded for this phone
    const backEl = document.getElementById('backLink');
    if (backEl && customer.phone) {
      backEl.href = `/pure_cleaning_new_customer.html?phone=${encodeURIComponent(customer.phone)}&from=builder`;
      backEl.textContent = '← Back to Customer Info';
    }
    _addonRoofMethod = customer.quoteStatus?.miniQuoteCustomData?.addonRoofMethod || null;

    const addonsData = addonsRes.ok ? await addonsRes.json() : { addons: [] };
    (addonsData.addons || []).forEach(a => { defaults[a.id] = { bundle: a.bundle, standalone: a.standalone }; });

    // Pre-populate if mini quote was already partially built
    const existing = customer.quoteStatus && customer.quoteStatus.miniQuoteCustomData;
    renderBuilder(existing);
    loadDateSuggestions(existing);
  } catch(e) {
    showError('Failed to load: ' + e.message);
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderBuilder(existing) {
  const qs = customer.quoteStatus || {};
  const fn = customer.firstName || '';
  const ln = customer.lastName || '';
  const city = customer.city || '';
  const phone = fmtPh(customer.phone || '');
  const svcAgreed = qs.servicesAgreed || {};
  const services = svcAgreed.fullDescription || qs.mainServices || qs.notes || '';
  const amount   = qs.mainAmount   || qs.approvedAmount || '';
  const hours    = qs.estimatedHours || null;

  // Pre-fill offering toggles from existing data
  if (existing) {
    if (existing.sealingOffered !== undefined) sealingOffered = existing.sealingOffered;
    if (existing.rustOffered    !== undefined) rustOffered    = existing.rustOffered;
    // backward compat: legacy sealingInterest schema
    if (existing.sealingOffered === undefined) {
      const si = existing.sealingInterest;
      if (si === 'sealing_only' || si === 'sealing_plus_sand' || existing.sealingEnabled) sealingOffered = true;
    }
    if (existing.addonRoofMethod) _addonRoofMethod = existing.addonRoofMethod;
  }

  const existingAddons = existing ? existing.addOns || [] : [];
  const existingCustom = existing ? existing.customAddOns || [] : [];
  const existingNote   = existing ? (existing.customNote || '') : '';

  // Roof info for display in main job card
  const _roofType   = svcAgreed.roofType;
  const _roofSqFt   = svcAgreed.roofSqFt;
  const _roofMeth   = svcAgreed.roofMethod;
  let roofJobInfoHtml = '';
  if (_roofType || (_roofSqFt) || (services && /roof/i.test(services))) {
    const rtLabel  = ROOF_TYPE_LABELS[_roofType] || _roofType || 'type not recorded';
    const sqftStr  = _roofSqFt ? `${Number(_roofSqFt).toLocaleString()} sq ft` : 'sq ft not recorded';
    const methStr  = ROOF_METHOD_LABELS[_roofMeth] || '';
    roofJobInfoHtml = `<div style="font-size:12px;color:#15803d;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:6px 10px;margin-top:5px;">🏠 Roof: <strong>${esc(rtLabel)}</strong> · ${esc(sqftStr)}${methStr ? ` · ${esc(methStr)}` : ''}</div>`;
  }

  const relevantAddons = getRelevantAddons();
  const bookedCount = STANDARD_ADDONS.length - relevantAddons.length;
  const filterNote = bookedCount > 0
    ? `<div style="font-size:11px;color:var(--muted);font-style:italic;padding:6px 12px 0;">Showing suggestions · ${bookedCount} already-booked service${bookedCount>1?'s':''} hidden</div>`
    : '';
  const addonsHtml = filterNote + relevantAddons.map(a => {
    const prev   = existingAddons.find(x => x.id === a.id);
    const adDef  = defaults[a.id] || ADDON_DEFAULTS[a.id] || {};
    const enabled = prev ? prev.enabled : false;
    const bundle  = prev ? prev.bundle     : (adDef.bundle     || '');
    const regular = prev ? prev.standalone : (adDef.standalone || '');
    const note    = prev ? (prev.note || '') : '';
    return addonRowHtml(a.id, a.name, a.icon, enabled, bundle, regular, note);
  }).join('');

  // Custom add-on rows from existing data
  existingCustom.filter(a => a.enabled !== false).forEach(a => {
    customIdCounter++;

function populateAddonSections() {
  const existingAddons = (customer.quoteStatus?.miniQuoteCustomData?.addOns) || [];

  function entryHtml(id) {
    const a = STANDARD_ADDONS.find(x => x.id === id);
    if (!a) return '';
    const prev    = existingAddons.find(x => x.id === id);
    const adDef   = defaults[id] || ADDON_DEFAULTS[id] || {};
    const enabled = prev ? prev.enabled : false;
    const bundle  = prev ? prev.bundle     : (adDef.bundle  || '');
    const regular = prev ? prev.standalone : (adDef.standalone || '');
    const note    = prev ? (prev.note || '') : '';

    let extra = '';
    if (id === 'roof_cleaning') {
      extra = `<div style="margin-top:8px;">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:5px;">Cleaning method</div>

      extra = `<div style="font-size:12px;color:var(--muted);margin-top:6px;font-style:italic;">📦 Includes Entranceway + Walkway/Sidewalk</div>`;

      extra = `<div style="font-size:12px;color:var(--muted);margin-top:6px;font-style:italic;">Quick add since we'll already be on-site</div>`;
    }
    return addonRowHtml(id, a.name, a.icon, enabled, bundle, regular, note, extra);
  }

  // Section 1 — conditional bundle items
  const bundleIds     = getBundleSaveItems();

async function loadDateSuggestions(existing) {
  const section = document.getElementById('dateSuggestSection');
  if (!section) return;

  const saved = existing && existing.dateSuggestions;
  const city  = customer.city || '';
  try {
    const res  = await fetch(`${PCPC_API}/dates/suggest?city=${encodeURIComponent(city)}`);
    const data = await res.json();
    const fresh = (data.suggestions || []).slice(0, 3).map(s => ({...s, enabled: true, custom: false}));

    if (saved && saved.length) {
      const today = new Date().toISOString().slice(0, 10);
      _dateSuggestions = saved.filter(s => !s.date || s.date > today).map(s => ({...s, enabled: s.enabled !== false}));
      if (!_dateSuggestions.length) _dateSuggestions = fresh;
    } else {
      _dateSuggestions = fresh;
    }
  } catch (e) {
    _dateSuggestions = (saved && saved.length) ? saved.map(s => ({...s, enabled: s.enabled !== false})) : [];
  }
  renderDateSuggestions();
}

function renderDateSuggestions() {
  const section = document.getElementById('dateSuggestSection');
  if (!section) return;
  section.innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:.875rem;">Based on your calendar. Toggle off to hide from customer, or replace with a custom date.</div>
    <div id="dateCardsList"></div>
    <div id="addDateBtnWrap"><button class="add-date-btn" id="addDateBtn" onclick="addCustomDateRow()">+ Add a 4th date option</button></div>
  `;
  renderDateCards();
}

function renderDateCards() {
  const list = document.getElementById('dateCardsList');
  if (!list) return;
  list.innerHTML = _dateSuggestions.map((s, i) => {
    const chipClass = s.label === 'Best fit' ? 'best' : 'alt';
    const isOn = s.enabled !== false;
    return `<div class="date-card${isOn ? '' : ' excluded'}" id="date-card-${i}">
      <div class="date-card-hdr">
        <span class="date-chip ${chipClass}">${esc(s.label || 'Alternative')}</span>
        <button class="date-toggle-btn${isOn ? ' on' : ''}" onclick="toggleDateCard(${i})">${isOn ? 'Include ✓' : 'Excluded'}</button>
      </div>
      <div class="date-display">${esc(s.display || s.date)}</div>
      ${s.reason ? `<div class="date-reason">📍 ${esc(s.reason)}</div>` : ''}
      <button class="date-replace-btn" onclick="openDateReplace(${i})">${s.custom ? '✏️ Change date' : 'Replace with custom date'}</button>
      <div class="date-custom-input-wrap${s._replaceOpen ? ' open' : ''}" id="date-custom-wrap-${i}">
        <input type="date" class="date-custom-input" id="date-custom-input-${i}"
          value="${s.custom ? s.date : ''}"
          min="${new Date(Date.now() + 86400000).toISOString().slice(0, 10)}"
          onchange="onCustomDateChange(${i}, this.value)">
      </div>
    </div>`;
  }).join('');
  const addBtn = document.getElementById('addDateBtn');
  if (addBtn) addBtn.style.display = _dateSuggestions.length >= 4 ? 'none' : '';
}

function toggleDateCard(i) {
  if (!_dateSuggestions[i]) return;
  _dateSuggestions[i].enabled = !(_dateSuggestions[i].enabled !== false);
  renderDateCards();
}

function openDateReplace(i) {
  if (!_dateSuggestions[i]) return;
  _dateSuggestions[i]._replaceOpen = !_dateSuggestions[i]._replaceOpen;
  renderDateCards();
  if (_dateSuggestions[i]._replaceOpen) {
    const inp = document.getElementById(`date-custom-input-${i}`);
    if (inp) inp.focus();
  }
}

function onCustomDateChange(i, val) {
  if (!val || !_dateSuggestions[i]) return;
  const d = new Date(val + 'T12:00:00');
  const DN = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  _dateSuggestions[i].date    = val;
  _dateSuggestions[i].display = `${DN[d.getDay()]}, ${MN[d.getMonth()]} ${d.getDate()}`;
  _dateSuggestions[i].custom  = true;
  _dateSuggestions[i].reason  = 'Custom date';
  _dateSuggestions[i]._replaceOpen = false;
  renderDateCards();
}

function addCustomDateRow() {
  if (_dateSuggestions.length >= 4) { showToast('Maximum 4 date options'); return; }
  _dateSuggestions.push({date:'', display:'Pick a date below', label:'Alternative', reason:'Custom date', rig:'', rigLabel:'', enabled:true, custom:true, _replaceOpen:true});
  renderDateCards();
  const inp = document.getElementById(`date-custom-input-${_dateSuggestions.length - 1}`);
  if (inp) inp.focus();
}

function collectAddons() {
  return STANDARD_ADDONS.map(a => {
    const row    = document.getElementById('addon-' + a.id);
    const enabled = row ? row.classList.contains('enabled') : false;
    const bundle  = parseFloat(document.getElementById('bundle-'  + a.id)?.value) || 0;
    const regular = parseFloat(document.getElementById('regular-' + a.id)?.value) || 0;
    const note    = (document.getElementById('note-' + a.id)?.value || '').trim();
    const savings = Math.max(0, Math.round(regular - bundle));
    return { id: a.id, name: a.name, icon: a.icon, bundle, standalone: regular, savings, note, enabled };
  });
}

function collectCustomAddons() {
  return customRows.map(r => {
    const name     = (document.getElementById('cname-' + r.id)?.value    || '').trim();
    const bundle   = parseFloat(document.getElementById('cbundle-' + r.id)?.value)   || 0;
    const regular  = parseFloat(document.getElementById('cregular-' + r.id)?.value) || 0;
    const note     = (document.getElementById('cnote-' + r.id)?.value    || '').trim();
    return { id: r.id, name, bundle, standalone: regular, note, enabled: true };
  }).filter(r => r.name);
}

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = '';
  for (let i = 0; i < 8; i++) c += chars[Math.floor(Math.random() * 32)];
  return c;
}

function shortenUrl(longUrl) {
  const code = genCode();
  const short = 'https://purecleaningpressurecleaning.com/q.html?id=' + code;
  (async () => {
    try {
      const r = await fetch(`${PCPC_API}/links`);
      const data = await r.json();
      const links = data.links || {};
      links[code] = longUrl;
      await fetch(`${PCPC_API}/links`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ links }) });
    } catch(e) { console.warn('[shortenUrl]', e.message); }
  })();
  return short;
}

    }));

  try {
    // Load DB to patch customer
    const dbRes = await fetch(`${PCPC_API}/customers`);
    const db    = await dbRes.json();
    const _nph  = (p) => (p||'').replace(/\D/g,'').slice(-10);
    const cust  = (db.customers || []).find(c => _nph(c.phone) === _nph(customer.phone));
    if (!cust) throw new Error('Customer not found in DB');

    const miniQuoteCustomData = {
      addOns,
      customAddOns,
      sealingOffered,
      rustOffered,
      sealingInterest: sealingOffered ? 'sealing_only' : 'none', // backward compat for profile
      addonRoofMethod: _addonRoofMethod || null,
      customNote,
      dateSuggestions,
      builtAt: now,
      sentAt: sendText ? now : null,
    };

    if (sendText) {
      // Generate quote code and save quote to KV
      const mqCode = genCode();
      miniQuoteCustomData.miniQuoteCode = mqCode;
      const quotePayload = {
        fn: customer.firstName,
        ln: customer.lastName,
        ph: customer.phone,
        address: customer.address || '',
        city: customer.city || '',
        services: mainServices,
        mainServices,
        mainAmount,
        approvedAmount: mainAmount,
        addOns: [],
        sealingInterest: false,
        dateSuggestions,
        source: 'mini_quote_builder',
        created: now,
        miniQuoteCustomData,
      };
      await fetch(`${PCPC_API}/quote/${mqCode}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(quotePayload)
      });

      cust.miniQuoteCode = mqCode;
      cust.quoteStatus = {
        ...cust.quoteStatus,
        state: 'phone_quoted_mini_quote_sent',
        miniQuoteCustomData,
        sentAt: now,
        ...(mqRoofSqFt ? { servicesAgreed: { ...(cust.quoteStatus?.servicesAgreed||{}), roofSqFt: mqRoofSqFt, squareFootage: { ...(cust.quoteStatus?.servicesAgreed?.squareFootage||{}), roof: mqRoofSqFt } } } : {}),
      };
      // Move to Needs Scheduling
      cust.scheduledStatus = {
        state: 'needs_scheduling',
        approvedAmount: mainAmount,
        estimatedDuration: qs.estimatedHours || 2,
        jobNotes: mainServices,
      };
      cust.sealingInterest = sealingOffered ? 'sealing_only' : 'none';

      await fetch(`${PCPC_API}/customers`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(db) });
      try { localStorage.setItem('pcpc_db_write_ts', Date.now().toString()); } catch {}

      // Log event
      fetch(`${PCPC_API}/events`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          eventType: 'phone_quote_sms_sent',
          customer: { fn: customer.firstName, ln: customer.lastName, ph: customer.phone },
          mainAmount,
          mainServices,
          miniQuoteCode: mqCode,
          sentAt: now,
        })
      }).catch(() => {});

      // Build short URL and open iMessage
      const mqLong  = `https://purecleaningpressurecleaning.com/pure_cleaning_agreement.html?id=${mqCode}`;
      const mqShort = shortenUrl(mqLong);

      // Short pause so shortenUrl fires before iMessage opens
      await new Promise(r => setTimeout(r, 300));

      const firstName = customer.firstName || 'there';
      const smsBody = `Hi ${firstName}! Confirming your job with Pure Cleaning Pressure Cleaning:\n\n📋 Service: ${mainServices}\n💰 Price: $${mainAmount}\n\nWant to add anything? Take a look at some options I put together for you:\n${mqShort}\n\nWe'll text or call the night before with a rough arrival time. Questions? Just give us a call at 954-389-2642.\n\n— Pure Cleaning Pressure Cleaning\nReply STOP to opt out.`;
      window.location.href = `sms:+1${customer.phone}?&body=${encodeURIComponent(smsBody)}`;

    } else {
      // Just save the mini quote data, keep pending state
      cust.quoteStatus = {
        ...cust.quoteStatus,
        miniQuoteCustomData,
        ...(mqRoofSqFt ? { servicesAgreed: { ...(cust.quoteStatus?.servicesAgreed||{}), roofSqFt: mqRoofSqFt, squareFootage: { ...(cust.quoteStatus?.servicesAgreed?.squareFootage||{}), roof: mqRoofSqFt } } } : {}),
      };
      await fetch(`${PCPC_API}/customers`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(db) });
      try { localStorage.setItem('pcpc_db_write_ts', Date.now().toString()); } catch {}
      showToast('✓ Mini quote saved');
      if (btn) { btn.disabled = false; btn.textContent = '💬 Confirm Payment & Upsell'; }
    }
  } catch(e) {
    alert('Error saving: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '💬 Save & Send Confirmation Text'; }
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('mainWrap').innerHTML = `<div class="center-msg"><div class="icon">⚠️</div><h2>Error</h2><p>${esc(msg)}</p><br><a href="/pure_cleaning_calendar.html" style="color:var(--sky);font-weight:600;">← Back to Calendar</a></div>`;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function fmtPh(p) { return (!p || p.length !== 10) ? p || '—' : `(${p.slice(0,3)}) ${p.slice(3,6)}-${p.slice(6)}`; }
function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
