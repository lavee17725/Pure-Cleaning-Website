<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Calendar & Crew — Pure Cleaning</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--navy2:#111f38;--sky:#2d7dd2;--gold:#f4a620;--green:#1d9e75;--red:#e53e3e;--white:#fff;--bg:#f4f6f9;--card:#fff;--text:#1a1f2e;--muted:#6b7280;--border:#e2e8f0;--shadow:0 2px 8px rgba(0,0,0,.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── NAV BAR ── */
.topbar{background:var(--navy);padding:.75rem 1.25rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:200;}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;letter-spacing:1px;margin-right:6px;}
.topbar-logo span{color:var(--gold);}
.back-link{font-size:12px;color:var(--gold);text-decoration:none;font-weight:600;margin-right:10px;}
.week-nav{display:flex;align-items:center;gap:6px;}
.nav-btn{background:rgba(255,255,255,.12);border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;}
.nav-btn:hover{background:rgba(255,255,255,.22);}
.block-week-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:#94a3b8;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.block-week-btn:hover{background:rgba(255,255,255,.14);color:#e2e8f0;}
.block-week-btn.is-blocked{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.block-week-btn.is-blocked:hover{background:#e09610;}
.week-label{font-size:14px;font-weight:600;color:#fff;min-width:210px;text-align:center;}
.topbar-sep{flex:1;}
.topbar-action{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.topbar-action:hover{background:rgba(255,255,255,.2);}

/* ── THREE-COLUMN LAYOUT ── */
.layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 54px);overflow:hidden;transition:grid-template-columns .2s;}
.layout.crew-visible{grid-template-columns:280px 1fr 250px;}
.left-col{background:var(--card);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.main-col{overflow:auto;background:var(--bg);}
.right-col{background:var(--card);border-left:1px solid var(--border);overflow-y:auto;display:none;}
.layout.crew-visible .right-col{display:block;}

/* ── LEFT SIDEBAR ── */
.sidebar-hdr{padding:.875rem 1rem .625rem;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:var(--card);position:sticky;top:0;z-index:10;}
.needs-list{padding:.75rem;flex:1;}
.empty-sidebar{text-align:center;padding:2rem 1rem;color:var(--muted);}
.empty-sidebar div{font-size:28px;margin-bottom:.5rem;}

/* ── UNSCHEDULED JOB CARD ── */
.job-unscheduled{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;cursor:grab;transition:box-shadow .15s,border-color .15s;user-select:none;}
.job-unscheduled:hover{border-color:var(--sky);box-shadow:0 4px 12px rgba(45,125,210,.15);}
.job-unscheduled:active{cursor:grabbing;}
@keyframes scheduleHighlight {
  0%,100% { box-shadow:0 0 0 2px transparent; border-color:var(--border); }
  50%      { box-shadow:0 0 0 3px var(--gold); border-color:var(--gold); }
}
.pulse-highlight { animation:scheduleHighlight 0.8s ease-in-out 3; }
.jn{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.jd{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:2px;}
/* Sidebar card vertical layout */
.jcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px;}
.jcard-name{font-size:14px;font-weight:700;color:var(--navy);flex:1;min-width:0;word-break:break-word;}
.jcard-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
.jcard-price{margin-bottom:5px;}
.drag-hint{font-size:10px;color:#b0bac8;margin-top:4px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.card-sms-btn{font-size:10px;color:var(--sky);cursor:pointer;padding:3px 0 0;font-weight:600;letter-spacing:.2px;display:block;-webkit-tap-highlight-color:transparent;}
.card-sms-btn:hover{text-decoration:underline;}
.card-del-btn{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:16px;line-height:1;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;transition:color .15s,background .15s;padding:0;}
.card-del-btn:hover{color:#dc2626;background:#fee2e2;}
.test-badge{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:10px;letter-spacing:.3px;vertical-align:middle;flex-shrink:0;}
.phone-badge{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;background:#dbeafe;color:#1e40af;padding:1px 6px;border-radius:10px;letter-spacing:.3px;vertical-align:middle;flex-shrink:0;}
.seal-badge{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;background:#f3e8ff;color:#7e22ce;padding:1px 6px;border-radius:10px;letter-spacing:.3px;vertical-align:middle;flex-shrink:0;}
.updated-badge{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;background:#ecfdf5;color:#065f46;padding:1px 6px;border-radius:10px;letter-spacing:.3px;vertical-align:middle;flex-shrink:0;}
/* Alert toasts — bottom-right, persistent */
#alertContainer{position:fixed;bottom:1.5rem;right:1.25rem;z-index:9998;display:flex;flex-direction:column;gap:10px;max-width:340px;}
@keyframes alertIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.alert-toast{background:#0d1e35;border:1px solid rgba(244,166,32,.3);border-radius:13px;padding:.875rem 1rem;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:alertIn .3s ease;color:#e8edf5;}
.alert-toast-type{font-size:10px;font-weight:700;letter-spacing:1px;color:#f4a620;margin-bottom:.3rem;}
.alert-toast-body{font-size:13px;line-height:1.5;margin-bottom:.625rem;}
.alert-toast-actions{display:flex;gap:8px;}
.alert-view-btn{flex:1;padding:6px;background:rgba(244,166,32,.15);color:#f4a620;border:1px solid rgba(244,166,32,.25);border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.alert-dismiss-btn{flex:1;padding:6px;background:none;color:#7a8aaa;border:1px solid #1e2e4a;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.test-expiry{font-size:10px;color:#b45309;margin-top:2px;}
.card-top-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}

/* ── CALENDAR GRID ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(175px,1fr));min-width:1225px;gap:0;}
.day-col{border-right:1px solid var(--border);}
.day-col:last-child{border-right:none;}
.day-hdr{padding:8px 10px 6px;background:var(--navy2);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:sticky;top:0;z-index:5;}
.day-hdr:hover{background:#162440;}
.day-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gold);}
.day-date{font-size:16px;font-weight:700;color:#fff;line-height:1.2;}
.day-date.today{color:var(--gold);}
.day-labor{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}
.day-labor.has-cost{color:#86efac;}
/* Today column highlight */
.day-col.today-col{background:rgba(244,166,32,.03);}
.day-col.today-col .day-hdr{background:#1b2e46;}

/* ── RIG LANES ── */
.rig-section{border-bottom:1px solid var(--border);}
.rig-section:last-child{border-bottom:none;}
.rig-hdr{display:flex;align-items:center;gap:6px;padding:5px 8px 5px 10px;background:#f8f9fb;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;font-size:12px;font-weight:600;color:var(--navy);}
.rig-hdr:hover{background:#eff3f9;}
.rig-icon{font-size:14px;}
.rig-name{flex:1;}
.rig-crew-label{font-size:11px;color:var(--sky);font-weight:600;}
.rig-jobs{min-height:160px;padding:8px;background:transparent;}
.rig-jobs.empty-hint{background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(0,0,0,.015) 8px,rgba(0,0,0,.015) 16px);}

/* ── SCHEDULED JOB CARD ── */
.job-scheduled{background:var(--white);border:1.5px solid #dbeafe;border-left:4px solid var(--sky);border-radius:10px;padding:7px 9px;margin-bottom:5px;cursor:pointer;transition:box-shadow .15s;user-select:none;font-size:12px;}
.job-scheduled:hover{box-shadow:0 3px 10px rgba(45,125,210,.18);}
.job-scheduled.in_progress{border-left-color:var(--gold);border-color:#fef3c7;}
.job-scheduled.completed{border-left-color:var(--green);border-color:#d1fae5;opacity:.75;}
.js-name{font-weight:700;color:var(--navy);display:flex;align-items:center;gap:4px;justify-content:space-between;}
.js-meta{color:var(--muted);margin-top:1px;}
.job-amount{font-weight:700;font-size:13px;color:#c2410c;white-space:nowrap;flex-shrink:0;}
.job-amount.missing{color:var(--muted);font-weight:400;}
.jn-row{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.jn-amount{font-weight:700;font-size:13px;color:#c2410c;white-space:nowrap;flex-shrink:0;}
.jn-amount.missing{color:var(--muted);font-weight:400;font-size:12px;}
.rig-gross{font-size:11px;font-weight:700;color:#c2410c;padding:2px 8px 2px;letter-spacing:.2px;}
.rig-gross.zero{color:var(--muted);font-weight:400;}
.rig-labor-net{font-size:10px;color:var(--muted);padding:0 8px 4px;line-height:1.5;}
.rig-net-val{color:#16a34a;font-weight:700;}
.day-gross{font-size:12px;font-weight:700;color:#1a1f2e;margin-top:2px;letter-spacing:.2px;}
.day-gross.zero{color:rgba(255,255,255,.35);font-weight:400;}
.js-alerts{font-size:13px;margin-top:2px;}
.sortable-ghost{opacity:.4;background:#dbeafe !important;border-style:dashed !important;}
.sortable-chosen{box-shadow:0 6px 20px rgba(0,0,0,.2) !important;transform:rotate(1deg);}

/* ── RIGHT SIDEBAR ── */
.rside-hdr{padding:.875rem 1rem .625rem;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);position:sticky;top:0;background:var(--card);z-index:10;}
.crew-card{margin:.625rem .75rem;background:var(--bg);border-radius:10px;padding:10px 12px;border:1.5px solid var(--border);}
.cc-name{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.cc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cc-week{display:flex;gap:3px;margin-bottom:5px;}
.cc-day{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.cc-day.worked{background:var(--sky);color:#fff;}
.cc-day.worked.half{background:#bfdbfe;color:#1e40af;}
.cc-day.off{background:#fee2e2;color:#991b1b;font-size:9px;}
.cc-day.empty{background:#f1f3f5;color:#d1d5db;}
.cc-day-label{font-size:8px;color:var(--muted);text-align:center;width:26px;}
.cc-stats{font-size:12px;color:var(--muted);}
.cc-stats strong{color:var(--text);}
.cc-owner{font-size:11px;color:var(--muted);font-style:italic;}
.payroll-footer{margin:.75rem;background:var(--navy2);border-radius:12px;padding:12px 14px;}
.pf-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:6px;}
.pf-total{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;letter-spacing:1px;}
.pf-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}
.pf-breakdown{margin-top:8px;font-size:11px;color:rgba(255,255,255,.7);line-height:1.8;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.3);transition:transform .3s ease;z-index:999;display:flex;align-items:center;gap:12px;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast-undo{background:var(--gold);color:var(--navy);border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem;}
.overlay.hidden{display:none;}
.modal{background:var(--card);border-radius:18px;padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.25);}
.modal-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:1rem;}
.modal-field{margin-bottom:.875rem;}
.modal-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px;}
.modal-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;}
.modal-input:focus{border-color:var(--sky);}
.modal-footer{display:flex;gap:10px;margin-top:1.25rem;}
.mbtn-cancel{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:10px;background:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);}
.mbtn-save{flex:2;padding:11px;border:none;border-radius:10px;background:var(--sky);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.mbtn-save:hover{background:#2470c0;}
.mbtn-danger{flex:1;padding:11px;border:none;border-radius:10px;background:#fef2f2;color:var(--red);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.mbtn-green{flex:1;padding:11px;border:none;border-radius:10px;background:#d1fae5;color:#047857;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}

/* ── CREW POPOVER ── */
.crew-pop{position:fixed;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:1rem;width:240px;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:500;}
.crew-pop.hidden{display:none;}
.cp-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:.75rem;}
.cp-crew-item{display:flex;align-items:center;gap:10px;padding:6px 4px;border-radius:8px;cursor:pointer;transition:background .1s;}
.cp-crew-item:hover{background:#f5f7fb;}
.cp-crew-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--sky);}
.cp-crew-label{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.cp-crew-sub{font-size:11px;color:var(--muted);}
.cp-crew-item.disabled{opacity:.45;cursor:not-allowed;}
.cp-crew-item.disabled *{pointer-events:none;}

/* ── PAYROLL TABLE ── */
.payroll-table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:1rem;}
.payroll-table th{padding:8px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--border);}
.payroll-table td{padding:8px 10px;border-bottom:1px solid var(--border);}
.payroll-table tr:last-child td{border-bottom:none;}
.pay-total-row td{font-weight:700;border-top:2px solid var(--border);padding-top:10px;}

/* ── JOB STATUS BADGES ── */
.status-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.status-scheduled{background:#dbeafe;color:#1e40af;}
.status-progress{background:#fef3c7;color:#92400e;}
.status-completed{background:#d1fae5;color:#065f46;}

/* ── PRINT ── */
@media print{
  .topbar,.left-col,.right-col{display:none !important;}
  .layout{display:block;}
  .main-col{overflow:visible;height:auto;}
  .day-col{page-break-after:always;min-height:0;}
  .day-hdr{background:#eee !important;color:#000 !important;}
  .day-name,.day-date,.day-labor{color:#000 !important;}
}
@media(max-width:900px){
  .layout,.layout.crew-visible{grid-template-columns:1fr;}
  .left-col,.right-col,.layout.crew-visible .right-col{display:none;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="/pure_cleaning_admin.html" class="back-link">← Admin</a>
  <div class="topbar-logo">Pure <span>Cleaning</span></div>
  <div class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)">‹ Prev</button>
    <div class="week-label" id="weekLabel">Loading…</div>
    <button class="nav-btn" onclick="changeWeek(1)">Next ›</button>
    <button class="nav-btn" onclick="goToday()">Today</button>
    <button class="block-week-btn" id="blockWeekBtn" onclick="toggleWeekBlocked()">Mark Booked</button>
  </div>
  <div class="topbar-sep"></div>
  <button class="topbar-action" onclick="openDayOffModal()">+ Day Off</button>
  <button class="topbar-action" onclick="openPayrollModal()">📊 Payroll</button>
  <button class="topbar-action" id="crewToggleBtn" onclick="toggleCrewPanel()">👥 Crew</button>
  <button class="topbar-action" onclick="window.print()">🖨</button>
</div>

<!-- THREE-COLUMN LAYOUT -->
<div class="layout" id="mainLayout">

  <!-- LEFT: NEEDS MINI QUOTE + NEEDS SCHEDULING -->
  <div class="left-col">
    <div class="sidebar-hdr" id="mqHdr" style="display:none;background:#fef9ec;color:#92400e;border-bottom-color:#fcd34d;">✨ Needs Mini Quote (<span id="mqCount">0</span>)</div>
    <div class="needs-list" id="mqList"></div>
    <div class="sidebar-hdr">📋 Needs Scheduling (<span id="needsCount">0</span>)</div>
    <div style="padding:.5rem .75rem .25rem;">
      <a href="/pure_cleaning_add_job.html?back=calendar" style="display:block;text-align:center;padding:9px;background:#c2410c;color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;letter-spacing:.5px;transition:background .15s;" onmouseover="this.style.background='#b03a0b'" onmouseout="this.style.background='#c2410c'">+ Add Customer / Job</a>
    </div>
    <div class="needs-list" id="needsList"></div>
  </div>

  <!-- MAIN: CALENDAR -->
  <div class="main-col">
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- RIGHT: CREW & PAYROLL -->
  <div class="right-col">
    <div class="rside-hdr">👥 Crew & Payroll</div>
    <div id="crewPanel"></div>
  </div>

</div>

<!-- ── JOB DETAIL MODAL ── -->
<div class="overlay hidden" id="jobModal" onclick="if(event.target===this)closeJobModal()">
  <div class="modal" style="max-width:500px;">
    <div class="modal-title" id="jmTitle">Job Details</div>
    <div id="jmBody"></div>
    <div class="modal-footer" id="jmFooter"></div>
  </div>
</div>

<!-- ── CREW ASSIGNMENT POPOVER ── -->
<div class="crew-pop hidden" id="crewPop">
  <div class="cp-title" id="cpTitle">Assign Crew</div>
  <div style="margin-bottom:.75rem;padding-bottom:.625rem;border-bottom:1px solid var(--border);">
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;">Day type</div>
    <div style="display:flex;gap:16px;">
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);">
        <input type="radio" name="cpDayType" id="cpDtFull" value="full" onchange="cpUpdateDayType('full')" checked> Full day
      </label>
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);">
        <input type="radio" name="cpDayType" id="cpDtHalf" value="half" onchange="cpUpdateDayType('half')"> <span style="color:var(--gold);">½</span> Half day
      </label>
    </div>
  </div>

// ─── CUSTOMER DB CACHE ───────────────────────────────────────────────────────
async function getCachedCustomerDB() {
  const CACHE_KEY = 'pcpc_customer_db_cache';
  const TTL_MS    = 60 * 1000;       // 60s — approved jobs appear within 1 minute
  const STALE_MS  = 30 * 1000;       // background-refresh after 30s even if still valid
  try {
    const cached = sessionStorage.getItem(CACHE_KEY);
    if (cached) {
      const { data, timestamp } = JSON.parse(cached);
      const age = Date.now() - timestamp;
      // Also bust if a DB write happened after this cache was written
      const writeTs = parseInt(localStorage.getItem('pcpc_db_write_ts') || '0');
      const cacheIsStale = writeTs > timestamp;
      if (age < TTL_MS && !cacheIsStale) {
        // Stale-while-revalidate: if cache is 30-60s old, serve it but refresh in background
        if (age > STALE_MS) {
          fetch(`${PCPC_API}/customers`)
            .then(r => r.json()).then(d => {
              if (d) sessionStorage.setItem(CACHE_KEY, JSON.stringify({ data: d, timestamp: Date.now() }));
            }).catch(()=>{});
        }
        return data;
      }
    }
  } catch(e) { console.warn('[customerDB] cache read failed:', e); }
  const res = await fetch(`${PCPC_API}/customers`);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  try {
    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ data, timestamp: Date.now() }));
  } catch(e) { console.warn('[customerDB] cache write failed:', e); }
  return data;
}

const CREW_MEMBERS = [
  {id:'byron',    name:'Byron',    color:'#3b82f6', dailyRate:150, halfRate:75,  role:'crew'},
  {id:'danny',    name:'Danny',    color:'#10b981', dailyRate:150, halfRate:75,  role:'crew'},
  {id:'jonathan', name:'Jonathan', color:'#f59e0b', dailyRate:160, halfRate:80,  role:'crew'},
  {id:'tyler',    name:'Tyler',    color:'#a855f7', dailyRate:150, halfRate:75,  role:'owner_son'},
  {id:'tony',     name:'Tony',     color:'#ef4444', dailyRate:0,   halfRate:0,   role:'owner'}
];
const RIGS = ['rig_1','rig_2','rig_3'];
const RIG_LABELS = {rig_1:'Old Tacoma', rig_2:'New Tacoma', rig_3:'Chevy'};

// ── STATE ──────────────────────────────────────────────────────────────────────
let dbRecord      = {};
let weekOffset    = 0;
let calState      = loadCalState();
let cpDate        = null; // date currently editing in crew pop
let cpRig         = null; // rig currently editing
let cpSelCrew     = [];   // selected crew in popover
let cpDayType     = 'full'; // 'full' | 'half' for current popover
let jmPhone       = null; // phone in job modal
let undoFn        = null;
let sortables     = [];
let wasDragging   = false;

function loadCalState() {
  try { return JSON.parse(localStorage.getItem('pcpc_calendar_state') || '{}'); } catch { return {}; }
}
function saveCalState() {
  if (!calState.rigCrew)    calState.rigCrew    = {};
  if (!calState.rigDayType) calState.rigDayType = {};
  if (!calState.daysOff)    calState.daysOff    = [];
  localStorage.setItem('pcpc_calendar_state', JSON.stringify(calState));
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function renderShell() {
  // Paint the calendar frame immediately (before DB loads) so it feels instant
  document.getElementById('needsList').innerHTML = '<div style="padding:1rem;text-align:center;color:var(--muted);font-size:13px;">Loading jobs…</div>';
  renderCalGrid(getWeekDates()); // renders with empty rig lanes (no jobs yet)
}

function cleanStaleSchedulingStates() {
  // Reset any customer stuck in 'scheduled' state with no scheduledDate — these are
  // orphaned states from mid-drag page reloads or failed drop handlers.
  (dbRecord.customers || []).forEach(c => {
    const ss = c.scheduledStatus;
    if (ss && ss.state === 'scheduled' && !ss.scheduledDate) {
      ss.state = 'needs_scheduling';
      ss.rig = null;
    }
  });
}

async function cleanupExpiredTestRecords() {
  const customers = dbRecord.customers || [];
  const now = Date.now();
  const expired = customers.filter(c =>
    c.isTest === true &&
    c.testExpiresAt &&
    new Date(c.testExpiresAt).getTime() < now &&
    (!c.lifetimeSpend || c.lifetimeSpend === 0) // safety — never touch records with real spend
  );
  if (expired.length === 0) return;

  const expiredPhones = new Set(expired.map(c => c.phone));
  dbRecord.customers = customers.filter(c => !expiredPhones.has(c.phone));

  // Clean up related incoming requests
  try {
    const inc = await fetch(`${PCPC_API}/incoming`).then(r => r.json());
    const cleanedReqs = (inc.requests || []).filter(r => {
      const p = ((r.customerData && r.customerData.phone) || r.phone || '').replace(/\D/g, '');
      return !expiredPhones.has(p);
    });
    if (cleanedReqs.length < (inc.requests || []).length) {
      fetch(`${PCPC_API}/incoming`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({...inc,requests:cleanedReqs}) });
    }
  } catch(e) { console.warn('[test cleanup] incoming:', e.message); }

  // Clean up quote KV entries
  expired.forEach(c => {
    if (c.linkCode) fetch(`${PCPC_API}/quote/${c.linkCode}`, { method: 'DELETE' }).catch(() => {});
  });

  // Persist cleaned customer DB
  await saveDb();

  // Log the cleanup
  fetch(`${PCPC_API}/events`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id:'evt_testclean_'+Date.now(), timestamp:new Date().toISOString(),
      eventType:'test_records_cleaned', metadata:{ count:expired.length, phones:[...expiredPhones] } })
  }).catch(() => {});

  showToast(`🧪 Cleaned ${expired.length} expired test record${expired.length > 1 ? 's' : ''}`);
}

// ── LIVE UPDATES ──────────────────────────────────────────────────────────────
const _justUpdated = new Map(); // phone → expiry timestamp

async function pollCustomerUpdates() {
  try {
    const res = await fetch(`${PCPC_API}/customers`);
    if (!res.ok) return;
    const newDb = await res.json();
    const newCusts = newDb.customers || [];
    const oldCusts = dbRecord.customers || [];
    let anyChange = false;
    newCusts.forEach(nc => {
      const old = oldCusts.find(c => c.phone === nc.phone);
      if (!old) return;
      const changed =
        (nc.scheduledStatus?.approvedAmount !== old.scheduledStatus?.approvedAmount) ||
        (nc.sealingInterest !== old.sealingInterest) ||
        (JSON.stringify(nc.addOns) !== JSON.stringify(old.addOns));
      if (changed) {
        _justUpdated.set(nc.phone, Date.now() + 30_000);
        anyChange = true;
        Object.assign(old, nc);
      }
    });
    if (anyChange) {
      dbRecord = newDb;
      renderSidebar();
      setTimeout(() => { _justUpdated.clear(); renderSidebar(); }, 30_000);
    }
  } catch(e) { console.warn('[pollCustomerUpdates]', e.message); }
}

// ── TOAST ALERT SYSTEM ─────────────────────────────────────────────────────────
const _ALERT_SINCE_KEY = 'pcpc_alert_since';
const _ALERT_SEEN_KEY  = 'pcpc_alert_seen';
const _ALERT_TYPES     = ['addon_confirmed', 'sealing_interest_confirmed'];

async function checkAlerts() {
  const since = sessionStorage.getItem(_ALERT_SINCE_KEY)
    || new Date(Date.now() - 24*60*60*1000).toISOString();
  const seen  = JSON.parse(sessionStorage.getItem(_ALERT_SEEN_KEY) || '[]');
  sessionStorage.setItem(_ALERT_SINCE_KEY, new Date().toISOString());
  try {
    const res = await fetch(`${PCPC_API}/events?since=${encodeURIComponent(since)}`);
    if (!res.ok) return;
    const { events = [] } = await res.json();
    const newEvts = events.filter(e => _ALERT_TYPES.includes(e.eventType) && !seen.includes(e.id));
    if (!newEvts.length) return;
    sessionStorage.setItem(_ALERT_SEEN_KEY, JSON.stringify([...seen, ...newEvts.map(e => e.id)]));
    newEvts.forEach(showAlertToast);
  } catch {}
}

function showAlertToast(evt) {
  const isAddon = evt.eventType === 'addon_confirmed';
  const cust = evt.customer || {};
  const name = `${cust.fn||''} ${cust.ln||''}`.trim() || 'Customer';
  const ph   = cust.ph || '';
  const title = isAddon ? '🔔 ADD-ON ADDED' : '💎 SEALING INTEREST';
  let body;
  if (isAddon) {
    body = `<strong>${_ea(name)}</strong><br>Added: ${_ea(evt.addonName||'')} ($${evt.bundlePrice||''})<br>New total: $${evt.newAmount||''}`;
  } else {
    body = `<strong>${_ea(name)}</strong><br>Bring sealing samples to job.<br>Quote in person.`;
  }
  const id = 'at-' + (evt.id || Date.now());
  const el = document.createElement('div');
  el.id = id; el.className = 'alert-toast';
  el.innerHTML = `<div class="alert-toast-type">${title}</div><div class="alert-toast-body">${body}</div><div class="alert-toast-actions">${ph?`<button class="alert-view-btn" onclick="_alertView('${ph}','${id}')">View Card</button>`:''}<button class="alert-dismiss-btn" onclick="document.getElementById('${id}')?.remove()">Dismiss</button></div>`;
  document.getElementById('alertContainer').appendChild(el);
}

function _alertView(phone, toastId) {
  document.getElementById(toastId)?.remove();
  const card = document.querySelector(`.job-unscheduled[data-phone="${phone}"]`);
  if (card) {
    card.scrollIntoView({behavior:'smooth', block:'center'});
    card.style.outline = '2px solid var(--gold)';
    setTimeout(() => { card.style.outline = ''; }, 2500);
  }
}

function _ea(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function init() {
  renderShell();
  loadBlockedWeeksCal();  // fire-and-forget — updates button when ready
  try {
    dbRecord = (await getCachedCustomerDB()) || {};
    cleanStaleSchedulingStates();
    cleanupExpiredTestRecords(); // fire-and-forget — removes expired test records silently
    render();
  } catch(e) {
    dbRecord = {customers:[]};
    render();
    showToast('⚠️ Could not load database — some data may be stale');
  }
  // URL-based highlight (from toast "View Card" or direct link)
  const hlPhone = new URLSearchParams(window.location.search).get('highlight') ||
                  new URLSearchParams(window.location.search).get('phone');
  if (hlPhone) highlightSidebarJob(hlPhone);

  // Poll for customer changes every 60 seconds
  setInterval(pollCustomerUpdates, 60_000);
  // Cross-tab trigger: mini_quote page sets localStorage after updating customer
  window.addEventListener('storage', e => {
    if (e.key === 'pcpc_db_changed_at') pollCustomerUpdates();
  });
  // Alert toast polling every 60 seconds
  checkAlerts();
  setInterval(checkAlerts, 60_000);
}

function highlightSidebarJob(phone) {
  setTimeout(() => {
    const card = document.querySelector(`.job-unscheduled[data-phone="${phone}"]`);
    if (!card) {
      showToast('Customer not in unscheduled list — they may already be scheduled');
      return;
    }
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.classList.add('pulse-highlight');
    setTimeout(() => card.classList.remove('pulse-highlight'), 2500);
  }, 300);
}

async function saveDb() {
  await fetch(`${PCPC_API}/customers`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(dbRecord)
  });
  sessionStorage.removeItem('pcpc_customer_db_cache');
}

// ── WEEK HELPERS ──────────────────────────────────────────────────────────────
function getWeekDates() {
  const today = new Date(); today.setHours(0,0,0,0);
  const sunday = new Date(today); sunday.setDate(today.getDate() - today.getDay() + weekOffset * 7);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(sunday); d.setDate(sunday.getDate() + i);
    return d.toISOString().split('T')[0];
  });
}
function isoToday() { return new Date().toISOString().split('T')[0]; }

// ── RENDER ────────────────────────────────────────────────────────────────────

function renderSidebar() {
  // Needs Mini Quote queue
  const mqJobs = getMiniQuoteNeeded();

  const mqEl  = document.getElementById('mqList');
  document.getElementById('mqCount').textContent = mqJobs.length;
  if (mqJobs.length) {
    mqHdr.style.display = '';
    mqEl.innerHTML = mqJobs.map(c => jobCardMiniQuote(c)).join('');
  } else {
    mqHdr.style.display = 'none';
    mqEl.innerHTML = '';
  }

  // Needs Scheduling queue
  const jobs = getUnscheduled();
  document.getElementById('needsCount').textContent = jobs.length;
  const el = document.getElementById('needsList');
  if (!jobs.length) {
    el.innerHTML = `<div class="empty-sidebar"><div>🎉</div><p style="font-size:14px;font-weight:600;color:var(--navy);">All caught up!</p><p style="font-size:13px;margin-top:4px;">No jobs waiting to be scheduled.</p></div>`;
  } else {
    el.innerHTML = jobs.map(c => jobCardSidebar(c)).join('');
  }
  initSortables();
}

function getMiniQuoteNeeded() {
  const seen = new Set();
  return (dbRecord.customers||[]).filter(x => {
    if (!x.phone || seen.has(x.phone)) return false;
    const match = x.quoteStatus && x.quoteStatus.state === 'phone_quoted_pending_mini_quote';
    if (match) seen.add(x.phone);
    return match;
  });
}

function jobCardMiniQuote(c) {
  const name = esc(((c.firstName||c.fn||'') + ' ' + (c.lastName||c.ln||'')).trim());
  const qs   = c.quoteStatus || {};
  const amt  = qs.mainAmount || qs.approvedAmount;
  const svc  = esc(qs.mainServices || qs.notes || '');
  const savedAt = qs.quotedDate
    ? new Date(qs.quotedDate).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
    : '';
  const testBadge = c.isTest ? ' <span class="test-badge">🧪 TEST</span>' : '';
  return `<div class="job-unscheduled" data-phone="${c.phone}" style="border-left:3px solid var(--gold);cursor:default;" title="${name}">
    <div class="jcard-top">
      <div class="jcard-name"><a href="/pure_cleaning_customer_profile.html?phone=${encodeURIComponent(c.phone)}" onclick="event.stopPropagation()" style="color:inherit;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'" target="_blank">${name}</a>${testBadge}</div>
      <span class="phone-badge">📞 Phone</span>
    </div>
    ${svc || amt ? `<div class="jd" style="font-weight:600;color:var(--navy);">${svc}${amt ? ' — $'+Number(amt).toLocaleString() : ''}</div>` : ''}
    ${savedAt ? `<div class="jd">Saved ${savedAt}</div>` : ''}
    <a href="/pure_cleaning_mini_quote_builder.html?phone=${encodeURIComponent(c.phone)}" style="display:inline-block;margin-top:7px;padding:5px 13px;background:var(--gold);color:var(--navy);border-radius:7px;font-size:12px;font-weight:700;text-decoration:none;letter-spacing:.2px;" onclick="event.stopPropagation();">Build Mini Quote →</a>
  </div>`;
}

function jobAmount(c) {
  const amt = (c.scheduledStatus || {}).approvedAmount;
  if (!amt) return { html: '<span class="jn-amount missing">—</span>', val: 0 };
  return { html: `<span class="jn-amount">$${Number(amt).toLocaleString('en-US',{maximumFractionDigits:0})}</span>`, val: Number(amt) };
}

function calculateRigTotal(date, rig) {
  return getScheduledForRig(date, rig).reduce((s, c) => s + (jobAmount(c).val), 0);
}

function calculateDayTotal(date) {
  return RIGS.reduce((s, rig) => s + calculateRigTotal(date, rig), 0);
}

function jobCardSidebar(c) {
  const name   = esc(((c.firstName||c.fn||'') + ' ' + (c.lastName||c.ln||'')).trim());
  const ss     = c.scheduledStatus || {};
  const dur    = ss.estimatedDuration || 2;
  const notes  = esc(ss.jobNotes || '');
  const alerts = alertIcons(c.alerts||[]);

// ── CALENDAR GRID ─────────────────────────────────────────────────────────────
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function renderCalGrid(dates) {
  const today = isoToday();
  const html = dates.map(date => {
    const d = new Date(date+'T12:00:00');
    const dayName = DAY_NAMES[d.getDay()];
    const dayLabel = `${MONTH_NAMES[d.getMonth()]} ${d.getDate()}`;
    const isToday = date === today;
    const labor = calcDailyLabor(date);
    const dayTotal = calculateDayTotal(date);
    const dayNet = dayTotal - labor;
    const dayGrossStr = dayTotal > 0
      ? `$${dayTotal.toLocaleString('en-US',{maximumFractionDigits:0})} gross`
      : '$0 gross';
    const dayLaborNetStr = labor > 0
      ? `-$${labor.toLocaleString()} labor · $${dayNet.toLocaleString()} net`
      : '';
    const rigsHtml = RIGS.map(rig => {
      const crew = ((calState.rigCrew||{})[date]||{})[rig] || [];
      const crewLabel = crew.map(id => CREW_MEMBERS.find(c=>c.id===id)?.name||id).join(' + ');
      const dayType = getRigDayType(date, rig);
      const halfBadge = dayType === 'half' ? ' <span style="font-size:10px;font-weight:700;color:var(--gold);background:rgba(244,166,32,.15);border-radius:4px;padding:1px 4px;margin-left:2px;">½</span>' : '';
      const jobs = getScheduledForRig(date, rig);
      const jobsHtml = jobs.map(c => jobCardScheduled(c)).join('');
      const emptyClass = jobs.length ? '' : ' empty-hint';
      const rigTotal = calculateRigTotal(date, rig);
      const rigLabor = calcRigLabor(date, rig);
      const rigNet   = rigTotal - rigLabor;
      const rigGrossStr = rigTotal > 0
        ? `$${rigTotal.toLocaleString('en-US',{maximumFractionDigits:0})}`
        : '$0';
      const rigGrossCls = rigTotal > 0 ? 'rig-gross' : 'rig-gross zero';
      const rigLaborNetHtml = rigLabor > 0
        ? `<div class="rig-labor-net">-$${rigLabor.toLocaleString()} labor · <span class="rig-net-val">$${rigNet.toLocaleString()} net</span></div>`
        : '';
      return `<div class="rig-section">
        <div class="rig-hdr" onclick="openCrewPop('${date}','${rig}',this)">
          <span class="rig-icon">🚛</span>
          <span class="rig-name">${RIG_LABELS[rig]}${halfBadge}</span>
          <span class="rig-crew-label">${crewLabel}</span>
        </div>
        <div class="${rigGrossCls}">${RIG_LABELS[rig]}: ${rigGrossStr}</div>
        ${rigLaborNetHtml}
        <div class="rig-jobs${emptyClass}" data-date="${date}" data-rig="${rig}" id="rj-${date}-${rig}">${jobsHtml}</div>
      </div>`;
    }).join('');
    return `<div class="day-col${isToday?' today-col':''}">
      <div class="day-hdr">
        <div class="day-name">${dayName}</div>
        <div class="day-date${isToday?' today':''}">${dayLabel}</div>
        <div class="day-gross${dayTotal===0?' zero':''}">${dayGrossStr}</div>
        ${labor>0 ? `<div class="day-labor has-cost">${dayLaborNetStr}</div>` : '<div class="day-labor">&nbsp;</div>'}
      </div>
      ${rigsHtml}
    </div>`;
  }).join('');
  document.getElementById('calGrid').innerHTML = html;
  initSortables();
}

function jobCardScheduled(c) {
  const name  = esc(((c.firstName||c.fn||'') + ' ' + (c.lastName||c.ln||'')).trim());
  const ss    = c.scheduledStatus || {};
  const time  = ss.startTime || '9:00am';
  const dur   = ss.estimatedDuration || 2;
  const state = ss.state || 'scheduled';
  const alerts= alertIcons(c.alerts||[]);
  const city  = c.city ? esc(formatCity(c.city)) : '';
  const badge = state==='completed' ? '✓' : state==='in_progress' ? '▶' : '';
  const { html: amtHtml } = jobAmount(c);
  const testBadge = c.isTest ? ' <span class="test-badge">🧪</span>' : '';
  return `<div class="job-scheduled ${state}${c.isTest ? ' job-test' : ''}" data-phone="${c.phone}" onclick="if(!wasDragging)openJobModal('${c.phone}')">
    <div class="js-name"><span>${badge}${name}${testBadge}${alerts}</span>${amtHtml}</div>
    <div class="js-meta">${time} · ${dur}h${city ? ' · '+city : ''}</div>
  </div>`;
}

// ── RIGHT SIDEBAR ─────────────────────────────────────────────────────────────
function renderCrewPanel(dates) {
  const today = isoToday();
  const worked = crewWorkedDays(dates);
  const payBreakdown = crewPayBreakdown(dates);
  const totalPaid = CREW_MEMBERS.filter(cm=>cm.role!=='owner')
    .reduce((s,cm) => s + (payBreakdown[cm.id]?.total||0), 0);

  let html = CREW_MEMBERS.map(cm => {
    const days = worked[cm.id] || [];
    const isOff = (date) => (calState.daysOff||[]).some(o=>o.crewId===cm.id&&o.date===date);
    const weekHtml = dates.map((date, i) => {
      const dn = ['S','M','T','W','T','F','S'][i];
      const on = days.includes(date);
      const off = isOff(date);
      const half = on && isCrewHalfDay(cm.id, date);
      const cls = off ? 'off' : half ? 'worked half' : on ? 'worked' : 'empty';
      const lbl = off ? 'Off' : half ? '½' : dn;
      return `<div class="cc-day ${cls}" title="${date}">${lbl}</div>`;
    }).join('');
    const bd = payBreakdown[cm.id] || {full:0, half:0, total:0};
    const breakStr = [
      bd.full > 0 ? `${bd.full} full` : '',
      bd.half > 0 ? `${bd.half} half` : ''
    ].filter(Boolean).join(' + ') || '—';
    const statsHtml = cm.role==='owner'
      ? `<div class="cc-owner">Owner — not paid</div>`
      : `<div class="cc-stats"><strong>${breakStr}</strong> · $${bd.total.toLocaleString()}/wk</div>`;
    return `<div class="crew-card">
      <div class="cc-name"><div class="cc-dot" style="background:${cm.color}"></div>${cm.name}</div>
      <div class="cc-week">${weekHtml}</div>
      ${statsHtml}
    </div>`;
  }).join('');

  html += `<div class="payroll-footer">
    <div class="pf-title">💰 Weekly Labor Cost</div>
    <div class="pf-total">$${totalPaid.toLocaleString()}</div>
    <div class="pf-sub">Excludes Tony (owner)</div>
    <div class="pf-breakdown">${dates.map((date,i)=>{
      const dl = calcDailyLabor(date);
      return dl>0 ? `${DAY_NAMES[i]}: $${dl}` : '';
    }).filter(Boolean).join('<br>')}</div>
  </div>`;

  document.getElementById('crewPanel').innerHTML = html;
}

// ── PAYROLL CALC ──────────────────────────────────────────────────────────────
function getRigDayType(date, rig) {
  return ((calState.rigDayType||{})[date]||{})[rig] || 'full';
}

function isCrewHalfDay(id, date) {
  for (const rig of RIGS) {
    const crew = ((calState.rigCrew||{})[date]||{})[rig] || [];
    if (crew.includes(id)) return getRigDayType(date, rig) === 'half';
  }
  return false;
}

function crewPayBreakdown(dates) {
  const result = {};
  CREW_MEMBERS.forEach(cm => result[cm.id] = {full:0, half:0, total:0});
  for (const date of dates) {
    const seen = new Set();
    for (const rig of RIGS) {
      const crew = ((calState.rigCrew||{})[date]||{})[rig] || [];
      const dayType = getRigDayType(date, rig);
      for (const id of crew) {
        if (seen.has(id)) continue;
        seen.add(id);
        const cm = CREW_MEMBERS.find(c=>c.id===id);
        if (!cm) continue;
        if (dayType === 'half') { result[id].half++; result[id].total += cm.halfRate||0; }
        else                    { result[id].full++; result[id].total += cm.dailyRate;   }
      }
    }
  }
  return result;
}

function calcDailyLabor(date) {
  let total = 0;
  const seen = new Set();
  for (const rig of RIGS) {
    const crew = ((calState.rigCrew||{})[date]||{})[rig] || [];
    const dayType = getRigDayType(date, rig);
    for (const id of crew) {
      if (seen.has(id)) continue;
      seen.add(id);
      const cm = CREW_MEMBERS.find(c=>c.id===id);
      if (!cm) continue;
      total += dayType === 'half' ? (cm.halfRate||0) : cm.dailyRate;
    }
  }
  return total;
}

// Per-rig labor — deduplicates crew across rigs in RIGS order so sum = calcDailyLabor
function calcRigLabor(date, rig) {
  const seen = new Set();
  for (const r of RIGS) {
    if (r === rig) break;
    for (const id of (((calState.rigCrew||{})[date]||{})[r]||[])) seen.add(id);
  }
  let total = 0;
  const dayType = getRigDayType(date, rig);
  for (const id of (((calState.rigCrew||{})[date]||{})[rig]||[])) {
    if (seen.has(id)) continue;
    const cm = CREW_MEMBERS.find(c=>c.id===id);
    if (cm) total += dayType === 'half' ? (cm.halfRate||0) : cm.dailyRate;
  }
  return total;
}

function crewWorkedDays(dates) {
  const result = {};
  CREW_MEMBERS.forEach(cm => result[cm.id] = []);
  for (const date of dates) {
    const rigs = ((calState.rigCrew||{})[date])||{};
    const seen = new Set();
    for (const rig of RIGS) { for (const id of (rigs[rig]||[])) if(!seen.has(id)){seen.add(id);result[id].push(date);} }
  }
  return result;
}

function calcPayroll(dates) {
  const bd = crewPayBreakdown(dates);
  const result = {};
  for (const [id, data] of Object.entries(bd)) result[id] = data.total;
  return result;
}

// ── DATA QUERIES ──────────────────────────────────────────────────────────────
function getUnscheduled() {
  const seen = new Set();
  return (dbRecord.customers||[]).filter(x => {
    if (!x.phone || seen.has(x.phone)) return false;
    const matches =
      (x.scheduledStatus && x.scheduledStatus.state === 'needs_scheduling') ||
      (x.quoteStatus && x.quoteStatus.state === 'approved' && (!x.scheduledStatus || !x.scheduledStatus.state));
    if (matches) seen.add(x.phone);
    return matches;
  });
}

function getScheduledForRig(date, rig) {
  return (dbRecord.customers||[]).filter(c => {
    const ss = c.scheduledStatus;
    return ss && (ss.state==='scheduled'||ss.state==='in_progress'||ss.state==='completed') && ss.scheduledDate===date && ss.rig===rig;
  });
}

function findCustomer(phone) {
  return (dbRecord.customers||[]).find(c=>c.phone===phone);
}

// ── DRAG AND DROP ─────────────────────────────────────────────────────────────
function initSortables() {
  sortables.forEach(s => { try { s.destroy(); } catch {} });
  sortables = [];

  const sidebarEl = document.getElementById('needsList');
  if (sidebarEl) {
    sortables.push(Sortable.create(sidebarEl, {
      group:{ name:'jobs', pull:true, put:true },
      animation:150,
      ghostClass:'sortable-ghost',
      chosenClass:'sortable-chosen',
      filter: '.card-del-btn,.card-sms-btn',
      onStart:()=>{ wasDragging=true; },
      onEnd:()=>{ setTimeout(()=>wasDragging=false, 100); },
      onAdd: evt => handleDropToSidebar(evt.item.dataset.phone, evt)
    }));
  }

  document.querySelectorAll('.rig-jobs').forEach(lane => {
    sortables.push(Sortable.create(lane, {
      group:{ name:'jobs', pull:true, put: to => {
        // Max 2 jobs per rig slot? No — only crew has max. Multiple jobs per rig allowed.
        return true;
      }},
      animation:150,
      ghostClass:'sortable-ghost',
      chosenClass:'sortable-chosen',
      onStart:()=>{ wasDragging=true; },
      onEnd:()=>{ setTimeout(()=>wasDragging=false, 100); },
      onAdd: evt => handleDropToRig(evt.item.dataset.phone, evt.to.dataset.date, evt.to.dataset.rig)
    }));
  });
}

async function handleDropToRig(phone, date, rig) {
  const c = findCustomer(phone);
  if (!c) return;
  const prev = JSON.parse(JSON.stringify(c.scheduledStatus || {}));
  if (!c.scheduledStatus) c.scheduledStatus = { estimatedDuration:2, startTime:'09:00', jobNotes:'', crew:[] };
  c.scheduledStatus.state = 'scheduled';
  c.scheduledStatus.scheduledDate = date;
  c.scheduledStatus.rig = rig;

  const name = ((c.firstName||c.fn||'') + ' ' + (c.lastName||c.ln||'')).trim();
  const dateStr = new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  showToast(`📅 ${esc(name)} → ${dateStr} · ${RIG_LABELS[rig]}`, 'Undo', () => { undoAction(phone, prev); });

  saveDb().catch(()=>{});
  renderCalGrid(getWeekDates());
  renderCrewPanel(getWeekDates());
  renderSidebar(); // keep sidebar in sync — "All caught up!" when last card is scheduled
}

async function handleDropToSidebar(phone, evt) {
  const c = findCustomer(phone);
  if (!c) return;
  const prev = JSON.parse(JSON.stringify(c.scheduledStatus || {}));
  // Only clear scheduling-specific fields — never touch name, phone, amount, quoteStatus, etc.
  if (c.scheduledStatus) {
    c.scheduledStatus.state = 'needs_scheduling';
    c.scheduledStatus.scheduledDate = null;
    c.scheduledStatus.rig = null;
  } else {
    c.scheduledStatus = { state: 'needs_scheduling', scheduledDate: null, rig: null };
  }
  const name = ((c.firstName||c.fn||'') + ' ' + (c.lastName||c.ln||'')).trim();
  showToast(`↩ ${esc(name)} moved back to Needs Scheduling`, 'Undo', () => { undoAction(phone, prev); });
  saveDb().catch(()=>{});
  renderCalGrid(getWeekDates());
  renderCrewPanel(getWeekDates());
  // Re-render sidebar with proper sidebar card HTML — fixes stuck calendar card + missing X button
  renderSidebar();
}

function undoAction(phone, prevStatus) {
  const c = findCustomer(phone);
  if (!c) return;
  c.scheduledStatus = prevStatus;
  saveDb().catch(()=>{});
  render();
  showToast('↩ Action undone');
}

// ── CREW POPOVER ──────────────────────────────────────────────────────────────
function openCrewPop(date, rig, el) {
  cpDate = date; cpRig = rig;
  const currentCrew = ((calState.rigCrew||{})[date]||{})[rig] || [];
  cpSelCrew = [...currentCrew];
  cpDayType = getRigDayType(date, rig);

  document.getElementById('cpTitle').textContent = `${RIG_LABELS[rig]} · ${new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}`;
  document.getElementById('cpDtFull').checked = cpDayType !== 'half';
  document.getElementById('cpDtHalf').checked = cpDayType === 'half';

  const isOff = id => (calState.daysOff||[]).some(o=>o.crewId===id&&o.date===date);
  const onOtherRig = id => RIGS.filter(r=>r!==rig).some(r => ((calState.rigCrew||{})[date]||{})[r]?.includes(id));

  document.getElementById('cpList').innerHTML = CREW_MEMBERS.map(cm => {
    const off     = isOff(cm.id);
    const other   = onOtherRig(cm.id);
    const checked = currentCrew.includes(cm.id);
    const rate    = cpDayType === 'half' ? (cm.halfRate||0) : cm.dailyRate;
    const sub     = off   ? `<span class="cp-crew-sub">Off</span>`
                  : other ? `<span class="cp-crew-sub">On other rig</span>`
                  :         `<span class="cp-crew-sub" id="cpc-rate-${cm.id}">$${rate}/day${cm.role==='owner'?' (Owner)':''}</span>`;
    const disabled = off || other;
    return `<div class="cp-crew-item${disabled?' disabled':''}" onclick="${disabled?'':' toggleCpCrew(\''+cm.id+'\')'}"  >
      <input type="checkbox" id="cpc-${cm.id}" ${checked?'checked':''} ${disabled?'disabled':''}>
      <div><div class="cp-crew-label" style="color:${cm.color}">${cm.name}</div>${sub}</div>
    </div>`;
  }).join('');

  const pop = document.getElementById('crewPop');
  const rect = el.getBoundingClientRect();
  pop.style.top  = Math.min(rect.bottom + 4, window.innerHeight - 320) + 'px';
  pop.style.left = Math.min(rect.left, window.innerWidth - 256) + 'px';
  pop.classList.remove('hidden');
  document.addEventListener('click', crewPopOutside, true);
}

function toggleCpCrew(id) {
  const cb = document.getElementById('cpc-' + id);
  if (!cb) return;
  if (cpSelCrew.includes(id)) {
    cpSelCrew = cpSelCrew.filter(x=>x!==id);
    cb.checked = false;
  } else {
    if (cpSelCrew.length >= 2) { showToast('Max 2 crew per rig'); return; }
    cpSelCrew.push(id);
    cb.checked = true;
  }
}

function saveCrewPop() {
  if (!calState.rigCrew)              calState.rigCrew              = {};
  if (!calState.rigCrew[cpDate])      calState.rigCrew[cpDate]      = {};
  if (!calState.rigDayType)           calState.rigDayType           = {};
  if (!calState.rigDayType[cpDate])   calState.rigDayType[cpDate]   = {};
  calState.rigCrew[cpDate][cpRig]    = [...cpSelCrew];
  calState.rigDayType[cpDate][cpRig] = cpDayType;
  saveCalState();
  closeCrewPop();
  render();
}

function closeCrewPop() {
  document.getElementById('crewPop').classList.add('hidden');
  document.removeEventListener('click', crewPopOutside, true);
}

function cpUpdateDayType(type) {
  cpDayType = type;
  CREW_MEMBERS.forEach(cm => {
    const el = document.getElementById('cpc-rate-'+cm.id);
    if (!el || cm.role === 'owner') return;
    const rate = type === 'half' ? (cm.halfRate||0) : cm.dailyRate;
    el.textContent = '$'+rate+'/day';
  });
}

function crewPopOutside(e) {
  const pop = document.getElementById('crewPop');
  if (!pop.contains(e.target)) closeCrewPop();
}

    <button class="mbtn-cancel" onclick="unscheduleJob()">↺ Reschedule</button>
    ${!isCompleted ? `<button class="mbtn-green" onclick="markComplete()">✓ Complete</button>` : ''}
    <button style="flex:1;padding:10px;border-radius:10px;background:#fee2e2;color:#dc2626;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;" onclick="promptCancelJob('${phone}')">✕ Cancel Job</button>
    <button class="mbtn-save" onclick="saveJobModal()">Save</button>
  `;
  document.getElementById('jobModal').classList.remove('hidden');
}

function closeJobModal() { document.getElementById('jobModal').classList.add('hidden'); jmPhone=null; }

function saveJobModal() {
  const c = findCustomer(jmPhone);
  if (!c || !c.scheduledStatus) return;
  c.scheduledStatus.estimatedDuration = parseInt(document.getElementById('jmDur').value)||2;
  c.scheduledStatus.startTime = document.getElementById('jmStart').value || '09:00';
  c.scheduledStatus.jobNotes  = document.getElementById('jmNotes').value.trim();
  saveDb().catch(()=>{});
  closeJobModal();
  render();
}

function markComplete() {
  // Show post-job log modal before marking complete
  const now = new Date();
  document.getElementById('jobEndTime').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.querySelector('input[name="custSatisfied"][value="yes"]').checked = true;
  ['issueTime','issueEquip','issueScope','issueWeather'].forEach(id => { const el = document.getElementById(id); if(el) el.checked = false; });
  const n = document.getElementById('jobLogNotes'); if (n) n.value = '';
  document.getElementById('jobLogModal').classList.remove('hidden');
}

function skipJobLog() {
  document.getElementById('jobLogModal').classList.add('hidden');
  _doCompleteJob({});
}

function saveJobLog() {
  document.getElementById('jobLogModal').classList.add('hidden');
  const issues = [];
  if (document.getElementById('issueTime')?.checked)    issues.push('took_longer');
  if (document.getElementById('issueEquip')?.checked)   issues.push('equipment');
  if (document.getElementById('issueScope')?.checked)   issues.push('scope_change');
  if (document.getElementById('issueWeather')?.checked) issues.push('weather');
  const satisfied = document.querySelector('input[name="custSatisfied"]:checked')?.value || 'yes';
  const endTime   = document.getElementById('jobEndTime')?.value || '';
  const notes     = document.getElementById('jobLogNotes')?.value?.trim() || '';
  _doCompleteJob({ satisfied, endTime, issues, notes });
}

function _doCompleteJob(log) {
  const c = findCustomer(jmPhone);
  if (!c || !c.scheduledStatus) return;
  const ss = c.scheduledStatus;
  ss.state = 'completed';
  ss.completedDate = isoToday();
  if (Object.keys(log).length) {
    ss.jobLog = { ...log, loggedAt: new Date().toISOString(), loggedBy: 'operator' };
  }
  // Update customer history
  const amt = ss.approvedAmount || 0;
  if (amt > 0) c.lifetimeSpend = (c.lifetimeSpend || 0) + amt;
  c.totalJobs = (c.totalJobs || 0) + 1;
  c.lastService = isoToday();
  saveDb().catch(()=>{});
  closeJobModal();
  render();
  showToast('✓ Job completed — customer history updated');
}

// ── DELETE / CANCEL FLOWS ──────────────────────────────────────────────────────
let _confirmCallback = null;
let _deletedSnapshot = null; // for undo

function closeConfirmModal() {
  document.getElementById('confirmModal').classList.add('hidden');
  _confirmCallback = null;
}

function promptDeleteFromQueue(phone) {
  const c = findCustomer(phone);
  if (!c) return;
  const name = ((c.firstName||c.fn||'') + ' ' + (c.lastName||c.ln||'')).trim();
  const amt = (c.scheduledStatus||{}).approvedAmount;
  const amtStr = amt ? ` · $${Number(amt).toLocaleString()}` : '';
  document.getElementById('cmTitle').textContent = 'Remove from Queue';
  document.getElementById('cmBody').innerHTML = `Remove <strong>${esc(name)}</strong> from the scheduling queue?${amtStr}<br><span style="color:#dc2626;font-size:12px;">This clears the job. The customer record is preserved.</span>`;
  document.getElementById('cmReasonWrap').style.display = 'none';
  document.getElementById('cmConfirmBtn').textContent = 'Remove';
  _confirmCallback = () => executeDeleteFromQueue(phone);
  document.getElementById('cmConfirmBtn').onclick = () => { const cb = _confirmCallback; closeConfirmModal(); cb && cb(); };
  document.getElementById('confirmModal').classList.remove('hidden');
}

function executeDeleteFromQueue(phone) {
  const c = findCustomer(phone);
  if (!c) return;
  _deletedSnapshot = { phone, quoteStatus: JSON.parse(JSON.stringify(c.quoteStatus||{})), scheduledStatus: JSON.parse(JSON.stringify(c.scheduledStatus||{})) };
  const name = ((c.firstName||c.fn||'') + ' ' + (c.lastName||c.ln||'')).trim();
  // Clear job state but preserve customer record
  if (c.lifetimeSpend > 0) {
    c.quoteStatus = null;
    c.scheduledStatus = null;
  } else {
    // Test/no-history record — clear entirely
    c.quoteStatus = null;
    c.scheduledStatus = null;
  }
  logEvent('job_deleted', phone, {name, reason:'removed_from_queue'});
  saveDb().catch(()=>{});
  render();
  showToast(`🗑 ${esc(name)} removed`, 'Undo', () => undoDelete(phone));
}

function promptCancelJob(phone) {
  const c = findCustomer(phone);
  if (!c) return;
  const name = ((c.firstName||c.fn||'') + ' ' + (c.lastName||c.ln||'')).trim();
  const ss = c.scheduledStatus || {};
  const dateStr = ss.scheduledDate ? new Date(ss.scheduledDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) : '';
  document.getElementById('cmTitle').textContent = 'Cancel Job';
  document.getElementById('cmBody').innerHTML = `Cancel <strong>${esc(name)}</strong>${dateStr ? `'s job on ${dateStr}` : ''}?<br><span style="font-size:12px;color:var(--muted);">Customer record preserved. Choose a reason below.</span>`;
  document.getElementById('cmReasonWrap').style.display = 'block';
  document.getElementById('cmConfirmBtn').textContent = 'Cancel Job';
  document.getElementById('cmConfirmBtn').onclick = () => {
    const reason = document.getElementById('cmReason').value;
    closeConfirmModal();
    closeJobModal();
    executeCancelJob(phone, reason);
  };
  document.getElementById('confirmModal').classList.remove('hidden');
}

function executeCancelJob(phone, reason) {
  const c = findCustomer(phone);
  if (!c) return;
  _deletedSnapshot = { phone, quoteStatus: JSON.parse(JSON.stringify(c.quoteStatus||{})), scheduledStatus: JSON.parse(JSON.stringify(c.scheduledStatus||{})) };
  const name = ((c.firstName||c.fn||'') + ' ' + (c.lastName||c.ln||'')).trim();

  if (reason === 'reschedule_later') {
    // Return to queue rather than cancel
    c.scheduledStatus.state = 'needs_scheduling';
    c.scheduledStatus.scheduledDate = null;
    c.scheduledStatus.rig = null;
    logEvent('job_rescheduled', phone, {name, reason});
    saveDb().catch(()=>{});
    render();
    showToast(`↺ ${esc(name)} returned to queue for rescheduling`, 'Undo', () => undoDelete(phone));
    return;
  }

  c.scheduledStatus.state = 'canceled';
  c.scheduledStatus.canceledDate = isoToday();
  c.scheduledStatus.canceledReason = reason;

  // Customer-initiated cancels trigger 6-month cooldown in reactivation
  if (reason === 'customer_canceled' || reason === 'no_show') {
    try {
      const contacts = JSON.parse(localStorage.getItem('pcpc_reactivation_contacts') || '{}');
      const sixMonths = new Date(Date.now() + 6*30*24*60*60*1000);
      contacts[phone] = { contactedAt: new Date().toISOString(), cooldownUntil: sixMonths.toISOString() };
      localStorage.setItem('pcpc_reactivation_contacts', JSON.stringify(contacts));
    } catch(e) {}
  }

  logEvent('job_canceled', phone, {name, reason});
  saveDb().catch(()=>{});
  render();
  showToast(`✕ ${esc(name)}'s job canceled`, 'Undo', () => undoDelete(phone));
}

function undoDelete(phone) {
  if (!_deletedSnapshot || _deletedSnapshot.phone !== phone) return;
  const c = findCustomer(phone);
  if (!c) return;
  c.quoteStatus = _deletedSnapshot.quoteStatus;
  c.scheduledStatus = _deletedSnapshot.scheduledStatus;
  _deletedSnapshot = null;
  saveDb().catch(()=>{});
  render();
  showToast('↩ Action undone');
}

function logEvent(type, phone, meta) {
  fetch(`${PCPC_API}/events`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      id: 'evt_' + Date.now(),
      timestamp: new Date().toISOString(),
      eventType: type,
      customerPhone: phone,
      metadata: meta || {}
    })
  }).catch(() => {});
}

function unscheduleJob() {
  const c = findCustomer(jmPhone);
  if (!c || !c.scheduledStatus) return;
  c.scheduledStatus.state = 'needs_scheduling';
  c.scheduledStatus.scheduledDate = null;
  c.scheduledStatus.rig = null;
  saveDb().catch(()=>{});
  closeJobModal();
  render();
}

// ── PAYROLL MODAL ─────────────────────────────────────────────────────────────
function openPayrollModal() {
  const dates      = getWeekDates();
  const payBD      = crewPayBreakdown(dates);
  const total      = CREW_MEMBERS.filter(cm=>cm.role!=='owner')
    .reduce((s,cm) => s + (payBD[cm.id]?.total||0), 0);
  const rows = CREW_MEMBERS.map(cm => {
    const bd = payBD[cm.id] || {full:0, half:0, total:0};
    const daysStr = cm.role==='owner' ? '—'
      : (bd.full>0 && bd.half>0) ? `${bd.full}F + ${bd.half}H`
      : bd.half>0 ? `${bd.half} half`
      : `${bd.full}`;
    const rateStr = cm.role==='owner' ? '—' : `$${cm.dailyRate} / $${cm.halfRate||0}`;
    return `<tr>
      <td style="font-weight:600">${cm.name}</td>
      <td>${daysStr}</td>
      <td style="font-size:11px;color:var(--muted)">${rateStr}</td>
      <td style="font-weight:600">${cm.role==='owner' ? '<em style="color:var(--muted)">Owner</em>' : '$'+bd.total.toLocaleString()}</td>
    </tr>`;
  }).join('');
  const breakdown = dates.map((date,i) => {
    const dl = calcDailyLabor(date);
    const hasHalf = RIGS.some(rig => getRigDayType(date,rig)==='half' && (((calState.rigCrew||{})[date]||{})[rig]||[]).length>0);
    const halfNote = hasHalf ? ' <span style="color:var(--gold);font-size:10px;font-weight:700;">½</span>' : '';
    return `<tr><td>${DAY_NAMES[i]} ${new Date(date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}${halfNote}</td><td colspan="2">—</td><td style="font-weight:600">${dl>0?'$'+dl.toLocaleString():'-'}</td></tr>`;
  }).join('');
  document.getElementById('payrollBody').innerHTML = `
    <table class="payroll-table">
      <thead><tr><th>Crew</th><th>Days (F/H)</th><th>Full/Half $</th><th>Total</th></tr></thead>
      <tbody>${rows}
        <tr class="pay-total-row"><td colspan="3">PAID TOTAL</td><td>$${total.toLocaleString()}</td></tr>
      </tbody>
    </table>
    <div style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem;">Day-by-Day</div>
    <table class="payroll-table"><tbody>${breakdown}</tbody></table>`;
  document.getElementById('payrollModal').classList.remove('hidden');
}
function closePayrollModal() { document.getElementById('payrollModal').classList.add('hidden'); }

// ── DAY OFF ───────────────────────────────────────────────────────────────────
function openDayOffModal() {
  const sel = document.getElementById('doCrew');
  sel.innerHTML = CREW_MEMBERS.map(cm => `<option value="${cm.id}">${cm.name}</option>`).join('');
  document.getElementById('doDate').value = isoToday();
  document.getElementById('dayOffModal').classList.remove('hidden');
}
function closeDayOffModal() { document.getElementById('dayOffModal').classList.add('hidden'); }
function saveDayOff() {
  const crewId = document.getElementById('doCrew').value;
  const date   = document.getElementById('doDate').value;
  if (!crewId || !date) return;
  if (!calState.daysOff) calState.daysOff = [];
  if (!calState.daysOff.some(o=>o.crewId===crewId&&o.date===date)) {
    calState.daysOff.push({crewId, date});
    saveCalState();
  }
  closeDayOffModal();
  render();
  const name = CREW_MEMBERS.find(c=>c.id===crewId)?.name||crewId;
  showToast(`${name} marked off on ${new Date(date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}`);
}

// ── WEEK NAV ──────────────────────────────────────────────────────────────────
function changeWeek(dir) { weekOffset += dir; render(); updateBlockWeekBtn(); }
function goToday()       { weekOffset = 0; render(); updateBlockWeekBtn(); }

let _crewVisible = false;
function toggleCrewPanel() {
  _crewVisible = !_crewVisible;
  document.getElementById('mainLayout').classList.toggle('crew-visible', _crewVisible);
  document.getElementById('crewToggleBtn').textContent = _crewVisible ? '👥 Crew ‹' : '👥 Crew';
}

// ── BLOCKED WEEKS ─────────────────────────────────────────────────────────────
let _calBlockedWeeks = [];

async function loadBlockedWeeksCal() {
  try {
    const res = await fetch(`${PCPC_API}/blocked-weeks`);
    if (res.ok) { const d = await res.json(); _calBlockedWeeks = d.blockedWeeks || []; }
  } catch(e) {}
  updateBlockWeekBtn();
}

function getViewedWeekStart() {
  const dates = getWeekDates();
  return dates.find(d => new Date(d+'T12:00:00').getDay() === 1) || dates[1];
}

function isCurrentViewBlocked() {
  const ws = getViewedWeekStart();
  return _calBlockedWeeks.some(bw => bw.weekStart === ws);
}

function updateBlockWeekBtn() {
  const btn = document.getElementById('blockWeekBtn');
  if (!btn) return;
  const blocked = isCurrentViewBlocked();
  btn.textContent = blocked ? '✓ Week Booked' : 'Mark Booked';
  btn.className = 'block-week-btn' + (blocked ? ' is-blocked' : '');
}

async function toggleWeekBlocked() {
  const weekStart = getViewedWeekStart();
  const dates = getWeekDates();
  const fmt = d => new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const label = `${fmt(dates[0])} – ${fmt(dates[6])}`;
  const currently = isCurrentViewBlocked();
  const msg = currently
    ? `Unblock week of ${label}?\n\nCustomers will be able to request this week again on the quote form.`
    : `Mark week of ${label} as fully booked?\n\nThis week will appear as unavailable on the customer quote form.`;
  if (!confirm(msg)) return;
  if (currently) {
    _calBlockedWeeks = _calBlockedWeeks.filter(bw => bw.weekStart !== weekStart);
  } else {
    const dates7 = getWeekDates();
    _calBlockedWeeks.push({weekStart, weekEnd:dates7[dates7.length-1], blockedDate:new Date().toISOString().slice(0,10)});
  }
  updateBlockWeekBtn();
  try {
    await fetch(`${PCPC_API}/blocked-weeks`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ blockedWeeks: _calBlockedWeeks })
    });
    showToast(currently ? '✓ Week unblocked — now visible to customers' : '✓ Week marked booked — hidden from quote form');
  } catch(e) {
    showToast('⚠️ Could not save — try again');
    if (currently) _calBlockedWeeks.push({weekStart, weekEnd:getWeekDates()[6], blockedDate:new Date().toISOString().slice(0,10)});
    else _calBlockedWeeks = _calBlockedWeeks.filter(bw => bw.weekStart !== weekStart);
    updateBlockWeekBtn();
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, actionLabel, actionFn) {
  const el = document.getElementById('toast');
  undoFn = actionFn || null;
  el.innerHTML = `<span>${msg}</span>${actionLabel ? `<button class="toast-undo" onclick="(undoFn&&undoFn());document.getElementById('toast').classList.remove('show')">${actionLabel}</button>` : ''}`;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 4500);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function alertIcons(alerts) {
  if (!alerts||!alerts.length) return '';
  return '<span style="font-size:13px;margin-left:2px;">' + alerts.slice(0,3).map(a=>`<span title="${esc(a.label)}">${a.icon}</span>`).join('') + (alerts.length>3?`+${alerts.length-3}`:'') + '</span>';
}
function fmtPh(p) { return (!p||p.length!==10)?p||'':(`(${p.slice(0,3)}) ${p.slice(3,6)}-${p.slice(6)}`); }
function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
const _CITY_ABBR = { sw:'Southwest', ft:'Fort', n:'North', s:'South', e:'East', w:'West', ne:'Northeast', nw:'Northwest', se:'Southeast', sw:'Southwest' };
function formatCity(city) {
  if (!city) return '';
  return city.trim().toLowerCase().split(/\s+/).map(w => {
    const bare = w.replace(/[.,]$/,'');
    return (_CITY_ABBR[bare] || (bare.charAt(0).toUpperCase() + bare.slice(1)));
  }).join(' ');
}
