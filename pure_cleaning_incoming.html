<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Pure Cleaning · Incoming Requests</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--navy2:#111f38;--blue:#1a4a8a;--sky:#2d7dd2;--gold:#f4a620;--green:#1d9e75;--red:#e53e3e;--white:#fff;--text:#e8edf5;--muted:#7a8aaa;--border:#1e2e4a;--card:#0f1e35;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}

.back-nav{background:var(--navy2);border-bottom:1px solid var(--border);padding:6px 1.25rem;}
.back-nav a{color:var(--muted);text-decoration:none;font-size:12px;}
.back-nav a:hover{color:var(--text);}

.header{background:var(--card);border-bottom:1px solid var(--border);padding:1.25rem 1.25rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--white);letter-spacing:1px;line-height:1;}
.logo span{color:var(--gold);}
.logo-sub{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-top:3px;}
.header-badge{font-size:11px;font-weight:600;background:var(--blue);color:var(--sky);padding:3px 10px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);}
.tab{flex:1;padding:.875rem .5rem;text-align:center;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px;-webkit-tap-highlight-color:transparent;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.cnt{display:inline-flex;align-items:center;justify-content:center;background:var(--border);color:var(--muted);border-radius:10px;font-size:11px;font-weight:700;min-width:20px;height:18px;padding:0 5px;margin-left:5px;transition:all .2s;}
.tab.active .cnt{background:var(--gold);color:var(--navy);}
.cnt.urgent{background:var(--red);color:white;}

.wrap{padding:1rem;max-width:640px;margin:0 auto;}

.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;}
.refresh-info{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.refresh-btn{font-size:11px;color:var(--sky);background:none;border:none;cursor:pointer;font-weight:600;padding:4px 8px;border-radius:6px;transition:background .15s;}
.refresh-btn:hover{background:rgba(45,125,210,.1);}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-state .e-icon{font-size:40px;margin-bottom:.75rem;}
.empty-state p{font-size:14px;line-height:1.6;}

.req-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:1rem 1.125rem;margin-bottom:10px;transition:border-color .2s;}
.req-card.stale{border-color:var(--red);}

.req-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem;gap:8px;}
.req-name-wrap{display:flex;align-items:center;flex-wrap:wrap;gap:6px;}
.req-name{font-size:16px;font-weight:700;color:var(--white);}
.stale-badge{font-size:10px;font-weight:700;background:rgba(229,62,62,.15);color:var(--red);padding:2px 7px;border-radius:8px;letter-spacing:.5px;text-transform:uppercase;}
.req-time{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;font-family:'DM Mono',monospace;}

.req-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:.625rem;}
.meta-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.meta-item strong{color:var(--text);}

.svc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:5px;}
.svc-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.625rem;}
.chip{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:500;}
.chip-svc{background:rgba(45,125,210,.12);border:1px solid rgba(45,125,210,.25);color:var(--sky);}
.chip-seal{background:rgba(244,166,32,.12);border:1px solid rgba(244,166,32,.3);color:var(--gold);}
.chip-rust{background:rgba(229,62,62,.12);border:1px solid rgba(229,62,62,.3);color:#fc8181;}

.req-note{font-size:12px;color:var(--muted);background:rgba(255,255,255,.035);border-radius:8px;padding:7px 10px;margin-bottom:.5rem;line-height:1.55;}

.req-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-top:.625rem;border-top:1px solid var(--border);margin-top:.25rem;}
.btn-build{display:inline-flex;align-items:center;gap:5px;background:var(--sky);color:white;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:background .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.btn-build:hover{background:#2470c0;}
.btn-ignore{display:inline-flex;align-items:center;gap:5px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-ignore:hover{border-color:var(--red);color:var(--red);}
.btn-ignore:disabled{opacity:.5;cursor:default;}
.btn-restore{display:inline-flex;align-items:center;gap:5px;background:transparent;color:var(--green);border:1px solid rgba(29,158,117,.4);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-restore:hover{background:var(--green);color:white;border-color:var(--green);}
.btn-restore:disabled{opacity:.5;cursor:default;}
.btn-cx{margin-left:auto;font-size:11px;color:var(--muted);text-decoration:none;font-weight:500;white-space:nowrap;}
.btn-cx:hover{color:var(--sky);}

.quoted-pill{font-size:11px;color:var(--green);font-family:'DM Mono',monospace;background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.25);border-radius:6px;padding:4px 9px;white-space:nowrap;}
</style>
</head>
<body>

<div class="back-nav"><a href="/pure_cleaning_admin.html">← Admin Home</a></div>

<div class="header">
  <div>
    <div class="logo">Pure <span>Cleaning</span></div>
    <div class="logo-sub">Incoming Requests</div>
  </div>
  <div class="header-badge">Inbox</div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-new"     onclick="switchTab('new')">🔔 New <span class="cnt" id="cnt-new">0</span></div>
  <div class="tab"        id="tab-quoted"  onclick="switchTab('quoted')">✓ Quoted <span class="cnt" id="cnt-quoted">0</span></div>
  <div class="tab"        id="tab-ignored" onclick="switchTab('ignored')">🗑 Ignored <span class="cnt" id="cnt-ignored">0</span></div>
</div>

<div class="wrap" id="wrap">
  <div class="empty-state"><div class="e-icon">⏳</div><p>Loading requests…</p></div>
</div>

<script>
const INCOMING_BIN_ID     = '69f39ce0856a682189900bdc';
const JSONBIN_KEY         = '$2a$10$CPlkZPaDq7IChEHDKrwWBeF5ltP4WsR1XQgcachhQUdf2Penp7f/i';
const QUOTE_BUILDER_URL   = '/pure_cleaning_quote_builder_v2.html';
const NEW_CUSTOMER_URL    = '/pure_cleaning_new_customer.html';

let allRequests = [];
let activeTab   = 'new';
let lastRefresh = null;

// ── Service name → quote builder format ───────────────────────────
const SVC_MAP = {
  'Roof cleaning (Softwash)':                    'Roof — Softwash',
  'Roof cleaning (Traditional brush cleaning)':  'Roof — Traditional',
  'Roof cleaning (Water only pressure cleaning)':'Roof — Water Only',
  'Rinse Walls & Windows':                       'Rinse Walls',
  'Rinse walls':                                 'Rinse Walls',
  'Screen enclosure':                            'Screen Enclosure',
  'Wood fence':                                  'Fence — Wood',
  'Plastic / vinyl fence':                       'Fence — Vinyl',
  'Metal fence':                                 'Fence — Metal',
  'Pool deck':                                   'Pool Deck',
};
function mapSvc(s) { return SVC_MAP[s] || s; }

// ── Fetch ──────────────────────────────────────────────────────────
async function loadRequests(silent) {
  if (!silent) document.getElementById('wrap').innerHTML =
    '<div class="empty-state"><div class="e-icon">⏳</div><p>Loading requests…</p></div>';
  try {
    const res = await fetch('https://api.jsonbin.io/v3/b/' + INCOMING_BIN_ID, {
      mode: 'cors', headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allRequests = ((data.record || {}).requests || []);
    lastRefresh = new Date();
    renderTab();
  } catch(e) {
    if (!silent) document.getElementById('wrap').innerHTML =
      '<div class="empty-state"><div class="e-icon">❌</div><p>Failed to load. Check connection and try again.</p><button class="refresh-btn" style="margin-top:.75rem;font-size:13px;" onclick="loadRequests()">↻ Retry</button></div>';
  }
}

// ── Tabs ───────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderTab();
}

function renderTab() {
  const byStatus = s => allRequests
    .filter(r => r.status === s)
    .sort((a, b) => b.submittedAt.localeCompare(a.submittedAt));

  const newList     = byStatus('new');
  const quotedList  = byStatus('quoted').sort((a,b) => (b.quotedAt||'').localeCompare(a.quotedAt||''));
  const ignoredList = byStatus('ignored');

  setCount('new',     newList.length,     true);
  setCount('quoted',  quotedList.length,  false);
  setCount('ignored', ignoredList.length, false);

  const lists = { new: newList, quoted: quotedList, ignored: ignoredList };
  const reqs  = lists[activeTab];

  const EMPTY = {
    new:     { icon: '✅', msg: 'No new requests — you\'re all caught up!' },
    quoted:  { icon: '📋', msg: 'No quoted requests yet.' },
    ignored: { icon: '🗑', msg: 'Nothing ignored.' },
  };

  const wrap = document.getElementById('wrap');
  if (!reqs.length) {
    const e = EMPTY[activeTab];
    wrap.innerHTML = `<div class="empty-state"><div class="e-icon">${e.icon}</div><p>${e.msg}</p></div>`;
    return;
  }

  const rt = lastRefresh ? lastRefresh.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
  let html = `<div class="refresh-row"><span class="refresh-info">Updated ${rt}</span><button class="refresh-btn" onclick="loadRequests(true)">↻ Refresh</button></div>`;
  reqs.forEach(r => { html += buildCard(r); });
  wrap.innerHTML = html;
}

function setCount(tab, n, isNew) {
  const el = document.getElementById('cnt-' + tab);
  if (!el) return;
  el.textContent = String(n);
  el.className = 'cnt' + (isNew && n > 0 ? ' urgent' : '');
}

// ── Card builder ───────────────────────────────────────────────────
function buildCard(req) {
  const d       = req.customerData || {};
  const now     = Date.now();
  const age     = now - new Date(req.submittedAt);
  const isStale = req.status === 'new' && age > 48 * 3600 * 1000;
  const phone   = d.phone   || '';
  const city    = d.city    || '';

  // Services chips
  const svcs = (d.services || []);
  let chips = svcs.map(s => {
    const cls = s.toLowerCase().includes('rust') ? 'chip-rust'
              : s.toLowerCase().includes('seal') ? 'chip-seal'
              : 'chip-svc';
    return `<span class="chip ${cls}">${esc(s)}</span>`;
  }).join('');

  if (d.sealing && d.sealing.requested && d.sealing.surfaces && d.sealing.surfaces.length) {
    chips += d.sealing.surfaces.map(s => `<span class="chip chip-seal">Seal: ${esc(s)}</span>`).join('');
  }
  if (d.rustRemoval && d.rustRemoval.requested && d.rustRemoval.area) {
    chips += `<span class="chip chip-rust">Rust: ${esc(d.rustRemoval.area)}</span>`;
  }

  // Notes
  let notes = '';
  if (d.notes) notes += `<div class="req-note">📝 ${esc(d.notes)}</div>`;
  if (d.otherServices) notes += `<div class="req-note" style="margin-top:4px;">➕ Other: ${esc(d.otherServices)}</div>`;

  // Actions
  let actions = '';
  const cxUrl = `${NEW_CUSTOMER_URL}?phone=${encodeURIComponent(phone)}`;
  if (req.status === 'new') {
    const qUrl = buildQuoteUrl(req);
    actions = `
      <a href="${qUrl}" target="_blank" rel="noopener" class="btn-build">✨ Build Quote</a>
      <button class="btn-ignore" onclick="changeStatus('${req.id}','ignored',this)">🗑 Ignore</button>
      <a href="${cxUrl}" target="_blank" rel="noopener" class="btn-cx">💬 View customer →</a>`;
  } else if (req.status === 'quoted') {
    const qt = req.quotedAt
      ? new Date(req.quotedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
        new Date(req.quotedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
      : 'recently';
    actions = `
      <span class="quoted-pill">✓ Quoted ${qt}</span>
      <button class="btn-restore" onclick="changeStatus('${req.id}','new',this)">↩ Back to New</button>
      <a href="${cxUrl}" target="_blank" rel="noopener" class="btn-cx">💬 View customer →</a>`;
  } else {
    actions = `
      <button class="btn-restore" onclick="changeStatus('${req.id}','new',this)">↩ Restore</button>
      <a href="${cxUrl}" target="_blank" rel="noopener" class="btn-cx">💬 View customer →</a>`;
  }

  return `<div class="req-card${isStale ? ' stale' : ''}" id="card-${req.id}">
    <div class="req-header">
      <div class="req-name-wrap">
        <span class="req-name">${esc(d.firstName||'')} ${esc(d.lastName||'')}</span>
        ${isStale ? '<span class="stale-badge">⚠ Stale</span>' : ''}
      </div>
      <span class="req-time">${timeAgo(req.submittedAt)}</span>
    </div>
    <div class="req-meta">
      ${phone ? `<span class="meta-item">📞 <strong>${esc(phone)}</strong></span>` : ''}
      ${city  ? `<span class="meta-item">📍 <strong>${esc(city)}</strong></span>`  : ''}
      ${d.timeframe        ? `<span class="meta-item">⏰ <strong>${esc(d.timeframe)}</strong></span>` : ''}
      ${d.reminderFrequency? `<span class="meta-item">🔄 ${esc(d.reminderFrequency)}</span>` : ''}
    </div>
    ${chips ? `<div class="svc-label">Services</div><div class="svc-chips">${chips}</div>` : ''}
    ${notes}
    <div class="req-actions">${actions}</div>
  </div>`;
}

// ── Build Quote URL ────────────────────────────────────────────────
function buildQuoteUrl(req) {
  const d    = req.customerData || {};
  const svcs = (d.services || []).map(mapSvc).filter((s,i,a) => a.indexOf(s) === i).join(', ');
  try {
    const payload = JSON.stringify({
      n:     (`${d.firstName||''} ${d.lastName||''}`).trim(),
      p:     d.phone  || '',
      em:    d.email  || '',
      a:     [d.address, d.city, d.zip].filter(Boolean).join(', '),
      s:     svcs,
      notes:     d.notes     || '',
      timeframe: d.timeframe || '',
      reqId: req.id
    });
    const encoded = btoa(unescape(encodeURIComponent(payload)));
    return `${QUOTE_BUILDER_URL}?customer=${encodeURIComponent(encoded)}`;
  } catch(e) { return QUOTE_BUILDER_URL; }
}

// ── Status updates ─────────────────────────────────────────────────
async function changeStatus(id, newStatus, btn) {
  const origText = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const res = await fetch('https://api.jsonbin.io/v3/b/' + INCOMING_BIN_ID, {
      mode: 'cors', headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    const data = await res.json();
    const db   = data.record || {};
    const req  = (db.requests || []).find(r => r.id === id);
    if (req) {
      req.status = newStatus;
      if (newStatus === 'quoted' && !req.quotedAt) req.quotedAt = new Date().toISOString();
      if (newStatus === 'new') req.quotedAt = null;
    }
    await fetch('https://api.jsonbin.io/v3/b/' + INCOMING_BIN_ID, {
      method: 'PUT', mode: 'cors',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
      body: JSON.stringify(db)
    });
    allRequests = db.requests || [];
    lastRefresh = new Date();
    renderTab();
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = origText; }
    alert('Update failed — check connection and try again.');
  }
}

// ── Utils ──────────────────────────────────────────────────────────
function timeAgo(iso) {
  if (!iso) return '';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m <  1)  return 'just now';
  if (m < 60)  return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────
loadRequests();
setInterval(() => loadRequests(true), 60000);
</script>
</body>
</html>
