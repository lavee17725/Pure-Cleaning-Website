<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>New Quote — Pure Cleaning</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--sky:#2d7dd2;--gold:#f4a620;--gold-d:#c47f00;--green:#1d9e75;--red:#e53e3e;--white:#fff;--bg:#fdf8f2;--text:#1a1f2e;--muted:#6b7280;--border:#e8e2d8;--ah-bg:#fef2f2;--ah-bd:#fca5a5;--am-bg:#fffbeb;--am-bd:#fcd34d;--ai-bg:#eff6ff;--ai-bd:#93c5fd;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--navy);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:17px;font-weight:700;color:#fff;letter-spacing:.5px;}
.logo span{color:var(--gold);}
.back-link{font-size:13px;color:var(--gold);text-decoration:none;font-weight:600;}
.state{display:none;}.state.active{display:block;}
.wrap{max-width:480px;margin:0 auto;padding:1.5rem 1.25rem 5rem;}
.greeting h1{font-size:26px;font-weight:700;color:var(--navy);line-height:1.25;margin-bottom:6px;}
.greeting p{font-size:15px;color:var(--muted);}
.search-wrap{position:relative;margin:1.25rem 0 .75rem;}
.search-input{width:100%;padding:16px 20px 16px 48px;background:var(--white);border:2px solid var(--border);border-radius:16px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color .2s;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.search-input:focus{border-color:var(--sky);}
.search-input::placeholder{color:#c4b9a8;}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
.search-clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;display:none;line-height:1;padding:4px;}
.search-clear-btn.vis{display:block;}
.result-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s;box-shadow:0 1px 6px rgba(0,0,0,.05);-webkit-tap-highlight-color:transparent;}
.result-card:hover,.result-card:active{border-color:var(--sky);background:#f5f9ff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,125,210,.12);}
.rc-name{font-size:17px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.rc-detail{font-size:14px;color:var(--muted);margin-top:3px;line-height:1.6;}
.divider{display:flex;align-items:center;gap:12px;margin:1.25rem 0;}
.divider span{font-size:13px;color:var(--muted);white-space:nowrap;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.btn{min-height:52px;padding:13px 20px;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;}
.btn-gold{background:var(--gold);color:var(--navy);width:100%;}
.btn-gold:hover{background:var(--gold-d);}
.btn-gold:disabled{background:#e8e2d8;color:#b0a99a;cursor:not-allowed;}
.btn-outline{background:none;border:2px solid var(--border);color:var(--muted);width:100%;}
.btn-outline:hover{border-color:var(--sky);color:var(--sky);}
.btn-navy{background:var(--navy);color:#fff;padding:13px 18px;min-height:48px;}
.btn-sky{background:var(--sky);color:#fff;}
.back-btn{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;display:flex;align-items:center;gap:5px;margin-bottom:1.25rem;}
.back-btn:hover{color:var(--navy);}
.cust-card{background:var(--white);border:1.5px solid var(--border);border-radius:18px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.cust-name{font-size:24px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.cust-detail{font-size:15px;color:var(--muted);line-height:1.7;}
.cust-stat{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);background:#f5f0e8;border-radius:20px;padding:4px 10px;margin-top:8px;margin-right:6px;}
.shdr{display:flex;align-items:center;justify-content:space-between;margin:1.25rem 0 .75rem;}
.shdr h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.add-link{font-size:14px;font-weight:600;color:var(--sky);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;}
.alert-chip{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:12px;margin-bottom:8px;border-left:4px solid;}
.alert-chip.high{background:var(--ah-bg);border-left-color:var(--ah-bd);}
.alert-chip.medium{background:var(--am-bg);border-left-color:var(--am-bd);}
.alert-chip.info{background:var(--ai-bg);border-left-color:var(--ai-bd);}
.ac-icon{font-size:20px;flex-shrink:0;line-height:1.2;}
.ac-text{flex:1;min-width:0;}
.ac-label{font-size:14px;font-weight:600;color:var(--text);}
.ac-note{font-size:12px;color:var(--muted);margin-top:2px;}
.ac-date{font-size:11px;color:var(--muted);}
.ac-remove{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;flex-shrink:0;padding:0;line-height:1;}
.ac-remove:hover{color:var(--red);}
.notes-box{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;font-family:'DM Sans',sans-serif;font-size:15px;width:100%;resize:vertical;min-height:80px;color:var(--text);outline:none;}
.notes-box:focus{border-color:var(--sky);}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;}
.field-req{color:var(--red);margin-left:2px;}
.fi{width:100%;padding:14px 16px;background:var(--white);border:2px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--sky);}
.fi::placeholder{color:#c4b9a8;}
.fi.err{border-color:var(--red);}
.fi[readonly]{background:#f5f3ef;color:var(--muted);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.acc-btn{display:flex;align-items:center;gap:8px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--sky);cursor:pointer;padding:8px 0;}
.acc-body{display:none;}.acc-body.open{display:block;}
.dup-callout{background:#fffbeb;border:2px solid #fcd34d;border-radius:14px;padding:14px 16px;margin-bottom:1rem;display:none;}
.dup-callout.show{display:block;}
.dup-text{font-size:14px;color:#78350f;margin-bottom:10px;font-weight:500;line-height:1.5;}
.dup-row{display:flex;gap:8px;}
.dup-yes{flex:1;min-height:44px;padding:10px;background:var(--gold);color:var(--navy);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.dup-no{min-height:44px;padding:10px 14px;background:none;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);}
.action-row{display:flex;gap:10px;margin-top:1.5rem;}
.action-row .btn{flex:1;}
.success-wrap{text-align:center;padding:2.5rem 0 1.5rem;}
.s-emoji{font-size:72px;display:block;margin-bottom:1rem;animation:pop .45s ease;}
@keyframes pop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.s-title{font-size:30px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.s-sub{font-size:16px;color:var(--muted);line-height:1.6;margin-bottom:1.75rem;}
.s-actions{display:flex;flex-direction:column;gap:10px;}
.s-home{text-align:center;display:block;padding:12px;font-size:14px;color:var(--muted);font-weight:600;text-decoration:none;}
.empty-r{text-align:center;padding:1.5rem 0;}
.empty-r p{font-size:15px;color:var(--muted);}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:700;display:flex;align-items:flex-end;justify-content:center;}
.moverlay.hidden{display:none;}
.msheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:1.5rem 1.5rem 2rem;max-height:88vh;overflow-y:auto;}
.msheet-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:1rem;}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.ptile{padding:13px 10px;background:#f8f5f0;border:2px solid var(--border);border-radius:13px;cursor:pointer;text-align:center;transition:all .15s;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
.ptile:hover{border-color:var(--sky);background:#eff6ff;}
.ptile.sel.high{border-color:var(--ah-bd);background:var(--ah-bg);}
.ptile.sel.medium{border-color:var(--am-bd);background:var(--am-bg);}
.ptile.sel.info,.ptile.sel{border-color:var(--ai-bd);background:var(--ai-bg);}
.ptile-icon{font-size:22px;display:block;margin-bottom:4px;}
.ptile-label{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;}
.note-fi{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;margin-top:8px;outline:none;color:var(--text);}
.note-fi:focus{border-color:var(--sky);}
.mfoot{display:flex;gap:10px;margin-top:1.25rem;}
.mbtn-c{flex:1;padding:14px;border:2px solid var(--border);border-radius:11px;background:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;color:var(--muted);}
.mbtn-a{flex:2;padding:14px;border:none;border-radius:11px;background:var(--navy);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.mbtn-a:disabled{background:#e8e2d8;color:#b0a99a;cursor:not-allowed;}
.alert-icons-inline{display:inline-flex;align-items:center;gap:1px;font-size:14px;margin-left:4px;}
</style>
</head>
<body>

<div class="header">
  <a href="/pure_cleaning_admin.html" class="back-link">← Admin</a>
  <div class="logo">🌴 Pure <span>Cleaning</span></div>
  <div style="width:60px;"></div>
</div>

<!-- STATE 1: SEARCH -->
<div id="state-search" class="state active">
  <div class="wrap">
    <div class="greeting">
      <h1>Hey! 👋</h1>
      <p>Let's check if we already know this customer.</p>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" class="search-input" type="text" placeholder="Search by name or phone…" oninput="onSearch(this)" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="search-clear-btn" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
    <div id="searchResults"></div>
    <div class="divider"><span>— or —</span></div>
    <button class="btn btn-outline" onclick="startNew()">+ Add Brand New Customer</button>
  </div>
</div>

<!-- STATE 2A: EXISTING CUSTOMER -->
<div id="state-existing" class="state">
  <div class="wrap">
    <button class="back-btn" onclick="goSearch()">← Search again</button>
    <div id="existingContent"></div>
  </div>
</div>

<!-- STATE 2B: NEW / EDIT FORM -->
<div id="state-new" class="state">
  <div class="wrap">
    <button class="back-btn" onclick="goSearch()">← Search again</button>
    <div class="greeting" style="margin-bottom:1.25rem;">
      <h1 id="formTitle">New Customer</h1>
    </div>

    <!-- Duplicate callout -->
    <div class="dup-callout" id="dupCallout">
      <div class="dup-text" id="dupText"></div>
      <div class="dup-row">
        <button class="dup-yes" onclick="useDuplicate()">👋 Use their info →</button>
        <button class="dup-no"  onclick="skipDuplicate()">Continue as new</button>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>First name<span class="field-req">*</span></label>
        <input id="nFn" class="fi" type="text" placeholder="Karen" oninput="checkReq()">
      </div>
      <div class="field">
        <label>Last name<span class="field-req">*</span></label>
        <input id="nLn" class="fi" type="text" placeholder="Wilson" oninput="checkReq()">
      </div>
    </div>
    <div class="field">
      <label>📞 Phone<span class="field-req">*</span></label>
      <input id="nPhone" class="fi" type="tel" placeholder="(954) 555-1234" oninput="onPhoneInput(this)">
    </div>
    <div class="field">
      <label>📍 Street address<span class="field-req">*</span></label>
      <input id="nAddr" class="fi" type="text" placeholder="16621 SW 62nd St" oninput="checkReq()">
    </div>
    <div class="field">
      <label>City<span class="field-req">*</span></label>
      <input id="nCity" class="fi" type="text" placeholder="Weston" oninput="checkReq()">
    </div>

    <button class="acc-btn" onclick="toggleOpt(this)"><span id="optArrow">▶</span> More info (email, zip)</button>
    <div class="acc-body" id="optFields">
      <div class="field-row">
        <div class="field">
          <label>Email</label>
          <input id="nEmail" class="fi" type="email" placeholder="karen@email.com">
        </div>
        <div class="field">
          <label>Zip</label>
          <input id="nZip" class="fi" type="text" placeholder="33326">
        </div>
      </div>
    </div>

    <div class="shdr" style="margin-top:1.5rem;">
      <h3>⚠️ Alerts</h3>
      <button class="add-link" onclick="openChooser('new')">+ Add alert</button>
    </div>
    <div id="nAlertsList"></div>
    <p id="nAlertsEmpty" style="font-size:14px;color:var(--muted);margin-bottom:1rem;">Nothing flagged yet.</p>

    <div class="shdr">
      <h3>📝 Notes for the team</h3>
    </div>
    <textarea id="nNotes" class="notes-box" placeholder="Gate code, parking, anything the crew needs to know…"></textarea>

    <div style="margin-top:1.5rem;">
      <button id="submitBtn" class="btn btn-gold" onclick="submitForm()" disabled>✨ Send Them a Quote Link</button>
    </div>
  </div>
</div>

<!-- STATE 3: SUCCESS -->
<div id="state-success" class="state">
  <div class="wrap">
    <div class="success-wrap">
      <span class="s-emoji">✨</span>
      <div class="s-title">All set!</div>
      <div class="s-sub" id="sSub">Quote link ready to send 📲</div>
    </div>
    <div class="s-actions">
      <button class="btn btn-gold" onclick="openSms()">📱 Send Text to <span id="sName"></span></button>
      <button class="btn btn-outline" onclick="startNew()">Add Another Customer</button>
      <a href="/pure_cleaning_admin.html" class="s-home">← Back to Admin Home</a>
    </div>
  </div>
</div>

<!-- ALERT CHOOSER SHEET -->
<div class="moverlay hidden" id="alertModal" onclick="if(event.target===this)closeChooser()">
  <div class="msheet">
    <div class="msheet-title">Add an Alert</div>
    <div class="preset-grid" id="presetGrid"></div>
    <div id="noteSection" style="display:none;">
      <input id="noteInput" class="note-fi" placeholder="Add details (optional)…">
    </div>
    <div id="customSection" style="display:none;">
      <input id="customLabelInput" class="note-fi" placeholder="Alert label…">
      <input id="customNoteInput"  class="note-fi" style="margin-top:8px;" placeholder="Details (optional)…">
    </div>
    <div class="mfoot">
      <button class="mbtn-c" onclick="closeChooser()">Cancel</button>
      <button class="mbtn-a" id="addAlertBtn" onclick="confirmAlert()" disabled>Add Alert</button>
    </div>
  </div>
</div>

<script>
const JSONBIN_KEY       = '$2a$10$CPlkZPaDq7IChEHDKrwWBeF5ltP4WsR1XQgcachhQUdf2Penp7f/i';
const CUSTOMER_DB_BIN_ID = '69f2d8b6856a6821898c3bfb';
const QUOTE_BASE        = 'https://purecleaningpressurecleaning.com/pure_cleaning_quote.html';
const CHARSET           = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';

const PRESETS = [
  {type:'no_chemicals', icon:'🚫', label:'No chemicals',            severity:'high'},
  {type:'beware_dog',   icon:'⚠️', label:'Beware of dog',           severity:'high'},
  {type:'dogs_knock',   icon:'🐕', label:'Has dogs — knock first',  severity:'info'},
  {type:'plants',       icon:'🌿', label:'Sensitive plants',         severity:'medium'},
  {type:'children',     icon:'👶', label:'Children / playground',    severity:'medium'},
  {type:'gate_code',    icon:'🔒', label:'Gate code / lockbox',      severity:'info', hasNote:true},
  {type:'text_first',   icon:'📞', label:'Text first — hard to reach',severity:'info'},
  {type:'cash_only',    icon:'💵', label:'Cash / payment preference', severity:'info', hasNote:true},
  {type:'quality',      icon:'🏠', label:'Particular about quality',  severity:'info'},
  {type:'time_pref',    icon:'⏰', label:'Time preferences',          severity:'info', hasNote:true},
  {type:'health',       icon:'⚕️', label:'Health / allergy concern',  severity:'high', hasNote:true},
  {type:'custom',       icon:'✏️', label:'Custom alert',              severity:'info', hasNote:true, custom:true},
];

let dbRecord     = null;
let allCustomers = [];
let dbLoaded     = false;
let currentCustomer = null;
let isNew        = true;
let pendingAlerts = [];
let pendingSms   = '';
let chooserCtx   = 'new';
let selPreset    = null;
let dupPhone     = null;

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  buildPresetGrid();
  try {
    const res  = await fetch('https://api.jsonbin.io/v3/b/' + CUSTOMER_DB_BIN_ID, {mode:'cors',headers:{'X-Master-Key':JSONBIN_KEY}});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    dbRecord     = data.record || {};
    allCustomers = dbRecord.customers || [];
    dbLoaded     = true;
  } catch(e) {
    console.warn('DB load failed:', e.message);
    dbRecord = { customers:[] };
    allCustomers = [];
    dbLoaded = true;
  }
  // re-run search if user typed before DB finished loading
  const si = document.getElementById('searchInput');
  if (si && si.value.trim()) onSearch(si);
}

async function saveDb() {
  await fetch('https://api.jsonbin.io/v3/b/' + CUSTOMER_DB_BIN_ID, {
    method:'PUT', mode:'cors',
    headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
    body: JSON.stringify(dbRecord)
  });
}

// ── STATE ─────────────────────────────────────────────────────────────────────
function showState(name) {
  document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
  document.getElementById('state-' + name).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function goSearch() { clearSearch(); showState('search'); }

// ── SEARCH ────────────────────────────────────────────────────────────────────
function onSearch(input) {
  const q = input.value.trim();
  document.getElementById('searchClear').classList.toggle('vis', q.length > 0);
  if (!q) { document.getElementById('searchResults').innerHTML = ''; return; }
  if (!dbLoaded) { document.getElementById('searchResults').innerHTML = '<div class="empty-r"><p>Loading…</p></div>'; return; }
  const qL = q.toLowerCase(), qD = q.replace(/\D/g,'');
  const hits = allCustomers.filter(c => {
    const fn   = (c.firstName || c.fn || '').toLowerCase();
    const ln   = (c.lastName  || c.ln || '').toLowerCase();
    const full = (fn + ' ' + ln).trim();
    return full.includes(qL) || fn.includes(qL) || ln.includes(qL) || (qD && c.phone && c.phone.includes(qD)) || (c.address || '').toLowerCase().includes(qL);
  }).slice(0, 8);
  if (!hits.length) { document.getElementById('searchResults').innerHTML = '<div class="empty-r"><p>No matches — add them as a new customer.</p></div>'; return; }
  document.getElementById('searchResults').innerHTML = hits.map(c => {
    const name   = esc((((c.firstName||c.fn||'') + ' ' + (c.lastName||c.ln||'')).trim()));
    const icons  = (c.alerts||[]).slice(0,3).map(a=>`<span>${a.icon}</span>`).join('');
    const more   = (c.alerts||[]).length > 3 ? `<span style="font-size:11px;color:var(--muted)">+${(c.alerts||[]).length-3}</span>` : '';
    const lastSv = c.lastService ? friendly(c.lastService) : null;
    return `<div class="result-card" onclick="selectCustomer('${esc(c.phone)}')">
      <div class="rc-name">${name}<span class="alert-icons-inline">${icons}${more}</span></div>
      <div class="rc-detail">📞 ${fmtPh(c.phone)}${c.city ? ' · 📍 '+esc(c.city) : ''}${lastSv ? ' · '+lastSv : ''}</div>
    </div>`;
  }).join('');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('vis');
  document.getElementById('searchResults').innerHTML = '';
}

// ── EXISTING CUSTOMER ─────────────────────────────────────────────────────────
function selectCustomer(phone) {
  const c = allCustomers.find(x => x.phone === phone);
  if (!c) return;
  currentCustomer = c;
  isNew = false;
  renderExisting(c);
  showState('existing');
}

function renderExisting(c) {
  const name = esc(((c.firstName||'') + ' ' + (c.lastName||'')).trim() || '—');
  const lastSv = c.lastService ? friendly(c.lastService) : null;
  const alertsHtml = renderChips(c.alerts||[], 'existing');
  document.getElementById('existingContent').innerHTML = `
    <h1 style="font-size:22px;font-weight:700;color:var(--navy);margin-bottom:1rem;">👋 Welcome back, ${esc(c.firstName||name)}!</h1>
    <div class="cust-card">
      <div class="cust-name">${name}</div>
      <div class="cust-detail">
        📞 ${fmtPh(c.phone)}<br>
        ${c.address ? `📍 ${esc(c.address)}${c.city?', '+esc(c.city):''}<br>` : ''}
        ${lastSv ? `🗓️ Last cleaned: ${lastSv}<br>` : ''}
      </div>
      ${c.totalJobs ? `<span class="cust-stat">🧹 ${c.totalJobs} job${c.totalJobs===1?'':'s'}</span>` : ''}
      ${c.lifetimeSpend ? `<span class="cust-stat">💰 $${Number(c.lifetimeSpend).toLocaleString()} lifetime</span>` : ''}
    </div>
    <div class="shdr">
      <h3>⚠️ Alerts</h3>
      <button class="add-link" onclick="openChooser('existing')">+ Add alert</button>
    </div>
    <div id="existingAlerts">${alertsHtml || '<p style="font-size:14px;color:var(--muted);margin-bottom:1rem;">No alerts — tap + to add one.</p>'}</div>
    <div class="shdr">
      <h3>📝 Notes for the team</h3>
    </div>
    <textarea id="existingNotes" class="notes-box" placeholder="Notes for the crew…" onchange="saveNotes()">${esc(c.notes||'')}</textarea>
    <div class="action-row">
      <button class="btn btn-outline" style="flex:0 0 auto;padding:13px 18px;" onclick="editExisting()">✏️ Edit</button>
      <button class="btn btn-gold" style="flex:1;" onclick="sendExisting()">✨ Send Quote →</button>
    </div>`;
}

function renderChips(alerts, ctx) {
  if (!alerts.length) return '';
  const indexed = alerts.map((a,i)=>({a,i})).sort((x,y)=>({'high':0,'medium':1,'info':2}[x.a.severity]||2)-({'high':0,'medium':1,'info':2}[y.a.severity]||2));
  return indexed.map(({a,i})=>`
    <div class="alert-chip ${a.severity||'info'}">
      <div class="ac-icon">${a.icon}</div>
      <div class="ac-text">
        <div class="ac-label">${esc(a.label)}</div>
        ${a.note ? `<div class="ac-note">${esc(a.note)}</div>` : ''}
        <div class="ac-date">Added ${a.addedDate ? fmtD(a.addedDate) : 'recently'}</div>
      </div>
      <button class="ac-remove" onclick="removeAlert(${i},'${ctx}')" title="Remove">×</button>
    </div>`).join('');
}

function removeAlert(idx, ctx) {
  if (!confirm('Remove this alert?')) return;
  if (ctx === 'existing' && currentCustomer) {
    (currentCustomer.alerts||[]).splice(idx, 1);
    saveDb().catch(()=>{});
    renderExisting(currentCustomer);
  } else {
    pendingAlerts.splice(idx, 1);
    renderNewAlerts();
  }
}

function saveNotes() {
  if (!currentCustomer) return;
  currentCustomer.notes = document.getElementById('existingNotes').value;
  saveDb().catch(()=>{});
}

async function sendExisting() {
  const c = currentCustomer;
  if (!c) return;
  const btn = document.querySelector('#state-existing .btn-gold');
  if (btn) { btn.disabled=true; btn.textContent='Saving…'; }
  try {
    const {code, binId} = await genLink(c);
    c.linkCode = code; c.linkBin = binId;
    c.quoteStatus = { state:'sent', sentDate:today(), viewedDate:null, approvedDate:null, lostDate:null, lostReason:null, notes:null };
    await saveDb();
    showSuccess(c, `${QUOTE_BASE}?c=${binId}.${code}`, false);
  } catch(e) {
    alert('Error: ' + e.message);
    if (btn) { btn.disabled=false; btn.textContent='✨ Send Quote →'; }
  }
}

// ── NEW / EDIT FORM ───────────────────────────────────────────────────────────
function startNew() {
  currentCustomer = null;
  isNew = true;
  dupPhone = null;
  pendingAlerts = [];
  resetForm();
  document.getElementById('formTitle').textContent = 'New Customer';
  document.getElementById('nPhone').readOnly = false;
  document.getElementById('nPhone').style.cssText = '';
  showState('new');
}

function editExisting() {
  const c = currentCustomer;
  if (!c) return;
  isNew = false;
  pendingAlerts = [...(c.alerts||[])];
  document.getElementById('formTitle').textContent = 'Edit Info';
  document.getElementById('nFn').value   = c.firstName||'';
  document.getElementById('nLn').value   = c.lastName||'';
  const ph = c.phone||'';
  document.getElementById('nPhone').value = ph.length===10 ? `(${ph.slice(0,3)}) ${ph.slice(3,6)}-${ph.slice(6)}` : ph;
  document.getElementById('nPhone').readOnly = true;
  document.getElementById('nPhone').style.cssText = 'background:#f5f3ef;color:var(--muted);';
  document.getElementById('nAddr').value  = c.address||'';
  document.getElementById('nCity').value  = c.city||'';
  document.getElementById('nEmail').value = c.email||'';
  document.getElementById('nZip').value   = c.zip||'';
  document.getElementById('nNotes').value = c.notes||'';
  document.getElementById('dupCallout').classList.remove('show');
  renderNewAlerts();
  checkReq();
  showState('new');
}

function resetForm() {
  ['nFn','nLn','nPhone','nAddr','nCity','nEmail','nZip','nNotes'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value='';
  });
  document.getElementById('dupCallout').classList.remove('show');
  renderNewAlerts();
  checkReq();
}

function onPhoneInput(input) {
  const d = input.value.replace(/\D/g,'').slice(0,10);
  if (d.length >= 7) input.value = `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  else if (d.length >= 4) input.value = `(${d.slice(0,3)}) ${d.slice(3)}`;
  else input.value = d;
  checkReq();
  if (d.length !== 10 || !isNew) { document.getElementById('dupCallout').classList.remove('show'); return; }
  const dup = allCustomers.find(c => c.phone === d);
  if (dup) {
    dupPhone = d;
    document.getElementById('dupText').textContent = `👋 Looks like we already know ${dup.firstName} ${dup.lastName}! Tap below to use their info, or continue.`;
    document.getElementById('dupCallout').classList.add('show');
  } else {
    dupPhone = null;
    document.getElementById('dupCallout').classList.remove('show');
  }
}

function useDuplicate() {
  const c = allCustomers.find(x => x.phone === dupPhone);
  if (!c) return;
  selectCustomer(c.phone);
}
function skipDuplicate() {
  dupPhone = null;
  document.getElementById('dupCallout').classList.remove('show');
}

function checkReq() {
  const fn   = (document.getElementById('nFn').value||'').trim();
  const ln   = (document.getElementById('nLn').value||'').trim();
  const ph   = (document.getElementById('nPhone').value||'').replace(/\D/g,'');
  const addr = (document.getElementById('nAddr').value||'').trim();
  const city = (document.getElementById('nCity').value||'').trim();
  const btn  = document.getElementById('submitBtn');
  if (btn) btn.disabled = !(fn && ln && ph.length===10 && addr && city);
}

function renderNewAlerts() {
  const list  = document.getElementById('nAlertsList');
  const empty = document.getElementById('nAlertsEmpty');
  if (!list) return;
  if (!pendingAlerts.length) { list.innerHTML=''; if(empty) empty.style.display='block'; return; }
  if (empty) empty.style.display='none';
  list.innerHTML = pendingAlerts.map((a,i)=>`
    <div class="alert-chip ${a.severity||'info'}">
      <div class="ac-icon">${a.icon}</div>
      <div class="ac-text">
        <div class="ac-label">${esc(a.label)}</div>
        ${a.note ? `<div class="ac-note">${esc(a.note)}</div>` : ''}
      </div>
      <button class="ac-remove" onclick="removeAlert(${i},'new')">×</button>
    </div>`).join('');
}

async function submitForm() {
  const btn  = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const fn   = document.getElementById('nFn').value.trim();
  const ln   = document.getElementById('nLn').value.trim();
  const ph   = document.getElementById('nPhone').value.replace(/\D/g,'');
  const addr = document.getElementById('nAddr').value.trim();
  const city = document.getElementById('nCity').value.trim();
  const email= document.getElementById('nEmail').value.trim();
  const zip  = document.getElementById('nZip').value.trim();
  const notes= document.getElementById('nNotes').value.trim();
  try {
    let customer;
    if (!isNew && currentCustomer) {
      customer = (dbRecord.customers||[]).find(c=>c.phone===currentCustomer.phone);
      if (customer) { customer.firstName=fn; customer.lastName=ln; customer.address=addr; customer.city=city; if(email)customer.email=email; if(zip)customer.zip=zip; customer.notes=notes; customer.alerts=[...pendingAlerts]; }
    } else {
      customer = { phone:ph, firstName:fn, lastName:ln, address:addr, city, email, zip, notes, lastService:null, totalJobs:0, lifetimeSpend:0, hasSealHistory:false, linkCode:null, linkBin:null, lastTextedDate:null, alerts:[...pendingAlerts], quoteStatus:null };
      if (!dbRecord.customers) dbRecord.customers=[];
      dbRecord.customers.push(customer);
      allCustomers.push(customer);
    }
    const {code, binId} = await genLink(customer);
    customer.linkCode = code; customer.linkBin = binId;
    customer.quoteStatus = { state:'sent', sentDate:today(), viewedDate:null, approvedDate:null, lostDate:null, lostReason:null, notes:null };
    await saveDb();
    showSuccess(customer, `${QUOTE_BASE}?c=${binId}.${code}`, isNew);
  } catch(e) {
    alert('Error: ' + e.message);
    btn.disabled=false; btn.textContent='✨ Send Them a Quote Link';
  }
}

// ── LINK GENERATION ───────────────────────────────────────────────────────────
function generateCode() {
  let c=''; for(let i=0;i<5;i++) c+=CHARSET[Math.floor(Math.random()*CHARSET.length)]; return c;
}

async function genLink(customer) {
  if (customer.linkCode && customer.linkBin) return {code:customer.linkCode, binId:customer.linkBin};
  const rec = {fn:customer.firstName, ln:customer.lastName, ph:customer.phone, em:customer.email||'', addr:customer.address, city:customer.city, zip:customer.zip||'', lastService:customer.lastService, totalJobs:customer.totalJobs, lifetimeSpend:customer.lifetimeSpend, created:new Date().toISOString()};
  let code = generateCode(), binId;
  const existId = localStorage.getItem('pcpc_customer_links_bin_id');
  if (existId) {
    binId = existId;
    const gr = await fetch('https://api.jsonbin.io/v3/b/'+binId, {mode:'cors',headers:{'X-Master-Key':JSONBIN_KEY}});
    const gd = await gr.json();
    const records = gd.record||{};
    let t=0; do{code=generateCode();t++;}while(records[code]&&t<200);
    records[code] = rec;
    await fetch('https://api.jsonbin.io/v3/b/'+binId, {method:'PUT',mode:'cors',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify(records)});
  } else {
    const res  = await fetch('https://api.jsonbin.io/v3/b', {method:'POST',mode:'cors',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Private':'false','X-Bin-Name':'PureCleaningCustomerLinks'},body:JSON.stringify({[code]:rec})});
    const data = await res.json();
    if (!data.metadata?.id) throw new Error('Could not create bin: ' + JSON.stringify(data));
    binId = data.metadata.id;
    localStorage.setItem('pcpc_customer_links_bin_id', binId);
  }
  return {code, binId};
}

// ── SUCCESS ───────────────────────────────────────────────────────────────────
function showSuccess(customer, link, isNewCustomer) {
  const fn = customer.firstName||'there';
  const body = isNewCustomer
    ? `Hey ${fn}! It's Tyler — Darla and Tony's son with Pure Cleaning. Thanks for calling us today!\n\nI built a simple new way for you to get a quote — your info is already filled in here:\n${link}\n\nJust tap to confirm what you'd like cleaned and we'll send pricing same day 🙏\n\n— Tyler\n954-389-2642\n\nReply STOP to opt out.`
    : `Hey ${fn}! It's Tyler — Darla and Tony's son with Pure Cleaning. Always great to hear from you!\n\nI built a simple new way to get quotes — your info is already filled in here:\n${link}\n\nJust tap to confirm what you'd like cleaned today 🙏\n\n— Tyler\n954-389-2642\n\nReply STOP to opt out.`;
  const smsPhone = '+1' + (customer.phone||'').replace(/\D/g,'');
  pendingSms = `sms:${smsPhone}?&body=${encodeURIComponent(body)}`;
  const name = ((customer.firstName||'') + ' ' + (customer.lastName||'')).trim();
  document.getElementById('sName').textContent = name;
  document.getElementById('sSub').textContent = `${name}'s quote link is ready to send 📲`;
  showState('success');
}
function openSms() { if (pendingSms) window.location.href = pendingSms; }

// ── ALERT CHOOSER ─────────────────────────────────────────────────────────────
function buildPresetGrid() {
  document.getElementById('presetGrid').innerHTML = PRESETS.map((p,i)=>`
    <div class="ptile ${p.severity}" data-i="${i}" onclick="pickPreset(${i},this)">
      <span class="ptile-icon">${p.icon}</span>
      <span class="ptile-label">${p.label}</span>
    </div>`).join('');
}

function openChooser(ctx) {
  chooserCtx = ctx; selPreset = null;
  document.querySelectorAll('.ptile').forEach(t=>t.classList.remove('sel'));
  document.getElementById('noteSection').style.display='none';
  document.getElementById('customSection').style.display='none';
  document.getElementById('noteInput').value='';
  document.getElementById('customLabelInput').value='';
  document.getElementById('customNoteInput').value='';
  document.getElementById('addAlertBtn').disabled=true;
  document.getElementById('alertModal').classList.remove('hidden');
}
function closeChooser() { document.getElementById('alertModal').classList.add('hidden'); }

function pickPreset(idx, tile) {
  document.querySelectorAll('.ptile').forEach(t=>t.classList.remove('sel'));
  tile.classList.add('sel');
  selPreset = PRESETS[idx];
  document.getElementById('noteSection').style.display = (!selPreset.custom && selPreset.hasNote) ? 'block' : 'none';
  document.getElementById('customSection').style.display = selPreset.custom ? 'block' : 'none';
  if (!selPreset.custom && selPreset.hasNote) document.getElementById('noteInput').focus();
  if (selPreset.custom) document.getElementById('customLabelInput').focus();
  document.getElementById('addAlertBtn').disabled = false;
}

function confirmAlert() {
  if (!selPreset) return;
  let alert;
  if (selPreset.custom) {
    const lbl = document.getElementById('customLabelInput').value.trim();
    if (!lbl) { document.getElementById('customLabelInput').focus(); return; }
    alert = {type:'custom', icon:'✏️', label:lbl, severity:'info', note:document.getElementById('customNoteInput').value.trim(), addedDate:today()};
  } else {
    alert = {type:selPreset.type, icon:selPreset.icon, label:selPreset.label, severity:selPreset.severity, note:selPreset.hasNote?document.getElementById('noteInput').value.trim():'', addedDate:today()};
  }
  if (chooserCtx==='existing' && currentCustomer) {
    if (!currentCustomer.alerts) currentCustomer.alerts=[];
    currentCustomer.alerts.push(alert);
    saveDb().catch(()=>{});
    renderExisting(currentCustomer);
  } else {
    pendingAlerts.push(alert);
    renderNewAlerts();
  }
  closeChooser();
}

// ── OPTIONAL ACCORDION ────────────────────────────────────────────────────────
function toggleOpt(btn) {
  const body = document.getElementById('optFields');
  const open = body.classList.toggle('open');
  document.getElementById('optArrow').textContent = open ? '▼' : '▶';
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function today()   { return new Date().toISOString().split('T')[0]; }
function fmtPh(p)  { return (!p||p.length!==10)?p||'—':`(${p.slice(0,3)}) ${p.slice(3,6)}-${p.slice(6)}`; }
function fmtD(d)   { return d?new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—'; }
function esc(s)    { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function friendly(iso) {
  if (!iso) return '—';
  const mo = Math.round((Date.now()-new Date(iso+'T12:00:00'))/(1000*60*60*24*30.44));
  if (mo < 1) return 'this month';
  if (mo < 12) return `${mo} month${mo===1?'':'s'} ago`;
  const yr = Math.round(mo/12);
  return `${yr} year${yr===1?'':'s'} ago`;
}
