<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Nudge Queue — Pure Cleaning</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--sky:#2d7dd2;--gold:#f4a620;--green:#1d9e75;--red:#dc2626;--terra:#c2410c;--white:#fff;--bg:#fdf8f2;--text:#1a1f2e;--muted:#6b7280;--border:#e8e2d8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--navy);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
.back-link{font-size:13px;color:var(--gold);text-decoration:none;font-weight:600;min-width:60px;}
.header-logo{font-size:17px;font-weight:700;color:#fff;}
.header-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;text-align:center;}
.header-right{min-width:60px;text-align:right;}
.wrap{max-width:520px;margin:0 auto;padding:1.5rem 1.25rem 6rem;}

/* Summary row */
.summary-row{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
.summary-chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid;}
.chip-nudge{background:#fff7ed;color:#c2410c;border-color:#fed7aa;}
.chip-second{background:#fef9c3;color:#854d0e;border-color:#fde047;}
.chip-verbal{background:#f0fdf4;color:var(--green);border-color:#86efac;}
.chip-stale{background:#f8f9fb;color:var(--muted);border-color:var(--border);}

/* Loading / error / all-clear */
.center-msg{text-align:center;padding:4rem 1.5rem;}
.center-msg .icon{font-size:48px;margin-bottom:.75rem;}
.center-msg h2{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:.375rem;}
.center-msg p{font-size:14px;color:var(--muted);}

/* Section headers */
.queue-section{margin-bottom:2rem;}
.q-hdr{margin-bottom:.875rem;}
.q-hdr-main{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.q-hdr-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.q-hdr-count{font-size:11px;font-weight:700;color:#fff;background:var(--terra);border-radius:10px;padding:2px 8px;}
.q-hdr-count.green{background:var(--green);}
.q-hdr-count.gray{background:var(--muted);}
.q-hdr-sub{font-size:12px;color:var(--muted);}

/* Customer cards */
.nq-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:1rem 1.125rem;margin-bottom:.75rem;}
.nq-card.nq-verbal{border-color:#86efac;background:#f0fdf4;}
.nq-card.nq-stale{opacity:.8;}
.nq-name{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.nq-meta{font-size:12px;color:var(--muted);margin-bottom:3px;}
.nq-services{font-size:13px;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nq-amount{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.nq-age{font-size:12px;font-weight:600;color:var(--terra);}
.nq-age.muted{color:var(--muted);}
.nq-verbal-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--green);background:rgba(29,158,117,.08);border:1px solid rgba(29,158,117,.25);border-radius:20px;padding:3px 10px;margin-top:.5rem;}
.nq-reminder-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--muted);background:#f8f9fb;border:1px solid var(--border);border-radius:20px;padding:2px 8px;margin-top:.25rem;}
.nq-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:.875rem;}
.nq-btn{padding:9px 14px;border:1.5px solid transparent;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.nq-btn-reminder{background:var(--sky);color:#fff;border-color:var(--sky);}
.nq-btn-reminder:active{background:#2470c0;}
.nq-btn-verbal{background:#f0fdf4;color:var(--green);border-color:#86efac;}
.nq-btn-verbal:active{background:#dcfce7;}
.nq-btn-lost{background:#fff;color:var(--red);border-color:#fecaca;}
.nq-btn-lost:active{background:#fef2f2;}
.nq-btn-skip{background:#f8f9fb;color:var(--muted);border-color:var(--border);}
.nq-btn-skip:active{background:#f0f0f0;}

/* Verbal confirm bottom sheet */
.moverlay{position:fixed;inset:0;background:rgba(10,22,40,.5);z-index:1000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.moverlay.open{opacity:1;pointer-events:all;}
.msheet{background:#fff;border-radius:20px 20px 0 0;padding:1.25rem 1.5rem 2.5rem;width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s cubic-bezier(0.32,0.72,0,1);}
.moverlay.open .msheet{transform:translateY(0);}
.mhandle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.125rem;}
.mtitle{font-size:18px;font-weight:700;color:var(--text);margin-bottom:.375rem;}
.msub{font-size:13px;color:var(--muted);margin-bottom:1rem;line-height:1.5;}
.mlabel{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;}
.minput{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;margin-bottom:1.25rem;transition:border-color .15s;}
.minput:focus{border-color:var(--sky);}
.mfoot{display:flex;gap:.75rem;}
.mbtn-cancel{flex:1;padding:.875rem;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;}
.mbtn-confirm{flex:2;padding:.875rem;background:var(--navy);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:12px;cursor:pointer;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.3);transition:transform .3s ease;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="header">
  <a href="/pure_cleaning_admin.html" class="back-link">← Admin</a>
  <div>
    <div class="header-logo">📬 Nudge Queue</div>
    <div class="header-sub">Pending confirmations</div>
  </div>
  <div class="header-right"></div>
</div>

<div class="wrap" id="mainWrap">
  <div class="center-msg"><div class="icon">⏳</div><h2>Loading…</h2></div>
</div>

<div class="toast" id="toast"></div>

<!-- Verbal Confirm Modal -->
<div class="moverlay" id="verbalModal" onclick="if(event.target===this)closeVerbalModal()">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtitle" id="verbalModalTitle">Mark confirmed verbally?</div>
    <div class="msub">Marks this customer as confirmed without them tapping the agreement link. Auto-reminder will be disabled.</div>
    <label class="mlabel">Scheduled date (optional)</label>
    <input type="date" id="verbalDateInput" class="minput">
    <div class="mfoot">
      <button class="mbtn-cancel" onclick="closeVerbalModal()">Cancel</button>
      <button class="mbtn-confirm" onclick="submitVerbalConfirm()">Mark Confirmed</button>
    </div>
  </div>
</div>

<script>
const PCPC_API = 'https://purecleaning-api.tylerfumero.workers.dev';
let _verbalPhone = null;
let _verbalName  = '';

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res  = await fetch(`${PCPC_API}/nudge-queue`);
    if (!res.ok) throw new Error('Failed to load');
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('mainWrap').innerHTML = `<div class="center-msg"><div class="icon">⚠️</div><h2>Error</h2><p>${esc(e.message)}</p></div>`;
  }
}

async function loadQueue() {
  const wrap = document.getElementById('mainWrap');
  if (wrap) wrap.innerHTML = '<div class="center-msg"><div class="icon">⏳</div><h2>Refreshing…</h2></div>';
  await init();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(data) {
  const { needsNudge=[], secondNudge=[], agreedVerbally=[], stale=[], totalCount=0 } = data;
  const wrap = document.getElementById('mainWrap');

  if (totalCount === 0 && !agreedVerbally.length) {
    wrap.innerHTML = `<div class="center-msg"><div class="icon" style="font-size:56px;color:var(--green);">✓</div><h2>All clear!</h2><p>No pending follow-ups right now.</p></div>`;
    return;
  }

  // Summary chips
  let html = `<div class="summary-row">`;
  if (needsNudge.length)    html += `<div class="summary-chip chip-nudge">📬 ${needsNudge.length} need nudge</div>`;
  if (secondNudge.length)   html += `<div class="summary-chip chip-second">🔔 ${secondNudge.length} 2nd nudge</div>`;
  if (agreedVerbally.length) html += `<div class="summary-chip chip-verbal">✓ ${agreedVerbally.length} verbal</div>`;
  if (stale.length)         html += `<div class="summary-chip chip-stale">⚠️ ${stale.length} stale</div>`;
  html += `</div>`;

  if (needsNudge.length)    html += renderSection('Needs Nudge',     'Sent 48+ hrs ago · no response · no reminder sent', needsNudge,    'needs');
  if (secondNudge.length)   html += renderSection('Second Nudge',    '7+ days · 1st reminder sent · still no response',    secondNudge,   'second');
  if (agreedVerbally.length) html += renderSection('Agreed Verbally','Confirmed over the phone by Mom',                    agreedVerbally,'verbal');
  if (stale.length)         html += renderSection('Stale',           '14+ days with no response',                          stale,         'stale');

  wrap.innerHTML = html;
}

function renderSection(title, subtitle, customers, type) {
  const countClass = type === 'verbal' ? 'green' : type === 'stale' ? 'gray' : '';
  const cardFns = { needs: needsCard, second: secondCard, verbal: verbalCard, stale: staleCard };
  return `<div class="queue-section">
    <div class="q-hdr">
      <div class="q-hdr-main">
        <span class="q-hdr-title">${esc(title)}</span>
        <span class="q-hdr-count ${countClass}">${customers.length}</span>
      </div>
      <div class="q-hdr-sub">${esc(subtitle)}</div>
    </div>
    ${customers.map(cardFns[type]).join('')}
  </div>`;
}

function cardInfo(c) {
  const qs = c.quoteStatus || {};
  const ss = c.scheduledStatus || {};
  const name     = esc(((c.firstName||'') + ' ' + (c.lastName||'')).trim() || '—');
  const city     = c.city ? `<span style="color:var(--muted);font-weight:400;"> · ${esc(c.city)}</span>` : '';
  const phone    = fmtPhone(c.phone || '');
  const services = esc(qs.mainServices || qs.notes || ss.jobNotes || '—');
  const amount   = ss.approvedAmount || qs.approvedAmount || qs.mainAmount || 0;
  const ts       = qs.sentAt || qs.sentDate;
  const age      = ts ? ageLabel(ts) : '';
  const ph       = (c.phone||'').replace(/\D/g,'').slice(-10);
  return { name, city, phone, services, amount, age, ph, qs, ss };
}

function needsCard(c) {
  const { name, city, phone, services, amount, age, ph } = cardInfo(c);
  return `<div class="nq-card">
    <div class="nq-name">${name}${city}</div>
    <div class="nq-meta">📞 ${phone}</div>
    <div class="nq-services">${services}</div>
    ${amount ? `<div class="nq-amount">$${amount}</div>` : ''}
    ${age    ? `<div class="nq-age">⏰ Sent ${age}</div>` : ''}
    <div class="nq-btns">
      <button class="nq-btn nq-btn-reminder" onclick="sendReminder('${ph}','${esc(c.firstName||'')}','first')">📱 Send Reminder</button>
      <button class="nq-btn nq-btn-verbal"   onclick="openVerbalModal('${ph}','${name}')">✓ Verbal Confirm</button>
      <button class="nq-btn nq-btn-skip"     onclick="skipReminder('${ph}')">🔕 Skip</button>
    </div>
  </div>`;
}

function secondCard(c) {
  const { name, city, phone, services, amount, age, ph, qs } = cardInfo(c);
  const lastReminder = (qs.remindersSent||[]).slice(-1)[0];
  const lastSentLabel = lastReminder ? `1st reminder sent ${ageLabel(lastReminder.sentAt)}` : '';
  return `<div class="nq-card">
    <div class="nq-name">${name}${city}</div>
    <div class="nq-meta">📞 ${phone}</div>
    <div class="nq-services">${services}</div>
    ${amount ? `<div class="nq-amount">$${amount}</div>` : ''}
    ${age    ? `<div class="nq-age">⏰ Sent ${age}</div>` : ''}
    ${lastSentLabel ? `<div class="nq-reminder-badge">📤 ${esc(lastSentLabel)}</div>` : ''}
    <div class="nq-btns">
      <button class="nq-btn nq-btn-reminder" onclick="sendReminder('${ph}','${esc(c.firstName||'')}','second')">📱 Send 2nd Reminder</button>
      <button class="nq-btn nq-btn-verbal"   onclick="openVerbalModal('${ph}','${name}')">✓ Verbal</button>
      <button class="nq-btn nq-btn-lost"     onclick="markLost('${ph}','${name}')">✗ Mark Lost</button>
    </div>
  </div>`;
}

function verbalCard(c) {
  const { name, city, phone, services, amount, ss, qs } = cardInfo(c);
  const sDate = ss.scheduledDate || qs.confirmedDate || '';
  const dateLabel = sDate
    ? new Date(sDate + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'})
    : 'Date TBD';
  return `<div class="nq-card nq-verbal">
    <div class="nq-name">${name}${city}</div>
    <div class="nq-meta">📞 ${phone}</div>
    <div class="nq-services">${services}</div>
    ${amount ? `<div class="nq-amount">$${amount}</div>` : ''}
    <div class="nq-verbal-badge">✓ Verbally confirmed · ${esc(dateLabel)}</div>
  </div>`;
}

function staleCard(c) {
  const { name, city, phone, services, amount, age, ph } = cardInfo(c);
  return `<div class="nq-card nq-stale">
    <div class="nq-name">${name}${city}</div>
    <div class="nq-meta">📞 ${phone}</div>
    <div class="nq-services">${services}</div>
    ${amount ? `<div class="nq-amount">$${amount}</div>` : ''}
    ${age    ? `<div class="nq-age muted">📅 Sent ${age}</div>` : ''}
    <div class="nq-btns">
      <button class="nq-btn nq-btn-reminder" onclick="sendReminder('${ph}','${esc(c.firstName||'')}','first')">📱 Last Try</button>
      <button class="nq-btn nq-btn-lost"     onclick="markLost('${ph}','${name}')">✗ Mark Lost</button>
    </div>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function sendReminder(phone, firstName, type) {
  const fn = firstName || 'there';
  const template = type === 'second'
    ? `Hi ${fn}! One more follow-up on your Pure Cleaning quote — happy to answer questions or get you scheduled. Give us a call at 954-389-2642 or just reply here. — Pure Cleaning`
    : `Hi ${fn}! Just checking in — did you get the Pure Cleaning quote we sent? Any questions or ready to schedule? — Pure Cleaning Family 📞 954-389-2642`;

  // Log reminder (fire and forget), then reload
  fetch(`${PCPC_API}/agreement/${phone}/log-reminder`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ type })
  }).then(() => setTimeout(loadQueue, 1500)).catch(() => {});

  const a = document.createElement('a');
  a.href = `sms:+1${phone}?&body=${encodeURIComponent(template)}`;
  a.click();
}

async function skipReminder(phone) {
  try {
    await fetch(`${PCPC_API}/agreement/${phone}/skip-reminder`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ skip: true })
    });
    showToast('🔕 Auto-reminder disabled');
    setTimeout(loadQueue, 400);
  } catch(e) { alert('Error: ' + e.message); }
}

function openVerbalModal(phone, name) {
  _verbalPhone = phone;
  _verbalName  = name;
  document.getElementById('verbalModalTitle').textContent = `Mark ${name} confirmed?`;
  document.getElementById('verbalDateInput').value = '';
  document.getElementById('verbalDateInput').min = '';
  document.getElementById('verbalModal').classList.add('open');
}

function closeVerbalModal() {
  document.getElementById('verbalModal').classList.remove('open');
}

async function submitVerbalConfirm() {
  if (!_verbalPhone) return;
  const scheduledDate = document.getElementById('verbalDateInput').value || null;
  closeVerbalModal();
  try {
    await fetch(`${PCPC_API}/agreement/${_verbalPhone}/manual-confirm`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ scheduledDate })
    });
    showToast(`✓ ${_verbalName} marked as verbally confirmed`);
    setTimeout(loadQueue, 400);
  } catch(e) { alert('Error: ' + e.message); }
}

async function markLost(phone, name) {
  if (!confirm(`Mark ${name} as lost?`)) return;
  try {
    const res = await fetch(`${PCPC_API}/customers`);
    const db  = await res.json();
    const norm = p => (p||'').replace(/\D/g,'').slice(-10);
    const cust = (db.customers||[]).find(c => norm(c.phone) === norm(phone));
    if (!cust) throw new Error('Customer not found');
    cust.quoteStatus = { ...(cust.quoteStatus||{}), state:'lost', lostDate:new Date().toISOString().slice(0,10), lostReason:'no response' };
    await fetch(`${PCPC_API}/customers`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(db) });
    showToast(`✓ ${name} marked as lost`);
    setTimeout(loadQueue, 400);
  } catch(e) { alert('Error: ' + e.message); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function ageLabel(ts) {
  const ms   = Date.now() - new Date(ts).getTime();
  const days = Math.floor(ms / 86400000);
  const hrs  = Math.floor(ms / 3600000);
  if (days >= 1) return days === 1 ? '1 day ago' : `${days} days ago`;
  return hrs <= 1 ? 'just now' : `${hrs}h ago`;
}

function fmtPhone(p) {
  const d = (p||'').replace(/\D/g,'').slice(-10);
  return d.length === 10 ? `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}` : p || '—';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
