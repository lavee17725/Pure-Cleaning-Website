name = "purecleaning-api"
main = "src/index.js"
compatibility_date = "2026-05-01"
account_id = "ffe39f1ca6f7d9685b881c704c7ae51a"
# DEPLOY: cd cloudflare-worker && npx wrangler deploy
# (or from project root: npx wrangler deploy --config cloudflare-worker/wrangler.toml)

# ── Static asset serving (HTML + public files) ──────────────────────────────
# html_handling="none" serves .html files at their exact paths without 307 redirect
[assets]
binding = "ASSETS"
directory = "../build"
html_handling = "none"

[[kv_namespaces]]
binding = "DATA"
id = "76a0da4d65264885b06ed1f1aa25e27d"

# ── R2 backup bucket ──────────────────────────────────────────────────────────
# SETUP REQUIRED before deploying: create R2 bucket "pure-cleaning-backups" in
# Cloudflare dashboard → R2 → Create bucket, then uncomment the block below.
# R2 cost: $0.015/GB-month storage (10GB free), $4.50/M writes (1M free)
# At ~25MB/backup × 365 days ≈ 9GB/year — well within free tier.
#
# [[r2_buckets]]
# binding = "BACKUPS"
# bucket_name = "pure-cleaning-backups"

[vars]
ENVIRONMENT = "production"

# ── Crons ────────────────────────────────────────────────────────────────────
# "0 3 * * *"  = 3 AM UTC daily   — Bouncie job duration matcher
# "0 4 * * *"  = 4 AM UTC daily   — nightly R2 backup
# "0 4 * * 1"  = 4 AM UTC Monday  — weekly Google Drive export
[triggers]
crons = ["0 3 * * *", "0 4 * * *", "0 4 * * 1"]
