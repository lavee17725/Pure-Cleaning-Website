<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="/js/error-tracker.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Pure Cleaning · Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--navy2:#111f38;--sky:#2d7dd2;--gold:#f4a620;--green:#1d9e75;--red:#dc2626;--white:#fff;--bg:#fafaf7;--text:#1a1f2e;--muted:#6b7280;--border:#e8e2d8;--card:#fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:var(--navy2);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px;box-shadow:0 24px 64px rgba(0,0,0,.5);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);letter-spacing:1px;text-align:center;margin-bottom:4px;}
.logo span{color:var(--gold);}
.sub{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--muted);text-align:center;margin-bottom:2rem;}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
input[type=password]{width:100%;padding:.75rem 1rem;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:8px;color:var(--white);font-size:16px;font-family:inherit;outline:none;transition:border-color .2s;}
input[type=password]:focus{border-color:var(--gold);}
input[type=password]::placeholder{color:rgba(255,255,255,.3);}
.btn{width:100%;margin-top:1.25rem;padding:.875rem;background:var(--gold);color:var(--navy);font-size:15px;font-weight:700;border:none;border-radius:8px;cursor:pointer;letter-spacing:.5px;transition:opacity .15s;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.5;cursor:default;}
.msg{margin-top:1rem;font-size:13px;text-align:center;min-height:20px;}
.msg.error{color:#f87171;}
.msg.success{color:#34d399;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Pure <span>Cleaning</span></div>
  <div class="sub">Admin Access</div>
  <form id="loginForm">
    <label for="pw">Password</label>
    <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password" autofocus>
    <button type="submit" class="btn" id="btn">Sign In</button>
  </form>
  <div class="msg" id="msg"></div>
</div>

<script>
const API = 'https://purecleaning-api.tylerfumero.workers.dev';

// Already logged in?
(function() {
  var t = localStorage.getItem('admin_token');
  var e = +(localStorage.getItem('admin_token_expires') || 0);
  if (t && Date.now() < e) {
    var ret = new URLSearchParams(location.search).get('return') || '/pure_cleaning_calendar.html';
    location.replace(ret);
  }
})();

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('btn');
  var msg = document.getElementById('msg');
  var pw  = document.getElementById('pw').value;

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  msg.className = 'msg';
  msg.textContent = '';

  try {
    var res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Origin': 'https://purecleaningpressurecleaning.com' },
      body: JSON.stringify({ password: pw }),
    });

    if (res.status === 429) {
      msg.className = 'msg error';
      msg.textContent = 'Too many attempts. Wait 1 minute and try again.';
      return;
    }

    if (!res.ok) {
      msg.className = 'msg error';
      msg.textContent = 'Incorrect password.';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
      return;
    }

    var data = await res.json();
    localStorage.setItem('admin_token', data.token);
    localStorage.setItem('admin_token_expires', String(data.expiresAt));

    msg.className = 'msg success';
    msg.textContent = '✓ Signed in';

    var ret = new URLSearchParams(location.search).get('return') || '/pure_cleaning_calendar.html';
    setTimeout(function() { location.replace(ret); }, 200);

  } catch (err) {
    msg.className = 'msg error';
    msg.textContent = 'Connection error. Check your internet and try again.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
