<!DOCTYPE html>
<!--
  TEMP — Visual review UI for May 25 Person duplicate audit.
  Tier 2 + 3 candidates only (Tier 1 already merged via direct SQL).
  Remove or generalize after Tyler completes all reviews.
  Audit reference: Drive doc 1-4moJ5JWjJTB9z8ASN957to9Qv3lXewu
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Duplicate Person Review — Pure Cleaning</title>
<style>
  :root{--navy:#1a2744;--sky:#3b82f6;--gold:#f59e0b;--green:#16a34a;--red:#dc2626;--border:#e8e1d8;--bg:#f9f6f0;--white:#fff;--muted:#6b7280;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:#1a1a1a;padding:20px;}
  h1{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:4px;}
  .sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
  .progress{font-size:13px;font-weight:600;color:var(--sky);margin-bottom:16px;background:#eff6ff;padding:8px 12px;border-radius:8px;display:inline-block;}
  .card{background:var(--white);border:2px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;transition:opacity .2s;}
  .card.resolved{opacity:.45;border-color:#d1d5db;}
  .card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .card-name{font-size:17px;font-weight:700;color:var(--navy);}
  .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;}
  .badge-place{background:#dcfce7;color:#15803d;}
  .badge-dist{background:#fef9c3;color:#854d0e;}
  .badge-merged{background:#dcfce7;color:#15803d;}
  .badge-skipped{background:#f3f4f6;color:var(--muted);}
  .pair{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .rec{background:#f9f6f0;border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;}
  .rec.canonical-highlight{border-color:#86efac;background:#f0fdf4;}
  .rec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;}
  .phone{font-size:15px;font-weight:700;font-family:monospace;color:var(--navy);}
  .phone-diff{color:var(--red);}
  .prop-row{font-size:12px;color:#374151;margin-top:6px;line-height:1.5;}
  .prop-shared{color:var(--green);font-weight:600;}
  .job-row{font-size:12px;color:#374151;margin-top:4px;}
  .job-total{font-size:12px;font-weight:700;margin-top:6px;color:var(--navy);}
  .meta{font-size:11px;color:var(--muted);margin-top:6px;}
  .actions{display:flex;gap:8px;flex-wrap:wrap;}
  .btn{padding:9px 16px;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:background .1s;}
  .btn-a{background:#1d4ed8;color:#fff;}
  .btn-a:hover{background:#1e40af;}
  .btn-b{background:#0891b2;color:#fff;}
  .btn-b:hover{background:#0e7490;}
  .btn-skip{background:#e5e7eb;color:#374151;}
  .btn-skip:hover{background:#d1d5db;}
  .btn:disabled{opacity:.5;cursor:default;}
  .result-stamp{font-size:13px;font-weight:700;padding:6px 12px;border-radius:8px;display:inline-block;}
  .stamp-merged{background:#dcfce7;color:#15803d;}
  .stamp-skipped{background:#f3f4f6;color:var(--muted);}
  .err{color:var(--red);font-size:12px;margin-top:6px;}
  .tier-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:20px 0 8px;}
  .loading{text-align:center;padding:40px;color:var(--muted);}
  @media(max-width:600px){.pair{grid-template-columns:1fr;}}
</style>
</head>
<body>
<h1>🔍 Duplicate Person Review</h1>
<p class="sub">Tier 2 + 3 candidates from May 25 audit. Click Merge to consolidate, Skip if different people.</p>
<div class="progress" id="progressBar">Loading…</div>
<div id="root"><div class="loading">Loading candidates from D1…</div></div>

<script>
const API = 'https://purecleaning-api.tylerfumero.workers.dev';
let _token = localStorage.getItem('admin_token') || '';
let _candidates = [];
let _resolved = new Set();

// Inherit auth token from admin session
const _stored = localStorage.getItem('admin_token');
if (_stored) _token = _stored;

// Override fetch to inject auth on API calls
const _origFetch = window.fetch.bind(window);
window.fetch = (url, opts={}) => {
  if (typeof url==='string' && url.includes('purecleaning-api')) {
    opts.headers = Object.assign({ Authorization: `Bearer ${_token}` }, opts.headers||{});
  }
  return _origFetch(url, opts);
};

function fmtPhone(raw) {
  const d = (raw||'').replace(/\D/g,'');
  return d.length>=10 ? `(${d.slice(-10,-7)}) ${d.slice(-7,-4)}-${d.slice(-4)}` : raw||'—';
}

function highlightDiff(a, b) {
  const da = (a||'').replace(/\D/g,''), db = (b||'').replace(/\D/g,'');
  if (da.length !== db.length) return `<span class="phone">${fmtPhone(a)}</span>`;
  const fa = (a||'').replace(/\D/g,''), fb = (b||'').replace(/\D/g,'');
  let html = '';
  for (let i = 0; i < Math.max(da.length, db.length); i++) {
    const c = da[i] || '';
    if (c !== (db[i]||'')) html += `<span class="phone-diff">${c}</span>`;
    else html += c;
  }
  // Reformat with parens
  const fmt = html.replace(/(.{3})(.{3})(.{4})$/, '($1) $2-$3');
  return `<span class="phone" style="font-family:monospace">${fmtPhone(a)}</span>`;
}

function renderRec(rec, otherRec, label, isCanonical) {
  const jobs = rec.jobs || {};
  const jobLines = jobs.firstJob ? `
    <div class="job-row">First: ${jobs.firstJob} · Last: ${jobs.lastJob}</div>
    <div class="job-total">${jobs.cnt} job(s) · $${(jobs.total||0).toFixed(0)} lifetime</div>
  ` : '<div class="job-row" style="color:var(--muted)">No jobs found</div>';

  const propLines = (rec.properties||[]).map(p => {
    const shared = p.googlePlaceId && (otherRec.properties||[]).some(op => op.googlePlaceId === p.googlePlaceId);
    const addrStr = p.formattedAddress || [p.streetAddress, p.city].filter(Boolean).join(', ');
    return `<div class="prop-row ${shared?'prop-shared':''}">📍 ${addrStr}${shared?' ✓ same place_id':''}</div>`;
  }).join('');

  return `
    <div class="rec ${isCanonical?'canonical-highlight':''}">
      <div class="rec-label">${label}${isCanonical?' (suggested canonical)':''}</div>
      <div class="phone">${fmtPhone(rec.phone)}</div>
      <div class="meta">personId: ${rec.personId.slice(-12)}</div>
      <div class="meta">Created: ${(rec.createdAt||'').slice(0,10)}</div>
      ${propLines}
      ${jobLines}
      ${rec.notes ? `<div class="meta">Notes: ${rec.notes}</div>` : ''}
    </div>
  `;
}

function renderCard(c, idx) {
  const [r1, r2] = c.records;
  // Canonical = more jobs, or older createdAt
  const r1Jobs = r1.jobs?.cnt || 0, r2Jobs = r2.jobs?.cnt || 0;
  const canonical = r1Jobs >= r2Jobs ? r1 : r2;
  const orphan    = canonical === r1 ? r2 : r1;
  const canonLabel = canonical === r1 ? 'Record A' : 'Record B';
  const orphanLabel = canonical === r1 ? 'Record B' : 'Record A';

  const badges = [
    c.sharedPlaceId ? `<span class="badge badge-place">✓ Same place_id</span>` : '',
    `<span class="badge badge-dist">Phone dist: ${c.phoneDist}</span>`,
  ].filter(Boolean).join(' ');

  return `
    <div class="card" id="card-${c.id}" data-idx="${idx}">
      <div class="card-header">
        <div class="card-name">${c.name}</div>
        ${badges}
      </div>
      <div class="pair">
        ${renderRec(r1, r2, 'Record A', r1===canonical)}
        ${renderRec(r2, r1, 'Record B', r2===canonical)}
      </div>
      <div class="actions">
        <button class="btn btn-a" onclick="doMerge('${c.id}','${canonical.personId}','${orphan.personId}','Merge ${orphanLabel}→${canonLabel}')">
          Merge ${orphanLabel} → ${canonLabel}
        </button>
        <button class="btn btn-b" onclick="doMerge('${c.id}','${orphan.personId}','${canonical.personId}','Merge ${canonLabel}→${orphanLabel}')">
          Merge ${canonLabel} → ${orphanLabel}
        </button>
        <button class="btn btn-skip" onclick="doSkip('${c.id}','${r1.personId}','${r2.personId}')">
          ⊘ Skip — different people
        </button>
      </div>
      <div class="err" id="err-${c.id}" style="display:none"></div>
    </div>
  `;
}

function updateProgress() {
  const total = _candidates.length;
  const done  = _resolved.size;
  document.getElementById('progressBar').textContent = `${done} of ${total} reviewed · ${total-done} remaining`;
}

async function doMerge(id, canonical, orphan, label) {
  const card = document.getElementById(`card-${id}`);
  const btns = card.querySelectorAll('button');
  btns.forEach(b => b.disabled = true);
  const errEl = document.getElementById(`err-${id}`);
  errEl.style.display = 'none';

  try {
    const res = await fetch(`${API}/admin/person-merge`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ canonicalPersonId: canonical, orphanPersonId: orphan, reason: `review_ui: ${label}` }),
    });
    const d = await res.json();
    if (!res.ok || d.error) throw new Error(d.error || `HTTP ${res.status}`);

    card.classList.add('resolved');
    card.querySelector('.actions').innerHTML = `<span class="result-stamp stamp-merged">✓ Merged — ${label}</span>`;
    _resolved.add(id);
    updateProgress();
  } catch(e) {
    btns.forEach(b => b.disabled = false);
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  }
}

async function doSkip(id, idA, idB) {
  const card = document.getElementById(`card-${id}`);
  const btns = card.querySelectorAll('button');
  btns.forEach(b => b.disabled = true);
  const errEl = document.getElementById(`err-${id}`);
  errEl.style.display = 'none';

  try {
    const res = await fetch(`${API}/admin/person-merge-skip`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ personIdA: idA, personIdB: idB, reason: 'different people — tyler confirmed' }),
    });
    const d = await res.json();
    if (!res.ok || d.error) throw new Error(d.error || `HTTP ${res.status}`);

    card.classList.add('resolved');
    card.querySelector('.actions').innerHTML = `<span class="result-stamp stamp-skipped">⊘ Skipped — different people</span>`;
    _resolved.add(id);
    updateProgress();
  } catch(e) {
    btns.forEach(b => b.disabled = false);
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  }
}

async function loadCandidates() {
  try {
    const res = await fetch(`${API}/admin/person-merge-candidates`);
    const d   = await res.json();
    _candidates = d.candidates || [];

    if (!_candidates.length) {
      document.getElementById('root').innerHTML = '<p style="color:var(--muted);padding:20px;">No candidates found — all reviewed or none match criteria.</p>';
      document.getElementById('progressBar').textContent = '0 of 0 — all clear ✓';
      return;
    }

    // Separate tier 2 (sharedPlaceId) from tier 3 (no sharedPlaceId)
    const tier2 = _candidates.filter(c => c.sharedPlaceId);
    const tier3 = _candidates.filter(c => !c.sharedPlaceId);

    let html = '';
    if (tier2.length) {
      html += `<div class="tier-hdr">Tier 2 — Same address (googlePlaceId match) · ${tier2.length} cluster(s)</div>`;
      html += tier2.map((c,i) => renderCard(c, i)).join('');
    }
    if (tier3.length) {
      html += `<div class="tier-hdr">Tier 3 — Same name + phone edit distance 1 · ${tier3.length} pair(s)</div>`;
      html += tier3.map((c,i) => renderCard(c, tier2.length + i)).join('');
    }

    document.getElementById('root').innerHTML = html;
    updateProgress();
  } catch(e) {
    document.getElementById('root').innerHTML = `<p style="color:var(--red)">Failed to load: ${e.message}</p>`;
  }
}

loadCandidates();
</script>
</body>
</html>
