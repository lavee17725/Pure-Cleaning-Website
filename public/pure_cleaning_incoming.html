<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="/js/error-tracker.js"></script>
<script>
/* Auth gate — do not remove */
(function(){
  var t=localStorage.getItem('admin_token');
  var e=+(localStorage.getItem('admin_token_expires')||0);
  if(!t||Date.now()>e){
    localStorage.removeItem('admin_token');localStorage.removeItem('admin_token_expires');
    location.replace('/login.html?return='+encodeURIComponent(location.pathname));
    return;
  }
  var _f=window.fetch;
  window.fetch=function(u,o){
    if(typeof u==='string'&&u.indexOf('purecleaning-api')!==-1){
      o=Object.assign({},o||{});
      o.headers=Object.assign({'Authorization':'Bearer '+(localStorage.getItem('admin_token')||'')},o.headers||{});
    }
    return _f.call(this,u,o);
  };
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Pure Cleaning · Incoming Requests</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--navy2:#111f38;--sky:#2d7dd2;--gold:#f4a620;--green:#1d9e75;--red:#dc2626;--terra:#c2410c;--white:#fff;--bg:#fafaf7;--text:#1a1f2e;--muted:#6b7280;--border:#e8e2d8;--card:#fff;--input-bg:#fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.back-nav{background:var(--navy2);border-bottom:1px solid var(--border);padding:6px 1.25rem;}
.back-nav a{color:var(--muted);text-decoration:none;font-size:12px;}
.back-nav a:hover{color:var(--text);}

.header{background:var(--card);border-bottom:1px solid var(--border);padding:1.25rem 1.25rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--white);letter-spacing:1px;line-height:1;}
.logo span{color:var(--gold);}
.logo-sub{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-top:3px;}
.header-badge{font-size:11px;font-weight:600;background:var(--blue);color:var(--sky);padding:3px 10px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);}
.tab{flex:1;padding:.875rem .5rem;text-align:center;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px;-webkit-tap-highlight-color:transparent;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.cnt{display:inline-flex;align-items:center;justify-content:center;background:var(--border);color:var(--muted);border-radius:10px;font-size:11px;font-weight:700;min-width:20px;height:18px;padding:0 5px;margin-left:5px;transition:all .2s;}
.tab.active .cnt{background:var(--gold);color:var(--navy);}
.cnt.urgent{background:var(--red);color:white;}

.wrap{padding:1rem;max-width:640px;margin:0 auto;}

.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;}
.refresh-info{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.refresh-btn{font-size:11px;color:var(--sky);background:none;border:none;cursor:pointer;font-weight:600;padding:4px 8px;border-radius:6px;transition:background .15s;}
.refresh-btn:hover{background:rgba(45,125,210,.1);}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-state .e-icon{font-size:40px;margin-bottom:.75rem;}
.empty-state p{font-size:14px;line-height:1.6;}

.req-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:1rem 1.125rem;margin-bottom:10px;transition:border-color .2s;}
.req-card.stale{border-color:var(--red);}

.req-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem;gap:8px;}
.req-name-wrap{display:flex;align-items:center;flex-wrap:wrap;gap:6px;}
.req-name{font-size:16px;font-weight:700;color:var(--text);}
.stale-badge{font-size:10px;font-weight:700;background:rgba(229,62,62,.15);color:var(--red);padding:2px 7px;border-radius:8px;letter-spacing:.5px;text-transform:uppercase;}
.req-time{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;font-family:'DM Mono',monospace;}

.req-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:.625rem;}
.meta-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.meta-item strong{color:var(--text);}

.svc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:5px;}
.svc-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.625rem;}
.chip{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:500;}
.chip-svc{background:rgba(45,125,210,.12);border:1px solid rgba(45,125,210,.25);color:var(--sky);}
.chip-seal{background:rgba(244,166,32,.12);border:1px solid rgba(244,166,32,.3);color:var(--gold);}
.chip-rust{background:rgba(229,62,62,.12);border:1px solid rgba(229,62,62,.3);color:#fc8181;}
/* leadSource chip — neutral lavender so it doesn't compete visually with services */
.chip-lead{background:rgba(167,139,250,.13);border:1px solid rgba(167,139,250,.32);color:#c4b5fd;}
/* "✓ intro texted" pill — sits next to action buttons */
.intro-pill{font-size:11px;color:var(--green);font-family:'DM Mono',monospace;background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.25);border-radius:6px;padding:4px 9px;white-space:nowrap;}
/* Lead-capture photo strip — admin-authed thumbnails on incoming cards */
.lead-photos-label{font-size:11px;color:var(--mut,#5b6472);font-weight:600;margin-top:8px;letter-spacing:.3px;text-transform:uppercase}
.lead-photos-strip{display:flex;gap:6px;margin-top:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.lead-photo-thumb{flex-shrink:0;width:64px;height:64px;border-radius:8px;overflow:hidden;background:#1f2937;border:1px solid rgba(255,255,255,.08);cursor:pointer;position:relative}
.lead-photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.lead-photo-thumb.lp-err{background:rgba(229,62,62,.18);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fc8181;font-weight:700;text-align:center;padding:4px}

.req-note{font-size:12px;color:var(--muted);background:rgba(255,255,255,.035);border-radius:8px;padding:7px 10px;margin-bottom:.5rem;line-height:1.55;}

.req-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-top:.625rem;border-top:1px solid var(--border);margin-top:.25rem;}
.btn-build{display:inline-flex;align-items:center;gap:5px;background:var(--sky);color:white;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:background .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.btn-build:hover{background:#2470c0;}
.btn-ignore{display:inline-flex;align-items:center;gap:5px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-ignore:hover{border-color:var(--red);color:var(--red);}
.btn-ignore:disabled{opacity:.5;cursor:default;}
.btn-restore{display:inline-flex;align-items:center;gap:5px;background:transparent;color:var(--green);border:1px solid rgba(29,158,117,.4);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-restore:hover{background:var(--green);color:white;border-color:var(--green);}
.btn-restore:disabled{opacity:.5;cursor:default;}
.btn-cx{margin-left:auto;font-size:11px;color:var(--muted);text-decoration:none;font-weight:500;white-space:nowrap;}
.btn-cx:hover{color:var(--sky);}
.btn-delete{display:inline-flex;align-items:center;gap:4px;background:transparent;color:var(--red);border:1px solid rgba(229,62,62,.3);border-radius:8px;padding:8px 11px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-delete:hover{background:rgba(229,62,62,.1);border-color:var(--red);}

.quoted-pill{font-size:11px;color:var(--green);font-family:'DM Mono',monospace;background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.25);border-radius:6px;padding:4px 9px;white-space:nowrap;}

/* ── Verbal quote card ── */
.req-card.verbal{border-left:3px solid #d97706;}
.verbal-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;background:rgba(217,119,6,.15);color:#92400e;padding:2px 7px;border-radius:8px;}
.price-badge{font-size:12px;font-weight:700;background:rgba(29,158,117,.12);color:#065f46;padding:2px 8px;border-radius:8px;border:1px solid rgba(29,158,117,.2);}
.btn-confirm{display:inline-flex;align-items:center;gap:5px;background:#1d9e75;color:white;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s;font-family:'DM Sans',sans-serif;}
.btn-confirm:hover{background:#178063;}
.btn-dns{display:inline-flex;align-items:center;gap:5px;background:rgba(229,62,62,.1);color:var(--red);border:1.5px solid rgba(229,62,62,.3);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.btn-dns:hover{background:rgba(229,62,62,.18);}

/* ── Modals ── */
.vq-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.vq-overlay.show{display:flex;}
.vq-modal{background:var(--card);border-radius:16px;padding:1.5rem;width:min(500px,100%);max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.vq-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:1.25rem;}
.vq-field{margin-bottom:12px;}
.vq-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block;}
.vq-input,.vq-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;background:var(--input-bg);color:var(--text);box-sizing:border-box;}
.vq-input:focus,.vq-textarea:focus{border-color:var(--sky);}
.vq-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.vq-actions{display:flex;gap:10px;margin-top:1.25rem;}
.vq-btn-primary{flex:1;padding:11px;background:var(--sky);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.vq-btn-primary:hover{background:#2470c0;}
.vq-btn-cancel{padding:11px 20px;background:none;color:var(--muted);border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.story-sel{display:inline-flex;align-items:center;gap:14px;padding:7px 12px;background:rgba(194,65,12,.07);border:1px solid rgba(194,65,12,.22);border-radius:8px;margin-top:6px;}
.story-sel-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.story-sel label{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;}
.story-sel input[type=radio]{accent-color:#c2410c;width:15px;height:15px;cursor:pointer;}
.story-badge{display:inline-block;font-size:10px;font-weight:700;background:rgba(194,65,12,.1);color:#c2410c;border-radius:10px;padding:1px 7px;margin-left:5px;vertical-align:middle;}

/* ── Bulk selection ── */
.bulk-cb{width:16px;height:16px;cursor:pointer;accent-color:var(--sky);flex-shrink:0;}
.select-row{display:flex;align-items:center;gap:8px;padding:.375rem .25rem .625rem;font-size:12px;color:var(--muted);}
.select-row label{cursor:pointer;user-select:none;}
#bulkBar{display:none;position:fixed;bottom:0;left:0;right:0;padding:12px 1.25rem;background:#0a1628;border-top:1px solid var(--border);flex-direction:row;align-items:center;gap:10px;z-index:99;}
.bulk-count{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.btn-bulk{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;}
.btn-bulk-dismiss{background:rgba(122,138,170,.12);border:1px solid rgba(122,138,170,.3);color:var(--muted);}
.btn-bulk-dismiss:hover{border-color:var(--gold);color:var(--gold);}
.btn-bulk-delete{background:rgba(229,62,62,.1);border:1px solid rgba(229,62,62,.3);color:var(--red);}
.btn-bulk-delete:hover{background:rgba(229,62,62,.18);}
.btn-bulk-restore{background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.3);color:var(--green);}
.btn-bulk-restore:hover{background:rgba(29,158,117,.18);}
.btn-bulk-clear{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:4px 8px;font-family:'DM Sans',sans-serif;}

/* ── Undo toast ── */
#undoToast{display:none;position:fixed;bottom:4.5rem;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--border);border-radius:10px;padding:.75rem 1.25rem;flex-direction:row;align-items:center;gap:14px;z-index:200;min-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.6);}
.toast-msg{font-size:13px;font-weight:500;color:var(--text);flex:1;}
.toast-undo{font-size:12px;font-weight:700;color:var(--sky);cursor:pointer;padding:5px 10px;border-radius:6px;background:rgba(45,125,210,.12);border:1px solid rgba(45,125,210,.3);font-family:'DM Sans',sans-serif;white-space:nowrap;}
.toast-undo:hover{background:rgba(45,125,210,.22);}
</style>
</head>
<body>

<div class="back-nav"><a href="/pure_cleaning_admin.html">← Admin Home</a></div>

<div class="header">
  <div>
    <div class="logo">Pure <span>Cleaning</span></div>
    <div class="logo-sub">Incoming Requests</div>
  </div>
  <div class="header-badge">Inbox</div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-new"       onclick="switchTab('new')">🔔 New <span class="cnt" id="cnt-new">0</span></div>
  <div class="tab"        id="tab-quoted"    onclick="switchTab('quoted')">✓ Quoted <span class="cnt" id="cnt-quoted">0</span></div>
  <div class="tab"        id="tab-waitlist"  onclick="switchTab('waitlist')">⏳ Waitlist <span class="cnt" id="cnt-waitlist">0</span></div>
  <div class="tab"        id="tab-dismissed" onclick="switchTab('dismissed')">🔇 Dismissed <span class="cnt" id="cnt-dismissed">0</span></div>
  <div class="tab"        id="tab-all"       onclick="switchTab('all')">All <span class="cnt" id="cnt-all">0</span></div>
</div>

<div class="wrap" id="wrap">
  <div class="empty-state"><div class="e-icon">⏳</div><p>Loading requests…</p></div>
</div>

<!-- Confirm & Schedule Modal -->
<div class="vq-overlay" id="csModal" onclick="if(event.target===this)closeCsModal()">
  <div class="vq-modal" style="max-width:360px;">
    <div class="vq-title">✅ Confirm & Schedule</div>
    <div id="csName" style="font-size:14px;color:var(--muted);margin-bottom:1rem;"></div>
    <div class="vq-field"><label class="vq-label">Scheduled Date *</label><input class="vq-input" id="csDate" type="date"></div>
    <div class="vq-field"><label class="vq-label">Notes (optional)</label><input class="vq-input" id="csNotes" placeholder="Any notes for the job"></div>
    <div class="vq-field"><label class="vq-label">Alt phone (optional)</label><input class="vq-input" id="csAltPhone" type="tel" placeholder="(954) 555-0000" oninput="formatPhoneInput(this)"></div>
    <div id="csError" style="color:var(--red);font-size:12px;margin-top:4px;display:none;"></div>
    <div class="vq-actions">
      <button class="vq-btn-primary" onclick="submitConfirmSchedule()" style="background:#1d9e75;">📅 Schedule It</button>
      <button class="vq-btn-cancel" onclick="closeCsModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Did Not Service Modal -->
<div class="vq-overlay" id="dnsModal" onclick="if(event.target===this)closeDnsModal()">
  <div class="vq-modal" style="max-width:360px;">
    <div class="vq-title">❌ Did Not Service</div>
    <div id="dnsName" style="font-size:14px;color:var(--muted);margin-bottom:1rem;"></div>
    <div class="vq-field"><label class="vq-label">Reason (optional)</label><input class="vq-input" id="dnsReason" placeholder="Too expensive, chose competitor…"></div>
    <div class="vq-actions">
      <button class="vq-btn-primary" onclick="submitDns()" style="background:var(--red);">Move to Follow-up Queue</button>
      <button class="vq-btn-cancel" onclick="closeDnsModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Undo toast -->
<div id="undoToast">
  <span class="toast-msg" id="toastMsg"></span>
  <button class="toast-undo" onclick="doUndo()">Undo</button>
</div>

<!-- Bulk action bar -->
<div id="bulkBar">
  <span class="bulk-count" id="bulkCount">0 selected</span>
  <button class="btn-bulk btn-bulk-dismiss"  onclick="bulkAction('dismiss')">Dismiss</button>
  <button class="btn-bulk btn-bulk-delete"   onclick="bulkAction('delete')">Delete</button>
  <button class="btn-bulk btn-bulk-restore"  id="bulkRestoreBtn" onclick="bulkAction('restore')" style="display:none;">Restore</button>
  <button class="btn-bulk-clear" onclick="clearBulkSelection()">✕ Clear</button>
</div>

<script>
const PCPC_API          = 'https://purecleaning-api.tylerfumero.workers.dev';
const QUOTE_BUILDER_URL = '/pure_cleaning_quote_builder_v2.html';
const NEW_CUSTOMER_URL  = '/pure_cleaning_new_customer.html';

let allRequests = [];
let activeTab   = 'new';
let lastRefresh = null;
let selectedIds = new Set();
let _toastTimeout = null, _toastUndo = null, _toastCommit = null;
let _knownPhones  = null; // null = still loading, Set<string> when ready

// ── Service name → quote builder format ───────────────────────────
const SVC_MAP = {
  'Roof cleaning (Softwash)':                    'Roof — Softwash',
  'Roof cleaning (Traditional brush cleaning)':  'Roof — Traditional',
  'Roof cleaning (Water only pressure cleaning)':'Roof — Water Only',
  'Rinse Walls & Windows':                       'Rinse Walls',
  'Rinse walls':                                 'Rinse Walls',
  'Screen enclosure':                            'Screen Enclosure',
  'Wood fence':                                  'Fence — Wood',
  'Plastic / vinyl fence':                       'Fence — Vinyl',
  'Metal fence':                                 'Fence — Metal',
  'Pool deck':                                   'Pool Deck',
};
function mapSvc(s) { return SVC_MAP[s] || s; }

// ── Persist helpers ────────────────────────────────────────────────
async function persistRequests() {
  await fetch(`${PCPC_API}/incoming`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ requests: allRequests })
  });
}

function auditLog(eventType, data) {
  fetch(`${PCPC_API}/events`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: 'ops_' + Date.now(), timestamp: new Date().toISOString(), eventType, metadata: data || {} })
  }).catch(() => {});
}

// ── Undo toast ─────────────────────────────────────────────────────
function showUndoToast(msg, undoFn, commitFn) {
  if (_toastTimeout) { clearTimeout(_toastTimeout); _toastCommit && _toastCommit(); }
  _toastUndo = undoFn; _toastCommit = commitFn;
  document.getElementById('toastMsg').textContent = msg;
  const toast = document.getElementById('undoToast');
  toast.style.display = 'flex';
  _toastTimeout = setTimeout(() => {
    toast.style.display = 'none';
    _toastCommit && _toastCommit();
    _toastTimeout = _toastUndo = _toastCommit = null;
  }, 5000);
}

function doUndo() {
  if (_toastTimeout) clearTimeout(_toastTimeout);
  document.getElementById('undoToast').style.display = 'none';
  _toastUndo && _toastUndo();
  _toastTimeout = _toastUndo = _toastCommit = null;
}

// ── Delete (permanent, with 5s undo) ──────────────────────────────
function deleteRequest(id) {
  const req = allRequests.find(r => r.id === id);
  if (!req) return;
  if (!confirm('Permanently delete this request?')) return;
  allRequests = allRequests.filter(r => r.id !== id);
  selectedIds.delete(id);
  renderTab();
  // Persist immediately so a refresh doesn't resurrect the record
  persistRequests().catch(() => {});
  auditLog('deleted_request', { id: req.id, name: (req.customerData?.firstName||'') + ' ' + (req.customerData?.lastName||''), phone: req.customerData?.phone || '' });
  const snapshot = req;
  showUndoToast('Request deleted.', async () => {
    // Undo: restore record and re-persist
    allRequests = [snapshot, ...allRequests];
    renderTab();
    await persistRequests().catch(() => {});
  }, null);
}

// ── Dismiss ────────────────────────────────────────────────────────
function confirmDismiss(id, name, btn) {
  if (!confirm(`Dismiss "${name}"?\n\nMoves to Dismissed tab — can be restored anytime.`)) return;
  changeStatus(id, 'dismissed', btn);
}

// ── Bulk selection ─────────────────────────────────────────────────
function toggleBulkSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateBulkBar();
  // Update card outline
  const card = document.getElementById('card-' + id);
  if (card) card.style.outline = selectedIds.has(id) ? '2px solid var(--sky)' : '';
  // Update select-all state
  const tab = document.getElementById('wrap');
  if (!tab) return;
  const allCbs = tab.querySelectorAll('.bulk-cb[data-id]');
  // We don't use data-id on the checkboxes (we pass id as arg), so just check via select-all cb
  const allVisible = [...document.querySelectorAll('.req-card')].map(c => c.id.replace('card-',''));
  const allSel = allVisible.length > 0 && allVisible.every(id2 => selectedIds.has(id2));
  const saCb = document.getElementById('selectAllCb');
  if (saCb) saCb.checked = allSel;
}

function toggleSelectAll() {
  const cb = document.getElementById('selectAllCb');
  const allVisible = [...document.querySelectorAll('.req-card')].map(c => c.id.replace('card-',''));
  if (cb && cb.checked) allVisible.forEach(id => selectedIds.add(id));
  else allVisible.forEach(id => selectedIds.delete(id));
  // Re-render to reflect checkbox state + outlines
  renderTab();
}

function clearBulkSelection() {
  selectedIds.clear();
  renderTab();
}

function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  const cnt = document.getElementById('bulkCount');
  if (!bar) return;
  if (selectedIds.size === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  cnt.textContent = `${selectedIds.size} selected`;
}

async function bulkAction(action) {
  const ids = [...selectedIds];
  if (!ids.length) return;
  const verb = action === 'delete' ? 'Permanently delete' : action === 'dismiss' ? 'Dismiss' : 'Restore';
  if (!confirm(`${verb} ${ids.length} request${ids.length > 1 ? 's' : ''}?`)) return;

  if (action === 'delete') {
    const snapshots = allRequests.filter(r => ids.includes(r.id));
    allRequests = allRequests.filter(r => !ids.includes(r.id));
    ids.forEach(id => selectedIds.delete(id));
    renderTab();
    // Persist immediately — don't wait for undo timeout
    persistRequests().catch(() => {});
    snapshots.forEach(s => auditLog('deleted_request', { id: s.id }));
    showUndoToast(`${snapshots.length} requests deleted.`, async () => {
      // Undo: restore and re-persist
      allRequests = [...snapshots, ...allRequests];
      renderTab();
      await persistRequests().catch(() => {});
    }, null);
  } else {
    const newStatus = action === 'dismiss' ? 'dismissed' : 'new';
    ids.forEach(id => {
      const req = allRequests.find(r => r.id === id);
      if (req) { req.status = newStatus; if (action === 'restore') req.quotedAt = null; }
    });
    selectedIds.clear();
    renderTab();
    await persistRequests().catch(() => {});
    ids.forEach(id => auditLog(action + '_request', { id }));
  }
}

// ── Fetch ──────────────────────────────────────────────────────────
async function loadRequests(silent) {
  if (!silent) document.getElementById('wrap').innerHTML =
    '<div class="empty-state"><div class="e-icon">⏳</div><p>Loading requests…</p></div>';
  try {
    const res = await fetch(`${PCPC_API}/incoming`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allRequests = (data.requests || []);
    lastRefresh = new Date();
    renderTab();
  } catch(e) {
    if (!silent) document.getElementById('wrap').innerHTML =
      '<div class="empty-state"><div class="e-icon">❌</div><p>Failed to load. Check connection and try again.</p><button class="refresh-btn" style="margin-top:.75rem;font-size:13px;" onclick="loadRequests()">↻ Retry</button></div>';
  }
}

// ── Tabs ───────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderTab();
}

function renderTab() {
  // Defense-in-depth (Rule 21 / DL-07): historically a few rows landed without
  // submittedAt (write path didn't stamp it; backfill ran 2026-06-21 + worker
  // POST /incoming now auto-stamps). Coerce to '' so a future malformed row
  // never crashes the page render.
  const _sa = r => (r && r.submittedAt) ? r.submittedAt : '';
  const byStatus = s => allRequests
    .filter(r => r.status === s)
    .sort((a, b) => _sa(b).localeCompare(_sa(a)));

  const newList        = byStatus('new');
  const quotedList     = byStatus('quoted').sort((a,b) => (b.quotedAt||'').localeCompare(a.quotedAt||''));
  const waitlistList   = byStatus('waitlist');
  const dismissedList  = allRequests.filter(r => r.status === 'ignored' || r.status === 'dismissed')
                           .sort((a,b) => _sa(b).localeCompare(_sa(a)));
  const allList        = [...allRequests].sort((a,b) => _sa(b).localeCompare(_sa(a)));

  setCount('new',       newList.length,       true);
  setCount('quoted',    quotedList.length,     false);
  setCount('waitlist',  waitlistList.length,   waitlistList.length > 0);
  setCount('dismissed', dismissedList.length,  false);
  setCount('all',       allList.length,        false);

  const lists = { new: newList, quoted: quotedList, waitlist: waitlistList, dismissed: dismissedList, all: allList };
  const reqs  = lists[activeTab] || [];

  const EMPTY = {
    new:       { icon: '✅', msg: 'No new requests — you\'re all caught up!' },
    quoted:    { icon: '📋', msg: 'No quoted requests yet.' },
    waitlist:  { icon: '⏳', msg: 'No waitlist requests.' },
    dismissed: { icon: '🔇', msg: 'Nothing dismissed.' },
    all:       { icon: '📭', msg: 'No requests at all yet.' },
  };

  // Show/hide bulk restore button only in dismissed tab
  const restoreBtn = document.getElementById('bulkRestoreBtn');
  if (restoreBtn) restoreBtn.style.display = activeTab === 'dismissed' ? '' : 'none';

  const wrap = document.getElementById('wrap');
  if (!reqs.length) {
    const e = EMPTY[activeTab];
    wrap.innerHTML = `<div class="empty-state"><div class="e-icon">${e.icon}</div><p>${e.msg}</p></div>`;
    return;
  }

  const rt = lastRefresh ? lastRefresh.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
  const selAll = reqs.every(r => selectedIds.has(r.id));
  let html = `<div class="refresh-row"><span class="refresh-info">Updated ${rt}</span><button class="refresh-btn" onclick="loadRequests(true)">↻ Refresh</button></div>`;
  html += `<div class="select-row"><input class="bulk-cb" type="checkbox" id="selectAllCb" ${selAll?'checked':''} onchange="toggleSelectAll()"><label for="selectAllCb">Select all</label></div>`;
  reqs.forEach(r => { html += buildCard(r); });
  wrap.innerHTML = html;
  updateBulkBar();

  // Post-render lazy-load lead-capture photo thumbnails. Each thumb is an empty
  // div carrying data-key="quote-leads/{leadId}/photo_X_TS.jpg"; we fetch via the
  // page-level fetch interceptor (Bearer auth injected) → blob → objectURL.
  // Bare <img src="/admin/photos/key/…"> would 401 since the browser image loader
  // bypasses fetch (), so this auth'd-fetch dance is necessary.
  document.querySelectorAll('.lead-photo-thumb[data-key]').forEach(el => {
    const key = el.dataset.key;
    if (!key) return;
    fetch(`${PCPC_API}/admin/photos/key/${key}`)
      .then(r => r.ok ? r.blob() : Promise.reject(new Error('HTTP ' + r.status)))
      .then(blob => {
        const img = document.createElement('img');
        img.alt = 'Lead-capture photo';
        img.src = URL.createObjectURL(blob);
        el.appendChild(img);
        el.addEventListener('click', () => window.open(img.src, '_blank'));
      })
      .catch(() => {
        el.classList.add('lp-err');
        el.textContent = '✕ load';
      });
  });
}

function setCount(tab, n, isNew) {
  const el = document.getElementById('cnt-' + tab);
  if (!el) return;
  el.textContent = String(n);
  el.className = 'cnt' + (isNew && n > 0 ? ' urgent' : '');
}

// ── Customer profile button ────────────────────────────────────────
function viewCxBtn(phone) {
  const norm = (phone || '').replace(/\D/g, '');
  if (!norm) return '';
  const url = `/pure_cleaning_customer_profile.html?phone=${encodeURIComponent(norm)}`;
  // While customer DB is still loading, show as enabled (optimistic)
  if (_knownPhones === null || _knownPhones.has(norm)) {
    return `<a href="${url}" class="btn-cx">💬 View customer →</a>`;
  }
  return `<span class="btn-cx" style="opacity:.35;cursor:default;" title="No customer record yet — build a quote first to create one">💬 View customer →</span>`;
}

async function loadKnownPhones() {
  try {
    const res = await fetch(`${PCPC_API}/customers`);
    if (!res.ok) { _knownPhones = new Set(); return; }
    const data = await res.json();
    _knownPhones = new Set(
      (data.customers || [])
        .filter(c => !c.deleted)
        .map(c => (c.phone || '').replace(/\D/g, ''))
        .filter(Boolean)
    );
  } catch {
    _knownPhones = new Set(); // fail open — don't block the button forever
  }
  renderTab();
}

// ── Card builder ───────────────────────────────────────────────────
function buildCard(req) {
  const d       = req.customerData || {};
  const now     = Date.now();
  const age     = now - new Date(req.submittedAt || req.created_at);
  const isStale = req.status === 'new' && age > 48 * 3600 * 1000;
  const phone   = d.phone   || req.phone   || '';
  const city    = d.city    || req.city    || '';
  const address = d.address || req.address || '';

  // Services chips
  const svcs = (d.services || []);
  let chips = svcs.map(s => {
    const cls = s.toLowerCase().includes('rust') ? 'chip-rust'
              : s.toLowerCase().includes('seal') ? 'chip-seal'
              : 'chip-svc';
    return `<span class="chip ${cls}">${esc(s)}</span>`;
  }).join('');

  if (d.sealing && d.sealing.requested && d.sealing.surfaces && d.sealing.surfaces.length) {
    chips += d.sealing.surfaces.map(s => `<span class="chip chip-seal">Seal: ${esc(s)}</span>`).join('');
  }
  if (d.rustRemoval && d.rustRemoval.requested && d.rustRemoval.area) {
    chips += `<span class="chip chip-rust">Rust: ${esc(d.rustRemoval.area)}</span>`;
  }
  // Lead source chip — captured optionally on both quote forms (public + rich).
  // Shape is the structured object from buildLeadSource() / the form's structured emit;
  // bare strings tolerated for legacy entries.
  const leadObj   = d.leadSource;
  const leadLabel = leadObj && typeof leadObj === 'object' ? (leadObj.label || leadObj.primary || '') : (typeof leadObj === 'string' ? leadObj : '');
  const leadDetail = leadObj && typeof leadObj === 'object' && leadObj.detail ? ` (${leadObj.detail})` : '';
  if (leadLabel) {
    chips += `<span class="chip chip-lead">📣 Heard via: ${esc(leadLabel)}${esc(leadDetail)}</span>`;
  }

  // Lead-capture photo strip — admin-auth'd thumbnails. Each thumb lazy-loads via
  // an authed fetch → blob → objectURL pattern (bare <img src> against /admin/photos/key/*
  // would 401 since the browser image loader bypasses the page-level fetch interceptor).
  // Wired post-render in renderLeadPhotos() below.
  let leadPhotoStrip = '';
  if (Array.isArray(d.photos) && d.photos.length) {
    const stripId = `lead-photos-${req.id}`;
    const cells = d.photos.map((k, i) =>
      `<div class="lead-photo-thumb" data-key="${esc(k)}" id="${stripId}-${i}"></div>`
    ).join('');
    leadPhotoStrip = `
      <div class="lead-photos-label">📷 Photos from the customer (${d.photos.length})</div>
      <div class="lead-photos-strip" id="${stripId}">${cells}</div>`;
  }

  // Notes
  let notes = '';
  if (d.notes) notes += `<div class="req-note">📝 ${esc(d.notes)}</div>`;
  if (d.otherServices) notes += `<div class="req-note" style="margin-top:4px;">➕ Other: ${esc(d.otherServices)}</div>`;

  // Verbal-quote card: different actions
  if (req.source === 'verbal') {
    const priceBadge = d.quotedPrice ? `<span class="price-badge">$${Number(d.quotedPrice).toLocaleString()}</span>` : '';
    const prefDateStr = d.preferredDate ? `<span class="meta-item">📅 Wants: <strong>${new Date(d.preferredDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</strong></span>` : '';
    const isSel = selectedIds.has(req.id);
    return `<div class="req-card verbal${isSel ? ';outline:2px solid var(--sky)' : ''}" id="card-${req.id}">
      <div class="req-header">
        <div class="req-name-wrap">
          <input class="bulk-cb" type="checkbox" ${isSel?'checked':''} onchange="toggleBulkSelect('${req.id}')" style="margin-right:6px;">
          <span class="req-name">${esc(((d.firstName||'') + ' ' + (d.lastName||'')).trim() || '—')}</span>
          <span class="verbal-badge">📞 Verbal</span>
          ${priceBadge}
        </div>
        <span class="req-time">${timeAgo(req.submittedAt)}</span>
      </div>
      <div class="req-meta">
        ${phone ? `<span class="meta-item">📞 <strong>${esc(phone)}</strong></span>` : ''}
        ${address && city ? `<span class="meta-item">📍 <strong>${esc(address)}, ${esc(city)}</strong></span>` : city ? `<span class="meta-item">📍 <strong>${esc(city)}</strong></span>` : ''}
        ${prefDateStr}
      </div>
      ${d.services?.[0] ? `<div class="svc-label">Service</div><div class="svc-chips"><span class="chip chip-svc">${esc(d.services[0])}</span></div>` : ''}
      ${d.notes ? `<div class="req-note">📝 ${esc(d.notes)}</div>` : ''}
      <div class="req-actions">
        <button class="btn-confirm" onclick="openCsModal('${req.id}')">✅ Confirm &amp; Schedule</button>
        <button class="btn-dns" onclick="openDnsModal('${req.id}')">❌ Did Not Service</button>
        <button class="btn-delete" onclick="deleteRequest('${req.id}')">✕</button>
        ${viewCxBtn(phone)}
      </div>
    </div>`;
  }

  // Actions
  let actions = '';
  const delBtn = `<button class="btn-delete" onclick="deleteRequest('${req.id}')">✕ Delete</button>`;
  if (req.status === 'new') {
    const qUrl = buildQuoteUrl(req);
    const cUrl = buildConvertUrl(req);
    const name = esc(((d.firstName||'') + ' ' + (d.lastName||'')).trim() || req.customer_name || '');
    // "💬 Text intro" — the post-quote-sent intro message. Distinct from the existing
    // "💬 Text" (exploratory chat). Click opens Tyler's Messages app prefilled, then
    // PATCHes the record's introTextedAt via persistRequests (server-side persistence,
    // not localStorage — survives reloads and devices).
    const introBtn = req.introTextedAt
      ? `<span class="intro-pill">✓ intro texted ${new Date(req.introTextedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`
      : `<button class="btn-build" style="background:#a78bfa;color:#1a1f2e;" onclick="initIntroText('${req.id}','${phone}','${esc(d.firstName || (req.customer_name||'').split(' ')[0] || '')}','${esc(address || city || '')}',this)">💬 Text intro</button>`;
    actions = `
      <a href="${qUrl}" class="btn-build">✨ Build Quote</a>
      <a href="${cUrl}" class="btn-build" style="background:#0369a1;">👤 Convert &rarr;</a>
      <button class="btn-build" style="background:#1d9e75;" onclick="initCall('${phone}','${esc(d.firstName || (req.customer_name||'').split(' ')[0] || '')}')">📞 Call</button>
      <button class="btn-build" style="background:#1d9e75;" onclick="initText('${phone}','${esc(d.firstName || (req.customer_name||'').split(' ')[0] || '')}')">💬 Text</button>
      ${introBtn}
      <button class="btn-ignore" onclick="confirmDismiss('${req.id}','${name}',this)">🔇 Dismiss</button>
      ${delBtn}
      ${viewCxBtn(phone)}`;
  } else if (req.status === 'quoted') {
    const qt = req.quotedAt
      ? new Date(req.quotedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
        new Date(req.quotedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
      : 'recently';
    actions = `
      <span class="quoted-pill">✓ Quoted ${qt}</span>
      <button class="btn-restore" onclick="changeStatus('${req.id}','new',this)">↩ Back to New</button>
      ${delBtn}
      ${viewCxBtn(phone)}`;
  } else if (req.status === 'waitlist') {
    actions = `
      <span style="font-size:11px;font-weight:600;color:#d97706;background:#fef9c3;padding:2px 8px;border-radius:10px;">⏳ Waitlist — wants ${esc(d.timeframe||'a specific week')}</span>
      <button class="btn-restore" onclick="changeStatus('${req.id}','new',this)" style="margin-top:8px;">↩ Move to Active</button>
      ${delBtn}
      ${viewCxBtn(phone)}`;
  } else {
    // dismissed / ignored
    actions = `
      <button class="btn-restore" onclick="changeStatus('${req.id}','new',this)">↩ Restore</button>
      ${delBtn}
      ${viewCxBtn(phone)}`;
  }

  const isSel = selectedIds.has(req.id);
  return `<div class="req-card${isStale ? ' stale' : ''}${isSel ? ';outline:2px solid var(--sky)' : ''}" id="card-${req.id}">
    <div class="req-header">
      <div class="req-name-wrap">
        <input class="bulk-cb" type="checkbox" ${isSel?'checked':''} onchange="toggleBulkSelect('${req.id}')" style="margin-right:6px;">
        <span class="req-name">${esc(((d.firstName||'') + ' ' + (d.lastName||'')).trim() || req.customer_name || '—')}</span>
        ${isStale ? '<span class="stale-badge">⚠ Stale</span>' : ''}
      </div>
      <span class="req-time">${timeAgo(req.submittedAt)}</span>
    </div>
    <div class="req-meta">
      ${phone ? `<span class="meta-item">📞 <strong>${esc(phone)}</strong></span>` : ''}
      ${address && city
        ? `<span class="meta-item">📍 <strong>${esc(address)}, ${esc(city)}</strong></span>`
        : city
        ? `<span class="meta-item">📍 <strong>${esc(city)}</strong></span>`
        : ''}
      ${d.timeframe        ? `<span class="meta-item">⏰ <strong>${esc(d.timeframe)}</strong></span>` : ''}
      ${d.reminderFrequency? `<span class="meta-item">🔄 ${esc(d.reminderFrequency)}</span>` : ''}
    </div>
    ${chips ? `<div class="svc-label">Services</div><div class="svc-chips">${chips}</div>` : ''}
    ${leadPhotoStrip}
    ${notes}
    <div class="req-actions">${actions}</div>
  </div>`;
}

// ── Build Quote URL ────────────────────────────────────────────────
function buildQuoteUrl(req) {
  const d    = req.customerData || {};
  const svcs = (d.services || []).map(mapSvc).filter((s,i,a) => a.indexOf(s) === i).join(', ');
  // leadSource carries through to quote_builder_v2 → eventual Person record.
  // Shape: object {primary, label, detail, ...} from buildLeadSource() — emit
  // just the `primary` key in the URL payload (compact, matches new_customer.html's
  // fromOnline `data.ls` field name; the rest can be re-derived from labels).
  const ls = (d.leadSource && typeof d.leadSource === 'object') ? (d.leadSource.primary || '')
           : (typeof d.leadSource === 'string' ? d.leadSource : '');
  try {
    const payload = JSON.stringify({
      n:     (`${d.firstName||''} ${d.lastName||''}`).trim(),
      p:     d.phone  || '',
      em:    d.email  || '',
      a:     [d.address, d.city, d.zip].filter(Boolean).join(', '),
      s:     svcs,
      notes:     d.notes     || '',
      timeframe: d.timeframe || '',
      ls:    ls || '',
      reqId: req.id
    });
    const encoded = btoa(unescape(encodeURIComponent(payload)));
    return `${QUOTE_BUILDER_URL}?customer=${encodeURIComponent(encoded)}`;
  } catch(e) { return QUOTE_BUILDER_URL; }
}

// "👤 Convert →" navigation: new_customer.html?fromOnline=<b64> with everything
// the new-customer form prefill handler reads (fn/ln/phone/addr/city/zip/email/
// notes/ls) PLUS photos[] + leadId so the T1.22-Connect chain is fully traversable
// from a single click. The connect endpoint fires post-saveDb() over there.
// ADDITIVE — does not replace or modify the existing ✨ Build Quote button.
function buildConvertUrl(req) {
  const d = req.customerData || {};
  try {
    // fromOnline shape (lines 1372-1393 of new_customer.html):
    //   fn / ln / phone / addr / city / zip / email / notes / ls (lead source primary)
    // Extensions for this batch:
    //   leadId / photos[]
    const lsPrimary = (d.leadSource && typeof d.leadSource === 'object')
      ? (d.leadSource.primary || '')
      : (typeof d.leadSource === 'string' ? d.leadSource : '');
    const payload = JSON.stringify({
      fn:    d.firstName || '',
      ln:    d.lastName  || '',
      phone: d.phone     || '',
      addr:  d.address   || '',
      city:  d.city      || '',
      zip:   d.zip       || '',
      email: d.email     || '',
      notes: d.notes     || '',
      ls:    lsPrimary,
      // T1.22-Connect carry: leadId + photoKeys[] re-key to property/ on save
      leadId: d.leadId || null,
      photos: Array.isArray(d.photos) ? d.photos : [],
    });
    const encoded = btoa(unescape(encodeURIComponent(payload)));
    return `${NEW_CUSTOMER_URL}?fromOnline=${encodeURIComponent(encoded)}`;
  } catch(e) { return NEW_CUSTOMER_URL; }
}

function initCall(phone, firstName) {
  const dialPhone = '+1' + phone.replace(/\D/g, '');
  window.location.href = `tel:${dialPhone}`;
  auditLog('request_call_initiated', { phone, firstName, calledAt: new Date().toISOString(), calledBy: 'operator' });
}

function initText(phone, firstName) {
  const body = `Hi ${firstName || 'there'}! This is Pure Cleaning Pressure Cleaning calling about your quote request. Got a minute to chat about what you're looking for?`;
  window.location.href = `sms:+1${phone.replace(/\D/g, '')}&body=${encodeURIComponent(body)}`;
  auditLog('request_text_initiated', { phone, firstName, textedAt: new Date().toISOString(), textedBy: 'operator' });
}

// "💬 Text intro" — opens Tyler's Messages app prefilled with the post-quote-sent intro
// (after a quote has been built + emailed). Also PATCHes introTextedAt onto the
// incoming record via persistRequests so the green "✓ intro texted" pill replaces
// the button on next render and survives reloads (server-persisted).
//
// Tyler personally sends every customer text from his iPhone (954-389-2642).
// NO automated/Twilio customer messaging — the worker is never in the loop here.
async function initIntroText(reqId, phone, firstName, address, btn) {
  if (!phone || phone.length < 10) {
    alert('Missing or invalid phone number on this request.');
    return;
  }
  const intro = `Hi ${firstName || 'there'}, it's Tyler from Pure Cleaning Pressure Cleaning — got your quote request for ${address || 'your home'}. Your full quote is on its way to your email right now. If you'd also like it by text, just reply TEXT ME and I'll send the link right here. Either way, you're all set!`;
  // 1. Open the SMS deep link FIRST so the Messages app launches synchronously
  //    (browsers gate sms: behind user-gesture; persistence below is best-effort).
  window.location.href = `sms:+1${phone.replace(/\D/g, '')}&body=${encodeURIComponent(intro)}`;

  // 2. Stamp the record + persist via existing bulk PUT (same pattern as changeStatus).
  const req = allRequests.find(r => r.id === reqId);
  if (!req) return;
  req.introTextedAt = new Date().toISOString();
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    await persistRequests();
    auditLog('intro_text_initiated', { phone, firstName, reqId, introTextedAt: req.introTextedAt, textedBy: 'operator' });
    renderTab();
  } catch (e) {
    // Roll back the in-memory stamp if the persist failed — keep the card honest.
    delete req.introTextedAt;
    if (btn) { btn.disabled = false; btn.textContent = '💬 Text intro'; }
    alert('Intro SMS opened in Messages, but we could not record it in the system. Try again or check the network.');
  }
}

// ── Status updates ─────────────────────────────────────────────────
async function changeStatus(id, newStatus, btn) {
  const origText = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const req = allRequests.find(r => r.id === id);
    if (req) {
      req.status = newStatus;
      if (newStatus === 'quoted'    && !req.quotedAt)    req.quotedAt    = new Date().toISOString();
      if (newStatus === 'dismissed' && !req.dismissedAt) req.dismissedAt = new Date().toISOString();
      if (newStatus === 'new') { req.quotedAt = null; req.dismissedAt = null; }
    }
    await persistRequests();
    lastRefresh = new Date();
    selectedIds.delete(id);
    renderTab();
    if (newStatus === 'dismissed') auditLog('dismissed_request', { id });
    if (newStatus === 'new' && req) auditLog('restored_request', { id });
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = origText; }
    alert('Update failed — check connection and try again.');
  }
}

// ── Utils ──────────────────────────────────────────────────────────
function confirmIgnore(id, name, btn) { confirmDismiss(id, name, btn); } // legacy alias

function timeAgo(iso) {
  if (!iso) return '';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m <  1)  return 'just now';
  if (m < 60)  return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Customer DB cache (verbal quote lifecycle operations) ───────────
let _customersDb = null;

async function loadCustomerDb() {
  try {
    const res = await fetch(`${PCPC_API}/customers`);
    if (!res.ok) { _knownPhones = new Set(); return; }
    const data = await res.json();
    _customersDb = data;
    _knownPhones = new Set(
      (data.customers || []).filter(c => !c.deleted)
        .map(c => (c.phone || '').replace(/\D/g, '')).filter(Boolean)
    );
  } catch { _knownPhones = new Set(); }
  renderTab();
}

async function saveCustomerDb() {
  if (!_customersDb) return;
  await fetch(`${PCPC_API}/customers`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(_customersDb)
  });
}

function findOrCreateCustomer(phone, firstName, lastName, address, city) {
  if (!_customersDb) _customersDb = { customers: [] };
  const norm = phone.replace(/\D/g, '').slice(-10);
  let c = (_customersDb.customers || []).find(x => (x.phone||'').replace(/\D/g,'').slice(-10) === norm);
  if (!c) {
    c = { id: 'cust_' + Date.now().toString(36), firstName, lastName, phone: norm, address, city,
          totalJobs: 0, lifetimeSpend: 0, jobHistory: [], quoteHistory: [] };
    _customersDb.customers.push(c);
    _knownPhones?.add(norm);
  } else {
    if (!c.firstName && firstName) c.firstName = firstName;
    if (!c.lastName  && lastName)  c.lastName  = lastName;
    if (!c.address   && address)   c.address   = address;
    if (!c.city      && city)      c.city      = city;
  }
  return c;
}

function formatPhoneInput(input) {
  let v = input.value.replace(/\D/g, '').slice(0, 10);
  if (v.length >= 6) v = '(' + v.slice(0,3) + ') ' + v.slice(3,6) + '-' + v.slice(6);
  else if (v.length >= 3) v = '(' + v.slice(0,3) + ') ' + v.slice(3);
  input.value = v;
}

// ── Confirm & Schedule ──────────────────────────────────────────────
let _csReqId = null;
function openCsModal(reqId) {
  _csReqId = reqId;
  const req = allRequests.find(r => r.id === reqId);
  const d = req?.customerData || {};
  document.getElementById('csName').textContent = ((d.firstName||'') + ' ' + (d.lastName||'')).trim() + (d.quotedPrice ? ' · $' + d.quotedPrice : '');
  const tom = new Date(); tom.setDate(tom.getDate() + 1);
  document.getElementById('csDate').value = tom.toISOString().slice(0, 10);
  document.getElementById('csNotes').value = '';
  document.getElementById('csAltPhone').value = '';
  document.getElementById('csError').style.display = 'none';
  document.getElementById('csModal').classList.add('show');
}
function closeCsModal() { document.getElementById('csModal').classList.remove('show'); _csReqId = null; }

async function submitConfirmSchedule() {
  const date = document.getElementById('csDate').value;
  if (!date) { document.getElementById('csError').textContent = 'Date required.'; document.getElementById('csError').style.display = 'block'; return; }
  document.getElementById('csError').style.display = 'none';
  const req = allRequests.find(r => r.id === _csReqId);
  if (!req) { closeCsModal(); return; }
  const d = req.customerData || {};
  const phone = (d.phone||'').replace(/\D/g,'').slice(-10);
  const notes = document.getElementById('csNotes').value.trim();
  const altPhoneRaw = (document.getElementById('csAltPhone')?.value||'').replace(/\D/g,'').slice(0,10);
  const now = new Date().toISOString();

  if (!_customersDb) await loadCustomerDb();
  const c = findOrCreateCustomer(phone, d.firstName, d.lastName, d.address, d.city);
  if (altPhoneRaw) c.altPhone = altPhoneRaw;
  const entry = (c.quoteHistory||[]).slice().reverse().find(e => e.incomingReqId === _csReqId);
  if (entry) { entry.outcome = 'confirmed'; entry.outcomeAt = now; }
  c.quoteLifecycle = null;
  const svc = d.services?.[0] || '';
  const isRoof = /roof|soft\s*wash|softwash/i.test(svc);
  if (!c.scheduledStatus) c.scheduledStatus = {};
  Object.assign(c.scheduledStatus, { state: 'scheduled', scheduledDate: date, rig: isRoof ? 'rig_3' : null, jobNotes: svc, approvedAmount: d.quotedPrice || 0, window: 'morning', ...(notes ? { scheduleNote: notes } : {}) });

  allRequests = allRequests.filter(r => r.id !== _csReqId);
  closeCsModal();
  renderTab();
  try {
    await Promise.all([persistRequests(), saveCustomerDb()]);
    const dateStr = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    showUndoToast(`✅ Scheduled ${d.firstName||'customer'} for ${dateStr}`, null, null);
    auditLog('verbal_quote_confirmed', { phone, date, service: svc });
  } catch(e) { alert('Failed to sync — check connection.'); }
}

// ── Did Not Service ─────────────────────────────────────────────────
let _dnsReqId = null;
function openDnsModal(reqId) {
  _dnsReqId = reqId;
  const req = allRequests.find(r => r.id === reqId);
  const d = req?.customerData || {};
  document.getElementById('dnsName').textContent = ((d.firstName||'') + ' ' + (d.lastName||'')).trim();
  document.getElementById('dnsReason').value = '';
  document.getElementById('dnsModal').classList.add('show');
}
function closeDnsModal() { document.getElementById('dnsModal').classList.remove('show'); _dnsReqId = null; }

async function submitDns() {
  const req = allRequests.find(r => r.id === _dnsReqId);
  if (!req) { closeDnsModal(); return; }
  const d = req.customerData || {};
  const phone = (d.phone||'').replace(/\D/g,'').slice(-10);
  const reason = document.getElementById('dnsReason').value.trim() || null;
  const now = new Date().toISOString();

  if (!_customersDb) await loadCustomerDb();
  const c = findOrCreateCustomer(phone, d.firstName, d.lastName, d.address, d.city);
  const entry = (c.quoteHistory||[]).slice().reverse().find(e => e.incomingReqId === _dnsReqId);
  if (entry) { entry.outcome = 'did_not_service'; entry.outcomeAt = now; if (reason) entry.reason = reason; }
  c.quoteLifecycle = 'did_not_service';

  allRequests = allRequests.filter(r => r.id !== _dnsReqId);
  closeDnsModal();
  renderTab();
  try {
    await Promise.all([persistRequests(), saveCustomerDb()]);
    showUndoToast(`❌ Moved ${d.firstName||'customer'} to follow-up queue`, null, null);
    auditLog('verbal_quote_dns', { phone, reason });
  } catch(e) { alert('Failed to sync — check connection.'); }
}

// ── Init ───────────────────────────────────────────────────────────
loadRequests();
loadCustomerDb(); // replaces loadKnownPhones — loads full DB for lifecycle ops
setInterval(() => loadRequests(true), 30000);
</script>
