<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="/js/error-tracker.js"></script>
<script>
/* Auth gate — do not remove */
(function(){
  var t=localStorage.getItem('admin_token');
  var e=+(localStorage.getItem('admin_token_expires')||0);
  if(!t||Date.now()>e){
    localStorage.removeItem('admin_token');localStorage.removeItem('admin_token_expires');
    location.replace('/login.html?return='+encodeURIComponent(location.pathname));
    return;
  }
  var _f=window.fetch;
  window.fetch=function(u,o){
    if(typeof u==='string'&&u.indexOf('purecleaning-api')!==-1){
      o=Object.assign({},o||{});
      o.headers=Object.assign({'Authorization':'Bearer '+(localStorage.getItem('admin_token')||'')},o.headers||{});
    }
    return _f.call(this,u,o);
  };
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<title>Pure Cleaning · Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0f1a; --panel:#111827; --panel2:#0d1524; --border:#1f2b3d;
  --text:#e5e7eb; --muted:#8494ad; --sky:#38bdf8; --gold:#f4a620;
  --green:#34d399; --red:#f87171; --grid:rgba(255,255,255,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',-apple-system,Segoe UI,Roboto,sans-serif;padding:18px;max-width:1100px;margin:0 auto;-webkit-font-smoothing:antialiased;}
a{color:var(--sky);}
.hdr{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1.5px;line-height:1;color:#fff;}
.hdr .sub{color:var(--muted);font-size:13px;}
.nav{margin:2px 0 16px;font-size:13px;}
.nav a{text-decoration:none;color:var(--muted);margin-right:14px;}
.nav a:hover{color:var(--sky);}

.banner{background:rgba(244,166,32,.10);border:1px solid rgba(244,166,32,.35);border-radius:10px;padding:10px 14px;font-size:13px;color:#fcd9a0;margin-bottom:18px;line-height:1.5;}
.banner b{color:var(--gold);}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:22px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
.card .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);font-weight:600;}
.card .big{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;margin:8px 0 2px;color:#fff;}
.card .row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--muted);margin-top:6px;}
.card .row b{color:var(--text);font-weight:600;}
.delta{font-weight:700;font-size:13px;}
.delta.up{color:var(--green);}
.delta.dn{color:var(--red);}
.delta.flat{color:var(--muted);}
.pace{font-size:12px;color:var(--muted);margin-top:4px;}

.section{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:20px;}
.section h2{font-size:16px;font-weight:600;margin-bottom:2px;color:#fff;}
.section .desc{font-size:12px;color:var(--muted);margin-bottom:14px;}
.chart-wrap{position:relative;height:300px;}
@media(max-width:640px){.chart-wrap{height:240px;}}

table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px;}
th,td{padding:7px 8px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
th:first-child,td:first-child{text-align:left;}
th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.8px;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tfoot td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;color:#fff;}
.star{color:var(--gold);cursor:help;}
.mut{color:var(--muted);}
.up{color:var(--green);} .dn{color:var(--red);}
.foot{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;}
.loading{text-align:center;color:var(--muted);padding:60px 0;}
</style>
</head>
<body>
  <div class="hdr">
    <div><h1>Business Trending</h1><div class="sub" id="genAt">Loading…</div></div>
  </div>
  <div class="nav">
    <a href="/pure_cleaning_calendar.html">← Calendar</a>
    <a href="/pure_cleaning_customer_directory.html">Directory</a>
    <a href="/pure_cleaning_review_hub.html">Reviews</a>
  </div>

  <div id="content"><div class="loading">Loading trends…</div></div>

<script>
const PCPC_BASE = 'https://purecleaning-api.tylerfumero.workers.dev';
const CRM_RELIABLE_FROM = '2026-05';   // overwritten by API response
let TRENDS = null;

const fmtMoney = n => '$' + Math.round(n||0).toLocaleString('en-US');
const fmtMoneyK = n => (Math.abs(n)>=1000) ? '$'+(Math.round(n/100)/10).toLocaleString('en-US')+'k' : '$'+Math.round(n||0);
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const ymLabel = ym => { const [y,m]=ym.split('-'); return MON[+m-1]+" '"+y.slice(2); };
const isPreCrm = ym => ym < CRM_RELIABLE_FROM;

function deltaHtml(cur, prev, opts={}){
  if(prev==null || prev===0) return '<span class="delta flat">—</span>';
  const pct = (cur - prev) / prev * 100;
  const cls = Math.abs(pct)<0.5 ? 'flat' : pct>0 ? 'up' : 'dn';
  const arw = cls==='up' ? '▲' : cls==='dn' ? '▼' : '•';
  return `<span class="delta ${cls}">${arw} ${pct>0?'+':''}${pct.toFixed(0)}%</span>`;
}

async function load(){
  let data;
  try{
    const r = await fetch(`${PCPC_BASE}/admin/analytics/trends`);
    data = await r.json();
    if(!r.ok || data.error) throw new Error(data.error || ('HTTP '+r.status));
  }catch(e){
    document.getElementById('content').innerHTML =
      `<div class="loading" style="color:var(--red)">⚠️ Failed to load: ${e.message}</div>`;
    return;
  }
  TRENDS = data;
  render(data);   // render() reads data.crmReliableFrom directly (see CRF)
}

function render(data){
  const CRF = data.crmReliableFrom || CRM_RELIABLE_FROM;
  const preCrm = ym => ym < CRF;
  const months = (data.months||[]).slice().sort((a,b)=>a.ym.localeCompare(b.ym));
  const byYm = Object.fromEntries(months.map(m=>[m.ym,m]));
  const get = ym => byYm[ym] || {ym, jobs:0, gross:0, avgTicket:0, zeroAmt:0};

  document.getElementById('genAt').textContent =
    'Completed jobs · bucketed by job date · generated ' + new Date(data.generatedAt||Date.now()).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});

  // ── current / prior month (current is in-progress → pace-adjust) ──────────────
  const now = new Date();
  const curYm  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const prevD  = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const prevYm = `${prevD.getFullYear()}-${String(prevD.getMonth()+1).padStart(2,'0')}`;
  const cur = get(curYm), prev = get(prevYm);
  const dayOfMonth  = now.getDate();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const isPartial   = dayOfMonth < daysInMonth;
  const pace = v => isPartial && dayOfMonth>0 ? Math.round(v / dayOfMonth * daysInMonth) : v;
  const paceGross = pace(cur.gross), paceJobs = pace(cur.jobs);

  // ── YTD through the LAST COMPLETE month (apples-to-apples, both years) ─────────
  const lastCompleteMonthIdx = isPartial ? now.getMonth()-1 : now.getMonth(); // 0-based; -1 if Jan partial
  const yrThis = now.getFullYear(), yrLast = yrThis-1;
  function ytd(year){
    let g=0,j=0;
    for(let mi=0; mi<=lastCompleteMonthIdx; mi++){
      const m = get(`${year}-${String(mi+1).padStart(2,'0')}`); g+=m.gross; j+=m.jobs;
    }
    return {gross:g, jobs:j, avg: j? Math.round(g/j):0};
  }
  const ytdThis = ytd(yrThis), ytdLast = ytd(yrLast);
  const ytdThrough = lastCompleteMonthIdx>=0 ? MON[lastCompleteMonthIdx] : '—';

  const avg = m => m.jobs ? Math.round(m.gross/m.jobs) : 0;

  const cardsHtml = `
    <div class="cards">
      <div class="card">
        <div class="lbl">This month · ${ymLabel(curYm)}${isPartial?' <span class="mut">(so far)</span>':''}</div>
        <div class="big">${fmtMoney(cur.gross)}</div>
        <div class="row"><span>${cur.jobs} jobs · ${fmtMoney(avg(cur))} avg</span></div>
        ${isPartial ? `<div class="pace">On pace for <b style="color:var(--text)">${fmtMoney(paceGross)}</b> · ~${paceJobs} jobs (day ${dayOfMonth}/${daysInMonth})</div>`:''}
        <div class="row"><span>vs ${ymLabel(prevYm)}: ${fmtMoney(prev.gross)} · ${prev.jobs} jobs</span>
          ${deltaHtml(isPartial?paceGross:cur.gross, prev.gross)}</div>
      </div>
      <div class="card">
        <div class="lbl">Year to date${ytdThrough!=='—'?` · Jan–${ytdThrough}`:''}</div>
        <div class="big">${fmtMoney(ytdThis.gross)}</div>
        <div class="row"><span>${ytdThis.jobs} jobs · ${fmtMoney(ytdThis.avg)} avg</span></div>
        <div class="row"><span>vs ${yrLast} same period: ${fmtMoney(ytdLast.gross)} · ${ytdLast.jobs} jobs</span>
          ${deltaHtml(ytdThis.gross, ytdLast.gross)}</div>
      </div>
      <div class="card">
        <div class="lbl">Avg ticket · YTD</div>
        <div class="big">${fmtMoney(ytdThis.avg)}</div>
        <div class="row"><span>vs ${yrLast}: ${fmtMoney(ytdLast.avg)}</span>${deltaHtml(ytdThis.avg, ytdLast.avg)}</div>
        <div class="row"><span>This month avg: ${fmtMoney(avg(cur))}</span>${deltaHtml(avg(cur), avg(prev))}</div>
      </div>
    </div>`;

  // ── trailing 12 months (ending current month) ─────────────────────────────────
  const trailing = [];
  for(let i=11;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    trailing.push(get(ym));
  }
  const anyPre = months.some(m=>preCrm(m.ym));

  const momTable = `
    <table>
      <thead><tr><th>Month</th><th>Jobs</th><th>Gross</th><th>Avg ticket</th></tr></thead>
      <tbody>${trailing.map(m=>`
        <tr>
          <td>${ymLabel(m.ym)}${preCrm(m.ym)?' <span class="star" title="CRM-recorded — may read below the master-sheet total (pre-May-2026 handoff)">*</span>':''}${m.zeroAmt?` <span class="mut" title="${m.zeroAmt} job(s) with $0/no amount">·${m.zeroAmt}×$0</span>`:''}</td>
          <td>${m.jobs}</td>
          <td>${fmtMoney(m.gross)}</td>
          <td>${m.jobs?fmtMoney(avg(m)):'—'}</td>
        </tr>`).join('')}
      </tbody>
      <tfoot><tr><td>12-mo total</td>
        <td>${trailing.reduce((s,m)=>s+m.jobs,0)}</td>
        <td>${fmtMoney(trailing.reduce((s,m)=>s+m.gross,0))}</td>
        <td>${(()=>{const j=trailing.reduce((s,m)=>s+m.jobs,0),g=trailing.reduce((s,m)=>s+m.gross,0);return j?fmtMoney(Math.round(g/j)):'—';})()}</td>
      </tr></tfoot>
    </table>`;

  // ── year-over-year (by month, across years present) ──────────────────────────
  const years = [...new Set(months.map(m=>+m.ym.slice(0,4)))].sort();
  const yoyYears = years.slice(-3); // last 3 years (auto-extends)
  const yoyTable = `
    <table>
      <thead><tr><th>Month</th>${yoyYears.map(y=>`<th>${y}</th>`).join('')}<th>${yoyYears[yoyYears.length-1]} vs ${yoyYears[yoyYears.length-2]||''}</th></tr></thead>
      <tbody>${MON.map((mn,mi)=>{
        const cells = yoyYears.map(y=>{const m=get(`${y}-${String(mi+1).padStart(2,'0')}`);return {y,g:m.gross,pre:preCrm(m.ym)};});
        const last=cells[cells.length-1].g, prevY=cells.length>1?cells[cells.length-2].g:null;
        return `<tr><td>${mn}</td>${cells.map(c=>`<td>${c.g?fmtMoney(c.g):'<span class="mut">—</span>'}${c.g&&c.pre?'<span class="star" title="pre-May-2026, CRM-recorded">*</span>':''}</td>`).join('')}
          <td>${(prevY&&last)?deltaHtml(last,prevY):'<span class="mut">—</span>'}</td></tr>`;
      }).join('')}</tbody>
      <tfoot>${(()=>{
        const tot = yoyYears.map(y=>months.filter(m=>m.ym.startsWith(y+'-')).reduce((s,m)=>s+m.gross,0));
        const last=tot[tot.length-1], prevY=tot.length>1?tot[tot.length-2]:null;
        return `<tr><td>Full year</td>${tot.map(t=>`<td>${fmtMoney(t)}</td>`).join('')}<td>${(prevY&&last)?deltaHtml(last,prevY):'—'}</td></tr>`;
      })()}</tfoot>
    </table>`;

  document.getElementById('content').innerHTML = `
    ${anyPre?`<div class="banner">⚠️ Months before <b>${ymLabel(CRF)}</b> are <b>CRM-recorded</b> (marked <span class="star">*</span>) and may read below the true totals — 2024/25 and early-2026 are csv-backfills that under-capture some months (e.g. Apr 2026 is ~43 jobs / ~$15k short vs the master). The CRM is the reliable source of record from ${ymLabel(CRF)} forward. <b>To make history exact, import the master-CSV monthly totals as the baseline for 2024, 2025 and 2026-through-April.</b></div>`:''}
    ${cardsHtml}
    <div class="section">
      <h2>Gross revenue — last 12 months</h2>
      <div class="desc">Completed jobs, bucketed by job date. Bars = gross, line = job count.</div>
      <div class="chart-wrap"><canvas id="momChart"></canvas></div>
      ${momTable}
    </div>
    <div class="section">
      <h2>Year over year</h2>
      <div class="desc">Same-month gross across ${yoyYears.join(' · ')}. Grouped bars + table with full-year totals and % change.</div>
      <div class="chart-wrap"><canvas id="yoyChart"></canvas></div>
      ${yoyTable}
    </div>
    <div class="foot">
      <span class="star">*</span> CRM-recorded month (pre-${ymLabel(CRF)}) — may be below the master-sheet total.
      &nbsp;·&nbsp; Gross = SUM(amount) of completed jobs (multi-day parents rolled up); avg ticket = gross ÷ jobs.
    </div>`;

  drawMom(trailing);
  drawYoy(months, yoyYears);
}

const AXIS = { color:'#8494ad', font:{family:'DM Sans',size:11} };
const GRID = { color:'rgba(255,255,255,.06)' };

function drawMom(trailing){
  const ctx = document.getElementById('momChart');
  new Chart(ctx, {
    data: {
      labels: trailing.map(m=>ymLabel(m.ym)),
      datasets: [
        { type:'bar', label:'Gross', data:trailing.map(m=>m.gross), yAxisID:'y',
          backgroundColor:'rgba(56,189,248,.55)', borderColor:'#38bdf8', borderWidth:1, borderRadius:4, maxBarThickness:44 },
        { type:'line', label:'Jobs', data:trailing.map(m=>m.jobs), yAxisID:'y1',
          borderColor:'#f4a620', backgroundColor:'#f4a620', tension:.3, pointRadius:3, borderWidth:2 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#e5e7eb', font:{family:'DM Sans'} } },
        tooltip:{ callbacks:{ label:c=> c.dataset.label==='Gross' ? '  Gross: '+fmtMoney(c.parsed.y) : '  Jobs: '+c.parsed.y } } },
      scales:{
        x:{ ticks:AXIS, grid:{display:false} },
        y:{ position:'left', ticks:{...AXIS, callback:v=>fmtMoneyK(v)}, grid:GRID, title:{display:true,text:'Gross',color:'#8494ad'} },
        y1:{ position:'right', ticks:AXIS, grid:{display:false}, title:{display:true,text:'Jobs',color:'#8494ad'}, beginAtZero:true },
      }
    }
  });
}

function drawYoy(months, yoyYears){
  const byYm = Object.fromEntries(months.map(m=>[m.ym,m]));
  const palette = ['#64748b','#38bdf8','#f4a620','#34d399'];
  const datasets = yoyYears.map((y,i)=>({
    label:String(y),
    data: MON.map((_,mi)=>{const m=byYm[`${y}-${String(mi+1).padStart(2,'0')}`];return m?m.gross:null;}),
    backgroundColor: palette[(palette.length-yoyYears.length+i+palette.length)%palette.length],
    borderRadius:3, maxBarThickness:22,
  }));
  new Chart(document.getElementById('yoyChart'), {
    type:'bar',
    data:{ labels:MON, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#e5e7eb', font:{family:'DM Sans'} } },
        tooltip:{ callbacks:{ label:c=> '  '+c.dataset.label+': '+(c.parsed.y==null?'—':fmtMoney(c.parsed.y)) } } },
      scales:{
        x:{ ticks:AXIS, grid:{display:false} },
        y:{ ticks:{...AXIS, callback:v=>fmtMoneyK(v)}, grid:GRID, beginAtZero:true },
      }
    }
  });
}

load();
</script>
</body>
</html>
