<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="/js/error-tracker.js"></script>
<script>
/* Auth gate — do not remove */
(function(){
  var t=localStorage.getItem('admin_token');
  var e=+(localStorage.getItem('admin_token_expires')||0);
  if(!t||Date.now()>e){
    localStorage.removeItem('admin_token');localStorage.removeItem('admin_token_expires');
    location.replace('/login.html?return='+encodeURIComponent(location.pathname+location.search));
    return;
  }
  var _f=window.fetch;
  window.fetch=function(u,o){
    if(typeof u==='string'&&u.indexOf('purecleaning-api')!==-1){
      o=Object.assign({},o||{});
      o.headers=Object.assign({'Authorization':'Bearer '+(localStorage.getItem('admin_token')||'')},o.headers||{});
    }
    return _f.call(this,u,o);
  };
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Route View — Pure Cleaning</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--sky:#2d7dd2;--gold:#f4a620;--green:#1d9e75;--red:#dc2626;--terra:#c2410c;--white:#fff;--bg:#fafaf7;--text:#1a1f2e;--muted:#6b7280;--border:#e8e2d8;--card:#fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.site-header{position:sticky;top:0;z-index:100;background:var(--navy);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.btn-back{display:flex;align-items:center;gap:6px;color:var(--white);background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .15s;}
.btn-back:hover{background:rgba(255,255,255,.2);}
.header-title{color:var(--white);font-size:15px;font-weight:700;letter-spacing:.3px;}
.header-right{width:88px;}

/* ── Tab bar ──────────────────────────────────────────────────────────────── */
.tab-bar{display:flex;gap:0;background:var(--card);border-bottom:2px solid var(--border);}
.tab-btn{padding:12px 22px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;transition:all .15s;margin-bottom:-2px;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--sky);border-bottom-color:var(--sky);}

/* ── Controls bar ─────────────────────────────────────────────────────────── */
.ctrl-bar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.ctrl-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
input[type=date]{padding:7px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--white);cursor:pointer;-webkit-appearance:none;}
input[type=date]:focus{outline:none;border-color:var(--sky);}
.btn-load{padding:7px 16px;background:var(--sky);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;}
.btn-load:hover{background:#2470c0;}
.chip-btn{padding:6px 12px;background:rgba(45,125,210,.1);border:1px solid rgba(45,125,210,.3);border-radius:8px;font-size:12px;font-weight:700;color:var(--sky);cursor:pointer;white-space:nowrap;transition:background .15s;}
.chip-btn:hover{background:rgba(45,125,210,.18);}
.nav-arrow{padding:6px 12px;background:none;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.nav-arrow:hover{border-color:var(--sky);color:var(--sky);}
.week-range-label{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;}

/* ── Day view ─────────────────────────────────────────────────────────────── */
.rig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);min-height:calc(100vh - 150px);}
.rig-col{background:var(--bg);padding:16px 14px;}
.rig-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.rig-label{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--navy);}
.rig-sub{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;}
.rig-totals{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.total-pill{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--muted);}
.total-pill span{color:var(--text);}
.timeline{display:flex;flex-direction:column;gap:0;}
.seg-drive{display:flex;align-items:center;gap:6px;padding:4px 0 4px 20px;color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;}
.seg-drive::before{content:'↓';font-size:14px;color:var(--border);}
.seg-depart,.seg-return,.seg-arrive{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(10,22,40,.06);border-radius:8px;margin:2px 0;}
.seg-depart-icon,.seg-return-icon{font-size:18px;}
.seg-depart-info,.seg-return-info{flex:1;}
.seg-depart-label,.seg-return-label{font-size:12px;font-weight:700;color:var(--navy);}
.seg-time{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px;}
.seg-stop{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin:2px 0;}
.seg-stop-icon{font-size:16px;line-height:1.4;}
.seg-stop-info{flex:1;}
.seg-stop-label{font-size:12px;font-weight:700;color:var(--navy);}
.seg-stop-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.seg-stop-unknown .seg-stop-label{color:var(--muted);}
.seg-job{display:flex;flex-direction:column;gap:3px;padding:10px 12px;background:rgba(45,125,210,.06);border:1.5px solid rgba(45,125,210,.2);border-radius:10px;margin:3px 0;}
.seg-job-name{font-size:13px;font-weight:700;color:var(--navy);}
.seg-job-addr{font-size:11px;color:var(--muted);}
.seg-job-svc{font-size:11px;font-weight:600;color:var(--terra);}
.seg-job-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:3px;}
.seg-job-dur{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);}
.conf-chip{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:10px;}
.conf-high{background:rgba(29,158,117,.15);color:#1d9e75;}
.conf-medium{background:rgba(244,166,32,.15);color:#d97706;}
.seg-job-revenue{font-size:12px;font-weight:700;color:var(--green);}

/* ── Week view ────────────────────────────────────────────────────────────── */
.week-table-wrap{overflow-x:auto;padding:16px;}
.week-table{width:100%;border-collapse:collapse;min-width:700px;}
.week-table th{padding:8px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);background:var(--card);border-bottom:2px solid var(--border);text-align:center;white-space:nowrap;}
.week-table th.col-rig{text-align:left;min-width:120px;}
.week-table td{padding:8px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:top;}
.week-table td.col-rig{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--navy);letter-spacing:.5px;white-space:nowrap;background:var(--card);}
.week-table td.col-rig .rig-sub-sm{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;}
.week-cell{min-height:60px;cursor:pointer;border-radius:6px;padding:6px 8px;transition:background .12s;}
.week-cell:hover{background:rgba(45,125,210,.07);}
.week-cell.is-today{background:rgba(244,166,32,.08);border:1px solid rgba(244,166,32,.3);}
.week-cell-empty{color:var(--muted);font-size:20px;text-align:center;padding:14px 0;opacity:.4;}
.week-cell-jobs{font-size:13px;font-weight:700;color:var(--navy);}
.week-cell-rev{font-size:11px;font-weight:700;color:var(--green);}
.week-cell-hrs{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.week-cell-conf{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:4px;vertical-align:middle;}
.week-cell-loading{text-align:center;color:var(--muted);font-size:11px;padding:8px 0;}
.week-spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
.wk-today-badge{display:inline-block;background:var(--gold);color:var(--navy);font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle;text-transform:uppercase;}

/* ── Averages view ────────────────────────────────────────────────────────── */
.avg-wrap{padding:20px;max-width:960px;margin:0 auto;}
.avg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:16px;}
@media(max-width:640px){.avg-grid{grid-template-columns:1fr;}}
.avg-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
.avg-card-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.avg-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--border);}
.avg-row:last-child{border-bottom:none;}
.avg-row-label{font-size:12px;color:var(--muted);}
.avg-row-val{font-size:13px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;}
.avg-row-sample{font-size:10px;color:var(--muted);margin-left:6px;}
.avg-insufficient{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0;}
.avg-rig-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:center;}
.avg-rig-row:last-child{border-bottom:none;}
.avg-rig-name{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--navy);min-width:100px;}
.avg-rig-stats{display:flex;gap:14px;flex-wrap:wrap;}
.avg-rig-stat{text-align:center;}
.avg-rig-stat-val{font-size:13px;font-weight:700;color:var(--text);display:block;}
.avg-rig-stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.avg-loading{display:flex;align-items:center;justify-content:center;padding:60px 0;gap:12px;color:var(--muted);}
.avg-spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite;}

/* ── Shared states ────────────────────────────────────────────────────────── */
.rig-loading{display:flex;align-items:center;justify-content:center;padding:32px 0;flex-direction:column;gap:10px;}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:32px 16px;color:var(--muted);}
.empty-state-icon{font-size:28px;margin-bottom:8px;}
.empty-state-msg{font-size:13px;line-height:1.6;}
.error-state{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);border-radius:10px;padding:12px;font-size:12px;color:var(--red);}
</style>
</head>
<body>
<header class="site-header">
  <a href="/pure_cleaning_calendar.html" class="btn-back">← Calendar</a>
  <span class="header-title">📍 Route View</span>
  <div class="header-right"></div>
</header>

<!-- Tab bar -->
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" id="tab-day"  onclick="setTab('day')" >📅 Day View</button>
  <button class="tab-btn"        id="tab-week" onclick="setTab('week')">📆 Week View</button>
  <button class="tab-btn"        id="tab-avg"  onclick="setTab('avg')" >📊 Averages</button>
</div>

<!-- Day controls -->
<div class="ctrl-bar" id="ctrl-day">
  <span class="ctrl-label">Date</span>
  <input type="date" id="datePicker">
  <button class="btn-load" onclick="loadRoute()">Load</button>
  <span class="chip-btn" onclick="goToday()">Today</span>
  <span class="chip-btn" onclick="goYesterday()">Yesterday</span>
</div>

<!-- Week controls -->
<div class="ctrl-bar" id="ctrl-week" style="display:none;">
  <button class="nav-arrow" onclick="changeWeek(-1)">‹</button>
  <span class="week-range-label" id="weekRangeLabel">—</span>
  <button class="nav-arrow" onclick="changeWeek(1)">›</button>
  <span class="chip-btn" onclick="goCurrentWeek()">This Week</span>
</div>

<!-- Averages controls -->
<div class="ctrl-bar" id="ctrl-avg" style="display:none;">
  <span class="ctrl-label">From</span>
  <input type="date" id="avgFrom">
  <span class="ctrl-label">To</span>
  <input type="date" id="avgTo">
  <button class="btn-load" onclick="loadAverages()">Load</button>
  <span class="chip-btn" onclick="setAvgPreset(30)">30 Days</span>
  <span class="chip-btn" onclick="setAvgPreset(7)">7 Days</span>
</div>

<!-- Day view -->
<div id="view-day">
  <div class="rig-grid" id="rigGrid">
    <div class="rig-col" id="col_rig_1"><div class="rig-header"><span class="rig-label">Old Tacoma</span><span class="rig-sub">rig 1</span></div><div class="rig-loading"><div class="spinner"></div></div></div>
    <div class="rig-col" id="col_rig_2"><div class="rig-header"><span class="rig-label">New Tacoma</span><span class="rig-sub">rig 2</span></div><div class="rig-loading"><div class="spinner"></div></div></div>
    <div class="rig-col" id="col_rig_3"><div class="rig-header"><span class="rig-label">Chevy</span><span class="rig-sub">rig 3 · soft wash</span></div><div class="rig-loading"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- Week view -->
<div id="view-week" style="display:none;">
  <div class="week-table-wrap">
    <table class="week-table" id="weekTable">
      <thead><tr id="weekHead"></tr></thead>
      <tbody id="weekBody"></tbody>
    </table>
  </div>
</div>

<!-- Averages view -->
<div id="view-avg" style="display:none;">
  <div class="avg-wrap">
    <div class="avg-loading" id="avgLoading"><div class="avg-spinner"></div> Loading averages…</div>
    <div id="avgCards" style="display:none;"></div>
  </div>
</div>

<script>
const API = 'https://purecleaning-api.tylerfumero.workers.dev';
const RIG_NAMES = { rig_1: 'Old Tacoma', rig_2: 'New Tacoma', rig_3: 'Chevy' };
const RIG_SUBS  = { rig_1: 'rig 1',      rig_2: 'rig 2',      rig_3: 'rig 3 · soft wash' };

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function fmtTime(iso) {
  if (!iso) return '—';
  try {
    const et = new Date(new Date(iso).getTime() - 4 * 3600000);
    const h = et.getUTCHours(), m = et.getUTCMinutes();
    return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
  } catch { return '—'; }
}
function fmtDur(min) {
  if (min == null) return '—';
  if (min < 60) return `${min}m`;
  return `${Math.floor(min/60)}h${min%60>0 ? ' '+min%60+'m' : ''}`;
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00Z'); d.setUTCDate(d.getUTCDate() + n);
  return d.toISOString().slice(0, 10);
}
function fmtShortDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00Z');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'numeric', day: 'numeric', timeZone: 'UTC' });
}
function getMonday(dateStr) { // returns Sunday of the week (Sun-Sat)
  const d = new Date(dateStr + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() - d.getUTCDay()); // back to Sunday
  return d.toISOString().slice(0, 10);
}
function today() { return new Date().toISOString().slice(0, 10); }

// ── Tab management ────────────────────────────────────────────────────────────
let currentTab = 'day';
function setTab(tab) {
  currentTab = tab;
  ['day','week','avg'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`view-${t}`).style.display = t === tab ? '' : 'none';
    document.getElementById(`ctrl-${t}`).style.display  = t === tab ? '' : 'none';
  });
  if (tab === 'week' && !_weekLoaded) loadWeek();
  if (tab === 'avg'  && !_avgLoaded)  loadAverages();
}
let _weekLoaded = false, _avgLoaded = false;

// ── Day view ──────────────────────────────────────────────────────────────────
(function initDate() {
  const p = new URLSearchParams(location.search).get('date');
  const dp = document.getElementById('datePicker');
  dp.value = p || today();
})();

function goToday()     { document.getElementById('datePicker').value = today();            loadRoute(); }
function goYesterday() { document.getElementById('datePicker').value = addDays(today(),-1); loadRoute(); }

function renderSegment(seg) {
  if (seg.type === 'drive') {
    const parts = [seg.distanceMiles != null ? `${seg.distanceMiles} mi` : '', seg.durationMin > 0 ? fmtDur(seg.durationMin) : ''].filter(Boolean).join(' · ');
    return `<div class="seg-drive">${parts || 'en route'}</div>`;
  }
  if (seg.type === 'depart' || seg.type === 'depart_unknown') {
    return `<div class="seg-depart"><span class="seg-depart-icon">${esc(seg.emoji)}</span><div class="seg-depart-info"><div class="seg-depart-label">${esc(seg.label)}</div><div class="seg-time">Depart ${fmtTime(seg.time)}</div></div></div>`;
  }
  if (seg.type === 'return' || seg.type === 'arrive') {
    return `<div class="seg-return"><span class="seg-return-icon">${esc(seg.emoji)}</span><div class="seg-return-info"><div class="seg-return-label">${esc(seg.label)}</div><div class="seg-time">Arrive ${fmtTime(seg.time)}</div></div></div>`;
  }
  if (seg.type === 'stop') {
    const cls = seg.location ? 'seg-stop' : 'seg-stop seg-stop-unknown';
    const times = [fmtTime(seg.arriveAt), fmtTime(seg.departAt)].filter(Boolean).join(' – ');
    return `<div class="${cls}"><span class="seg-stop-icon">${esc(seg.emoji||'📍')}</span><div class="seg-stop-info"><div class="seg-stop-label">${esc(seg.label||'Unknown stop')}</div><div class="seg-stop-sub">${times}${seg.durationMin != null ? ' · '+fmtDur(seg.durationMin) : ''}</div></div></div>`;
  }
  if (seg.type === 'job') {
    const confCls = seg.confidence === 'matched_high' ? 'conf-high' : 'conf-medium';
    const confLbl = seg.confidence === 'matched_high' ? 'GPS High' : 'GPS Med';
    const rev     = seg.amount ? `<span class="seg-job-revenue">$${Number(seg.amount).toLocaleString()}</span>` : '';
    const isRoofSeg = /roof|soft\s*wash|softwash/i.test(seg.service || '');
    const storyBadge = isRoofSeg && seg.roofStories != null ? `<span style="display:inline-block;font-size:9px;font-weight:700;background:rgba(194,65,12,.12);color:#c2410c;border-radius:10px;padding:1px 6px;margin-left:4px;">${seg.roofStories}-story</span>` : '';
    return `<div class="seg-job">
      <div class="seg-job-name">${esc(seg.customer||'Unknown Customer')}</div>
      ${seg.address ? `<div class="seg-job-addr">📍 ${esc(seg.address)}${seg.city?', '+esc(seg.city):''}</div>` : ''}
      ${seg.service ? `<div class="seg-job-svc">${esc(seg.service.slice(0,60))}${storyBadge}</div>` : ''}
      <div class="seg-job-meta"><span class="seg-job-dur">${fmtTime(seg.arriveAt)} – ${fmtTime(seg.departAt)}${seg.durationMin != null ? ' · '+fmtDur(seg.durationMin) : ''}</span><span class="conf-chip ${confCls}">${confLbl}</span>${rev}</div>
    </div>`;
  }
  return '';
}

function renderRigColumn(rig, data) {
  const col = document.getElementById(`col_${rig}`);
  if (!col) return;
  const hdr = `<div class="rig-header"><span class="rig-label">${RIG_NAMES[rig]||rig}</span><span class="rig-sub">${RIG_SUBS[rig]||''}</span></div>`;
  if (data.error && !data.segments?.length) { col.innerHTML = hdr + `<div class="error-state">⚠️ ${esc(data.error)}</div>`; return; }
  if (data.noData || !data.segments?.length) {
    col.innerHTML = hdr + `<div class="empty-state"><div class="empty-state-icon">🛣️</div><div class="empty-state-msg">No GPS data for ${esc(data.date||'')}.<br>Check back after 3 AM UTC Bouncie sync.</div></div>`;
    return;
  }
  const t = data.totals || {};
  const pills = [
    t.jobCount    ? `<span class="total-pill">${t.jobCount} job${t.jobCount===1?'':'s'}</span>` : '',
    t.totalRevenue? `<span class="total-pill">$${Number(t.totalRevenue).toLocaleString()}</span>` : '',
    t.totalActiveHours ? `<span class="total-pill"><span>${t.totalActiveHours}h</span> on jobs</span>` : '',
    t.totalDriveMin    ? `<span class="total-pill"><span>${fmtDur(t.totalDriveMin)}</span> driving</span>` : '',
  ].filter(Boolean).join('');
  col.innerHTML = hdr + (pills?`<div class="rig-totals">${pills}</div>`:'') + `<div class="timeline">${(data.segments||[]).map(renderSegment).join('')}</div>`;
}

async function loadRoute() {
  const date = document.getElementById('datePicker').value;
  if (!date) return;
  history.replaceState(null, '', `${location.pathname}?date=${date}`);
  ['rig_1','rig_2','rig_3'].forEach(rig => {
    const col = document.getElementById(`col_${rig}`);
    if (col) col.innerHTML = `<div class="rig-header"><span class="rig-label">${RIG_NAMES[rig]}</span><span class="rig-sub">${RIG_SUBS[rig]}</span></div><div class="rig-loading"><div class="spinner"></div></div>`;
  });
  try {
    const res = await fetch(`${API}/admin/day-route?date=${date}`);
    const body = await res.json();
    if (!res.ok) { ['rig_1','rig_2','rig_3'].forEach(rig => { const c=document.getElementById(`col_${rig}`); if(c) c.innerHTML=`<div class="rig-header"><span class="rig-label">${RIG_NAMES[rig]}</span></div><div class="error-state">${esc(body.error||`HTTP ${res.status}`)}</div>`; }); return; }
    const rigs = body.rigs || {};
    ['rig_1','rig_2','rig_3'].forEach(rig => renderRigColumn(rig, rigs[rig] || { rig, date, noData: true, segments: [], totals: {} }));
  } catch(e) {
    ['rig_1','rig_2','rig_3'].forEach(rig => { const c=document.getElementById(`col_${rig}`); if(c) c.innerHTML=`<div class="rig-header"><span class="rig-label">${RIG_NAMES[rig]}</span></div><div class="error-state">Network error: ${esc(e.message)}</div>`; });
    try { navigator.sendBeacon(API+'/errors/log', JSON.stringify({source:'day_route_load',page:'pure_cleaning_day_route.html',errorType:(e&&e.name)||'Error',message:((e&&e.message)||'').slice(0,500),url:location.href,timestamp:new Date().toISOString()})); } catch {}
  }
}

// ── Week view ─────────────────────────────────────────────────────────────────
let weekOffset = 0; // 0 = current week (Sun–Sat)

function getWeekSunday() {
  const d = new Date(today() + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() - d.getUTCDay() + weekOffset * 7);
  return d.toISOString().slice(0, 10);
}

function changeWeek(dir) { weekOffset += dir; loadWeek(); }
function goCurrentWeek() { weekOffset = 0; loadWeek(); }

async function loadWeek() {
  _weekLoaded = true;
  const sun = getWeekSunday();
  const dates = Array.from({length: 7}, (_, i) => addDays(sun, i));
  const todayStr = today();

  // Update nav label
  document.getElementById('weekRangeLabel').textContent =
    `${fmtShortDate(dates[0])} – ${fmtShortDate(dates[6])}`;

  // Build table skeleton with loading cells
  const thead = document.getElementById('weekHead');
  const tbody = document.getElementById('weekBody');
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  thead.innerHTML = `<th class="col-rig">Rig</th>` +
    dates.map((d, i) => {
      const isToday = d === todayStr;
      return `<th>${DOW[i]} ${d.slice(5).replace('-','/')}&nbsp;${isToday ? '<span class="wk-today-badge">today</span>' : ''}</th>`;
    }).join('');

  const RIGS = ['rig_1','rig_2','rig_3'];
  tbody.innerHTML = RIGS.map(rig =>
    `<tr>
      <td class="col-rig">${RIG_NAMES[rig]}<span class="rig-sub-sm">${RIG_SUBS[rig]}</span></td>
      ${dates.map(d => `<td id="wk_${rig}_${d}"><div class="week-cell-loading"><span class="week-spinner"></span></div></td>`).join('')}
    </tr>`
  ).join('');

  // Fetch all 7 days in parallel
  await Promise.all(dates.map(async date => {
    try {
      const res  = await fetch(`${API}/admin/day-route?date=${date}`);
      const body = res.ok ? await res.json() : { rigs: {} };
      const rigs = body.rigs || {};
      RIGS.forEach(rig => {
        const cell = document.getElementById(`wk_${rig}_${date}`);
        if (!cell) return;
        const data = rigs[rig] || {};
        cell.innerHTML = renderWeekCell(data, date, rig);
      });
    } catch {
      RIGS.forEach(rig => {
        const cell = document.getElementById(`wk_${rig}_${date}`);
        if (cell) cell.innerHTML = `<div class="week-cell-empty">err</div>`;
      });
    }
  }));
}

function renderWeekCell(data, date, rig) {
  const isToday = date === today();
  const cls = `week-cell${isToday ? ' is-today' : ''}`;
  const onclick = `onclick="jumpToDayView('${date}')"`;
  if (data.noData || !data.segments?.length) {
    return `<div class="${cls}" ${onclick}><div class="week-cell-empty">—</div></div>`;
  }
  const t = data.totals || {};
  const jobJobs = data.segments?.filter(s => s.type === 'job') || [];
  const jobCount = t.jobCount || jobJobs.length;
  const revStr   = t.totalRevenue ? `$${Number(t.totalRevenue).toLocaleString()}` : '';
  const hrsStr   = t.totalActiveHours ? `${t.totalActiveHours}h` : '';
  const driveStr = t.totalDriveMin   ? `${fmtDur(t.totalDriveMin)} drive` : '';
  const highConf = jobJobs.filter(j => j.confidence === 'matched_high').length;
  const confDot  = jobCount > 0 ? `<span class="week-cell-conf" style="background:${highConf===jobCount?'#1d9e75':highConf>0?'#d97706':'#aaa'};" title="${highConf}/${jobCount} GPS high"></span>` : '';
  return `<div class="${cls}" ${onclick}>
    <div class="week-cell-jobs">${jobCount} job${jobCount===1?'':'s'}${confDot}</div>
    ${revStr ? `<div class="week-cell-rev">${revStr}</div>` : ''}
    ${(hrsStr||driveStr) ? `<div class="week-cell-hrs">${[hrsStr,driveStr].filter(Boolean).join(' · ')}</div>` : ''}
  </div>`;
}

function jumpToDayView(date) {
  document.getElementById('datePicker').value = date;
  setTab('day');
  loadRoute();
}

// ── Averages view ─────────────────────────────────────────────────────────────
(function initAvgDates() {
  const to = today();
  const fr = addDays(to, -30);
  document.getElementById('avgTo').value   = to;
  document.getElementById('avgFrom').value = fr;
})();

function setAvgPreset(days) {
  document.getElementById('avgTo').value   = today();
  document.getElementById('avgFrom').value = addDays(today(), -days);
  loadAverages();
}

async function loadAverages() {
  _avgLoaded = true;
  const from = document.getElementById('avgFrom').value;
  const to   = document.getElementById('avgTo').value;
  document.getElementById('avgLoading').style.display = 'flex';
  document.getElementById('avgCards').style.display   = 'none';

  try {
    const res  = await fetch(`${API}/admin/day-route/averages?from=${from}&to=${to}`);
    const data = res.ok ? await res.json() : null;
    document.getElementById('avgLoading').style.display = 'none';
    if (!data) { document.getElementById('avgCards').innerHTML = `<div class="error-state">Failed to load averages (HTTP ${res.status})</div>`; document.getElementById('avgCards').style.display = ''; return; }
    document.getElementById('avgCards').innerHTML = renderAveragesCards(data);
    document.getElementById('avgCards').style.display = '';
  } catch(e) {
    document.getElementById('avgLoading').style.display = 'none';
    document.getElementById('avgCards').innerHTML = `<div class="error-state">Network error: ${esc(e.message)}</div>`;
    document.getElementById('avgCards').style.display = '';
  }
}

function renderAveragesCards(data) {
  const MIN_SAMPLE = 3;
  const fmtMin = m => m == null ? '—' : fmtDur(m);
  const sampleNote = n => n > 0 ? `<span class="avg-row-sample">n=${n}</span>` : '';
  const insufficientMsg = `<div class="avg-insufficient">Insufficient data — need ${MIN_SAMPLE}+ observations</div>`;

  // Morning Routine card
  const d7 = data.dwellAverages?.['7eleven'] || {};
  const dp = data.dwellAverages?.proline    || {};
  const morningCard = `<div class="avg-card">
    <div class="avg-card-title">☀️ Morning Routine</div>
    <div class="avg-row"><span class="avg-row-label">⛽ 7-Eleven dwell</span><span class="avg-row-val">${fmtMin(d7.avgMinutes || d7.allTimeAvgMinutes)} avg / ${fmtMin(d7.median)} med${sampleNote(d7.sampleSize || d7.allTimeSampleSize)}</span></div>
    <div class="avg-row"><span class="avg-row-label">🧪 Pro-Line dwell</span><span class="avg-row-val">${fmtMin(dp.avgMinutes || dp.allTimeAvgMinutes)} avg / ${fmtMin(dp.median)} med${sampleNote(dp.sampleSize || dp.allTimeSampleSize)}</span></div>
    <div class="avg-row"><span class="avg-row-label">🏠 Home departure</span><span class="avg-row-val" style="color:var(--muted);font-size:11px;">Not yet accumulated</span></div>
    <div style="font-size:10px;color:var(--muted);margin-top:8px;">All-time rolling averages from Bouncie cron</div>
  </div>`;

  // Drive times card
  const dr = data.driveSegmentAverages || {};
  const bj = dr.between_jobs || {};
  const driveCard = `<div class="avg-card">
    <div class="avg-card-title">🚗 Drive Times</div>
    ${bj.sampleSize >= MIN_SAMPLE
      ? `<div class="avg-row"><span class="avg-row-label">Between jobs</span><span class="avg-row-val">${fmtMin(bj.avgMinutes)} avg / ${fmtMin(bj.median)} med${sampleNote(bj.sampleSize)}</span></div>`
      : `<div class="avg-row"><span class="avg-row-label">Between jobs</span><span class="avg-row-val" style="color:var(--muted);">—${sampleNote(bj.sampleSize||0)}</span></div>`}
    ${['home_to_7eleven','7eleven_to_proline','proline_to_first_job','last_job_to_home'].map(k => {
      const seg = dr[k] || {};
      const lbl = k.replace(/_/g,' ').replace('7eleven','7-Eleven').replace('proline','Pro-Line');
      return `<div class="avg-row"><span class="avg-row-label">${lbl}</span><span class="avg-row-val" style="color:var(--muted);font-size:11px;">accumulating…</span></div>`;
    }).join('')}
  </div>`;

  // Rig performance card
  const rigs = data.rigStats || {};
  const rigRows = ['rig_1','rig_2','rig_3'].map(rig => {
    const r = rigs[rig] || {};
    if (!r.jobCount) return `<div class="avg-rig-row"><span class="avg-rig-name">${RIG_NAMES[rig]}</span><span style="color:var(--muted);font-size:12px;">No data in range</span></div>`;
    return `<div class="avg-rig-row">
      <span class="avg-rig-name">${RIG_NAMES[rig]}</span>
      <div class="avg-rig-stats">
        <div class="avg-rig-stat"><span class="avg-rig-stat-val">${r.jobCount}</span><span class="avg-rig-stat-label">jobs</span></div>
        ${r.avgRevenue   ? `<div class="avg-rig-stat"><span class="avg-rig-stat-val">$${r.avgRevenue}</span><span class="avg-rig-stat-label">avg rev</span></div>` : ''}
        ${r.totalActiveHours ? `<div class="avg-rig-stat"><span class="avg-rig-stat-val">${r.totalActiveHours}h</span><span class="avg-rig-stat-label">active</span></div>` : ''}
        ${r.avgJobDuration && r.sampleSize >= MIN_SAMPLE ? `<div class="avg-rig-stat"><span class="avg-rig-stat-val">${fmtDur(r.avgJobDuration)}</span><span class="avg-rig-stat-label">avg job</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
  const rigCard = `<div class="avg-card"><div class="avg-card-title">🚚 Rig Performance</div>${rigRows || insufficientMsg}</div>`;

  // Service type card
  const svc = data.serviceTypeAverages || {};
  const svcLabels = { roof: '🏠 Roof / Soft Wash', ground: '🛣️ Ground Only', both: '🏠🛣️ Roof + Ground', unknown: '❓ Unknown' };
  const svcRows = Object.entries(svc).map(([k, v]) => {
    if (!v || v.sampleSize < MIN_SAMPLE) return `<div class="avg-row"><span class="avg-row-label">${svcLabels[k]||k}</span><span class="avg-row-val" style="color:var(--muted);">— ${sampleNote(v?.sampleSize||0)}</span></div>`;
    return `<div class="avg-row"><span class="avg-row-label">${svcLabels[k]||k}</span><span class="avg-row-val">${fmtMin(v.avgMinutes)} avg / ${fmtMin(v.median)} med${sampleNote(v.sampleSize)}</span></div>`;
  }).join('');
  const svcCard = `<div class="avg-card"><div class="avg-card-title">⏱️ Service Durations</div>${svcRows || insufficientMsg}</div>`;

  // Geographic card
  const geo = data.geographicSpread || {};
  const geoRows = Object.entries(geo).slice(0, 10).map(([city, d]) =>
    `<div class="avg-row"><span class="avg-row-label">${esc(city)}</span><span class="avg-row-val">${d.jobCount} jobs${d.avgJobMinutes != null ? ' · '+fmtDur(d.avgJobMinutes)+' avg' : ''}</span></div>`
  ).join('');
  const geoCard = `<div class="avg-card"><div class="avg-card-title">🗺️ Geographic Spread</div>${geoRows || insufficientMsg}</div>`;

  const meta = `<div style="font-size:11px;color:var(--muted);margin-bottom:12px;">${data.periodStart} → ${data.periodEnd} · ${data.sampleDays} days</div>`;
  return meta + `<div class="avg-grid">${morningCard}${driveCard}${rigCard}${svcCard}${geoCard}</div>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
// Check URL for tab param
(function boot() {
  const tab = new URLSearchParams(location.search).get('tab');
  if (tab === 'week' || tab === 'avg') { setTab(tab); }
  else { loadRoute(); } // default: day view
})();
</script>
