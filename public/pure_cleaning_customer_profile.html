<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<script src="/js/error-tracker.js"></script>
<script>
/* Auth gate — do not remove */
(function(){
  var t=localStorage.getItem('admin_token');
  var e=+(localStorage.getItem('admin_token_expires')||0);
  if(!t||Date.now()>e){
    localStorage.removeItem('admin_token');localStorage.removeItem('admin_token_expires');
    location.replace('/login.html?return='+encodeURIComponent(location.pathname));
    return;
  }
  var _f=window.fetch;
  window.fetch=function(u,o){
    if(typeof u==='string'&&u.indexOf('purecleaning-api')!==-1){
      o=Object.assign({},o||{});
      o.headers=Object.assign({'Authorization':'Bearer '+(localStorage.getItem('admin_token')||'')},o.headers||{});
    }
    return _f.call(this,u,o);
  };
})();
</script>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Customer Profile — Pure Cleaning</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy:   #0a1628;
  --sky:    #2d7dd2;
  --gold:   #f4a620;
  --green:  #1d9e75;
  --terra:  #c2410c;
  --red:    #e53e3e;
  --white:  #fff;
  --bg:     #fdf8f2;
  --text:   #1a1f2e;
  --muted:  #6b7280;
  --border: #e8e2d8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── Header ── */
.site-header{
  position:sticky;top:0;z-index:100;
  background:var(--navy);
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.btn-back{
  display:flex;align-items:center;gap:6px;
  color:var(--white);background:rgba(255,255,255,.1);
  border:none;border-radius:8px;padding:6px 12px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;text-decoration:none;transition:background .15s;
}
.btn-back:hover{background:rgba(255,255,255,.2);}
.header-logo{
  position:absolute;left:50%;transform:translateX(-50%);
  color:var(--white);font-size:16px;font-weight:800;letter-spacing:.3px;
  pointer-events:none;
}
.header-right{width:88px;}

/* ── Loading / Error ── */
.state-page{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100vh - 56px);gap:16px;padding:2rem;
}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-icon{font-size:48px;}
.state-title{font-size:20px;font-weight:700;color:var(--navy);}
.state-sub{font-size:14px;color:var(--muted);text-align:center;max-width:320px;}
.btn-primary{
  display:inline-block;padding:10px 22px;background:var(--sky);color:var(--white);
  border-radius:9px;font-size:14px;font-weight:700;text-decoration:none;
  border:none;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:opacity .15s;
}
.btn-primary:hover{opacity:.88;}

/* ── Hero ── */
.hero{background:linear-gradient(160deg,#fff8f4 0%,var(--bg) 100%);border-bottom:1.5px solid var(--border);padding:28px 20px 24px;}
.hero-inner{max-width:1100px;margin:0 auto;}
.hero-name{font-size:28px;font-weight:800;color:var(--navy);letter-spacing:.3px;line-height:1.1;margin-bottom:4px;}
.hero-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}

/* ── Hero Banner Warmth ── */
.hero-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:800;letter-spacing:.4px;margin-bottom:10px;}
.hero-contact-line{display:flex;flex-wrap:wrap;align-items:center;gap:4px 12px;margin-top:5px;font-size:14px;color:var(--muted);}
.hero-contact-line a{color:var(--text);font-weight:500;text-decoration:none;}
.hero-contact-line a:hover{color:var(--sky);}
.hero-divider{height:1px;background:var(--border);margin:18px 0 14px;}
.hero-stats-row{display:flex;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;background:var(--white);margin-bottom:12px;}
.hero-stat{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border);}
.hero-stat:last-child{border-right:none;}
.hero-stat-icon{font-size:15px;margin-bottom:2px;}
.hero-stat-val{font-size:19px;font-weight:800;color:var(--terra);}
.hero-stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:2px;}
.hero-last-svc{font-size:13px;color:var(--muted);background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:14px;display:inline-block;}
.hero-new-msg{font-size:13px;color:#15803d;font-weight:600;background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:8px 13px;margin-bottom:14px;display:inline-block;}

/* ── Service History Cards (Phase 2) ── */
.zone-heading{display:flex;align-items:baseline;gap:.625rem;margin-bottom:1rem;}
.zone-heading h2{font-size:17px;font-weight:800;color:var(--navy);}
.svc-count-badge{font-size:11.5px;font-weight:600;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 10px;color:var(--muted);}
.job-card{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:1rem 1.125rem .875rem;margin-bottom:.625rem;}
.job-card:last-of-type{margin-bottom:0;}
.job-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.5rem;}
.job-date{font-size:15px;font-weight:800;color:var(--navy);}
.job-days{font-size:11.5px;font-weight:600;padding:2px 8px;border-radius:10px;margin-left:.45rem;vertical-align:middle;display:inline-block;}
.job-days.green{background:rgba(29,158,117,.1);color:var(--green);border:1px solid rgba(29,158,117,.2);}
.job-days.amber{background:rgba(217,119,6,.1);color:#d97706;border:1px solid rgba(217,119,6,.2);}
.job-days.muted{background:rgba(107,114,128,.08);color:var(--muted);border:1px solid rgba(107,114,128,.15);}
.job-amount{font-size:22px;font-weight:800;color:var(--gold);white-space:nowrap;}
.job-services{font-size:14.5px;color:#2d3748;line-height:1.55;margin-bottom:.625rem;}
.job-story-badge{display:inline-block;font-size:10px;font-weight:700;background:rgba(194,65,12,.1);color:var(--terra);border-radius:10px;padding:1px 7px;margin-left:4px;}
.job-status-chip{display:inline-block;font-size:11px;font-weight:700;border-radius:10px;padding:2px 8px;margin-left:.45rem;vertical-align:middle;}
.job-status-scheduled,.job-status-needs_scheduling{background:#eff6ff;color:#1d4ed8;}
.job-status-canceled,.job-status-no_show{background:#f1f5f9;color:#475569;}
.job-meta{display:flex;flex-wrap:wrap;gap:.45rem;padding-top:.625rem;border-top:1px solid var(--border);}
.job-meta-chip{font-size:11.5px;color:var(--muted);background:var(--white);border:1px solid var(--border);border-radius:5px;padding:2px 8px;display:inline-flex;align-items:center;gap:.3rem;}
.chip-label{color:#9ca3af;font-weight:500;}
.job-card-upcoming{border-top:3px solid var(--sky);background:var(--white);}
.job-card-canceled{opacity:.65;}
.show-all-btn{width:100%;margin-top:.75rem;background:var(--white);border:1.5px solid var(--border);border-radius:9px;color:var(--sky);font-size:13px;font-weight:700;padding:.625rem 1rem;cursor:pointer;text-align:center;transition:all .15s;font-family:'DM Sans',sans-serif;}
.show-all-btn:hover{border-color:var(--sky);background:#eff6ff;}
.show-all-btn .arrow{display:inline-block;transition:transform .2s;margin-left:.35rem;}
.show-all-btn.open .arrow{transform:rotate(180deg);}
.svc-empty{padding:2rem 0;text-align:center;font-size:14px;color:var(--muted);}
.svc-legacy-note{font-size:12px;color:var(--muted);text-align:center;padding:.625rem 0 0;font-style:italic;}
.prop-attr-strip{font-size:12.5px;color:var(--muted);margin-top:.5rem;line-height:1.5;}

/* ── Context Blocks ── */
.ctx-blocks{max-width:1100px;margin:0 auto;padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.ctx-block{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;align-items:flex-start;gap:10px;}
.ctx-block-red{border-left:4px solid #ef4444;}
.ctx-block-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px;}
.ctx-block-text{font-size:13px;color:var(--muted);line-height:1.5;}
.action-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;
  text-decoration:none;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;
  transition:opacity .15s;
}
.action-btn:hover{opacity:.85;}
.action-btn-call{background:var(--green);color:var(--white);}
.action-btn-text{background:var(--sky);color:var(--white);}
.action-btn-notes{background:var(--gold);color:var(--navy);}
.action-btn-email{background:#8b5cf6;color:var(--white);}

/* ── Stats Bar ── */
.stats-bar{background:var(--white);border-bottom:1.5px solid var(--border);}
.stats-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);}
.stat-cell{padding:16px 12px;text-align:center;border-right:1px solid var(--border);position:relative;}
.stat-cell:last-child{border-right:none;}
.stat-cell::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cell-color,var(--sky));border-radius:0;}
.stat-val{font-size:22px;font-weight:800;color:var(--navy);}
.stat-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.tier-chip{
  display:inline-block;padding:3px 10px;border-radius:12px;
  font-size:12px;font-weight:800;letter-spacing:.5px;color:var(--white);
  background:var(--tier-color,#6b7280);
}

/* ── Callouts ── */
.callouts{max-width:1100px;margin:16px auto 0;padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.callout{
  padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;
  border:1.5px solid transparent;display:flex;align-items:flex-start;gap:8px;
}
.callout-red{background:#fef2f2;border-color:#fca5a5;color:#991b1b;}
.callout-amber{background:#fffbeb;border-color:#fde68a;color:#92400e;}
.callout-purple{background:#f5f3ff;border-color:#c4b5fd;color:#5b21b6;}
.callout-blue{background:#eff6ff;border-color:#93c5fd;color:#1e40af;}
.callout-gray{background:#f8fafc;border-color:#cbd5e1;color:#475569;}
.callout-green{background:#f0fdf4;border-color:#86efac;color:#14532d;}

/* ── Panel base (matches Zone 1/2 card treatment) ── */
.panel{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:.875rem;}
.panel-header{padding:.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:14px;font-weight:800;color:var(--navy);}
.panel-body{padding:1rem 1.25rem;}

/* ── Complaints card (Zone 2) ── */
.complaints-card{background:var(--white);border:1.5px solid #fca5a5;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:.875rem;}
.complaints-header{display:flex;align-items:flex-start;gap:.75rem;padding:.875rem 1.25rem;background:#fff5f5;border-bottom:1.5px solid #fca5a5;}
.complaints-alarm{font-size:20px;flex-shrink:0;margin-top:1px;}
.complaints-title{font-size:14px;font-weight:800;color:#991b1b;}
.complaints-subtitle{font-size:11.5px;color:#b91c1c;font-weight:600;margin-top:2px;}
.complaints-body{padding:1rem 1.25rem;}
.complaint-item{background:#fff9f9;border:1px solid #fecaca;border-radius:10px;padding:.75rem .875rem;margin-bottom:.625rem;}
.complaint-item:last-child{margin-bottom:0;}
.complaint-item-row{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.25rem;}
.complaint-type-label{font-size:13px;font-weight:700;color:#dc2626;}
.complaint-date{font-size:11px;color:#9ca3af;white-space:nowrap;}
.complaint-desc{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:.25rem;}
.complaint-res{font-size:11px;color:#9ca3af;}
.complaint-res.resolved{color:var(--green);}

/* ── Main Layout (unused in Zone 3 but kept for other potential callers) ── */
.main-content{display:grid;grid-template-columns:1fr;gap:0;}

/* ── Timeline ── */
.tl-filters{display:flex;gap:6px;flex-wrap:wrap;}
.tl-filter-btn{
  padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;
  border:1.5px solid var(--border);background:transparent;color:var(--muted);
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;
}
.tl-filter-btn.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
.tl-filter-btn:hover:not(.active){background:var(--bg);}

.timeline{padding:16px;position:relative;}
.timeline::before{
  content:'';position:absolute;left:30px;top:0;bottom:0;width:2px;
  background:var(--border);
}
.tl-entry{display:flex;gap:12px;margin-bottom:20px;position:relative;}
.tl-entry:last-child{margin-bottom:0;}
.tl-dot-wrap{flex-shrink:0;width:28px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;}
.tl-dot{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;background:var(--white);border:2px solid var(--border);
  box-shadow:0 0 0 3px var(--white);
}
.tl-card{
  flex:1;background:var(--white);border:1.5px solid var(--border);
  border-radius:11px;padding:10px 13px;min-width:0;
  border-left:3px solid var(--entry-color,var(--border));
}
.tl-date{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px;}
.tl-title{font-size:14px;font-weight:700;color:var(--navy);}
.tl-note{font-size:12px;color:var(--muted);margin-top:3px;}
.tl-rows{margin-top:8px;border-top:1px solid var(--border);padding-top:7px;display:flex;flex-direction:column;gap:3px;}
.tl-row{display:flex;justify-content:space-between;font-size:12px;}
.tl-row-label{color:var(--muted);}
.tl-row-val{font-weight:600;color:var(--text);}
.tl-empty{padding:2rem 1rem;text-align:center;color:var(--muted);font-size:14px;}

/* ── Sidebar panels ── */
.sidebar-stack{display:flex;flex-direction:column;gap:14px;}
.contact-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.contact-row:last-child{border-bottom:none;}
.contact-icon{width:28px;height:28px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.contact-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px;}
.contact-val{font-weight:600;color:var(--text);}
.contact-val a{color:var(--sky);text-decoration:none;}
.contact-val a:hover{text-decoration:underline;}
.source-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;background:var(--bg);color:var(--muted);border:1px solid var(--border);}

.qa-btn{
  display:flex;align-items:center;gap:8px;width:100%;padding:10px 13px;
  border:1.5px solid var(--border);border-radius:9px;background:var(--white);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;
  color:var(--text);text-decoration:none;cursor:pointer;
  transition:border-color .15s,background .15s;margin-bottom:6px;
}
.qa-btn:last-child{margin-bottom:0;}
.qa-btn:hover{border-color:var(--sky);background:var(--bg);}

/* ── Notes Section ── */
.notes-section{margin-top:20px;}
.note-entry{
  background:var(--white);border:1.5px solid var(--border);border-radius:11px;
  padding:12px 14px;margin-bottom:10px;
}
.note-header{display:flex;justify-content:space-between;margin-bottom:6px;}
.note-author{font-size:12px;font-weight:700;color:var(--sky);}
.note-date{font-size:11px;color:var(--muted);}
.note-text{font-size:14px;color:var(--text);line-height:1.5;}
.note-legacy{background:#fffbeb;border-color:#fde68a;}
.add-note-area{background:var(--white);border:1.5px solid var(--border);border-radius:11px;padding:14px;margin-top:10px;}
.add-note-area textarea{
  width:100%;min-height:80px;padding:9px 12px;
  border:1.5px solid var(--border);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);
  background:var(--bg);resize:vertical;outline:none;
}
.add-note-area textarea:focus{border-color:var(--sky);}
.add-note-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;}
.btn-save-note{
  padding:8px 18px;background:var(--sky);color:var(--white);
  border:none;border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
}
.btn-save-note:hover{opacity:.88;}
.btn-cancel-note{
  padding:8px 14px;background:transparent;color:var(--muted);
  border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;
}
.btn-cancel-note:hover{background:var(--bg);}
.btn-add-note{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;background:transparent;color:var(--sky);
  border:1.5px solid var(--sky);border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;
}
.btn-add-note:hover{background:#eff6ff;}

/* ── Collapsible extended sections ── */
.xsec { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
.xsec summary { display: flex; align-items: center; justify-content: space-between; padding: .875rem 1.25rem; cursor: pointer; list-style: none; user-select: none; -webkit-tap-highlight-color: transparent; }
.xsec summary::-webkit-details-marker { display: none; }
.xsec summary:hover { background: var(--bg); }
.xsec[open] summary { border-bottom: 1px solid var(--border); }
.xsec-title { font-size: 14px; font-weight: 800; color: var(--navy); display: flex; align-items: center; gap: 8px; }
.xsec-badge { font-size: 11px; font-weight: 700; background: var(--bg); color: var(--muted); border: 1px solid var(--border); border-radius: 10px; padding: 2px 8px; }
.xsec-arrow { font-size: 14px; color: var(--muted); transition: transform .2s; }
.xsec[open] .xsec-arrow { transform: rotate(90deg); }
.xsec-body { padding: 1rem 1.25rem; }
.xsec-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 10px; }
.xsec-row:last-child { border-bottom: none; }
.xsec-row-label { color: var(--muted); font-weight: 500; flex-shrink: 0; }
.xsec-row-val { font-weight: 600; color: var(--text); text-align: right; }
.xsec-empty { color: var(--muted); font-size: 13px; padding: 8px 0; font-style: italic; }
.xsec-action-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1.5px solid var(--border); background: var(--white); color: var(--text); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .12s; text-decoration: none; }
.xsec-action-btn:hover { border-color: var(--sky); color: var(--sky); }
.xsec-action-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.quick-actions-strip { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 16px; background: var(--bg); border-top: 1.5px solid var(--border); }
.qa-strip-btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; border-radius: 9px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity .15s; text-decoration: none; white-space: nowrap; min-height: 44px; }
.qa-strip-btn:hover { opacity: .85; }
/* ── Mobile adjustments ── */
@media(max-width:767px){
  .stats-inner{grid-template-columns:repeat(3,1fr);}
  .hero-name{font-size:22px;}
  .stat-val{font-size:18px;}
  .hero-stat-val{font-size:16px;}
}
@media(max-width:480px){
  .stats-inner{grid-template-columns:repeat(3,1fr);}
  .hero-stat{padding:10px 4px;}
  .hero-stat-val{font-size:14px;}
  .hero-stat-icon{font-size:12px;}
  .hero-stat-label{font-size:9px;}
  .ctx-blocks{padding:0 12px;}
}
.gal-thumb-wrap{border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:var(--border);position:relative;}
.gal-thumb-wrap:hover .gal-thumb-inner{filter:brightness(.85);}
.gal-thumb-inner{width:100%;height:100%;transition:filter .15s;}
.gal-thumb-inner img{width:100%;height:100%;object-fit:cover;display:block;}
.gal-thumb-loading{display:flex;align-items:center;justify-content:center;height:100%;font-size:18px;color:var(--muted);}

/* ── Job Photos section (R2-backed, Batch 4 read surface) ──────────────────
   Groups by job (date + service). Thumbs auth'd via fetch → objectURL.
   Before/after tag overlay matches the calendar #jobModal convention. */
.jp-group { margin-bottom: 14px; }
.jp-group:last-child { margin-bottom: 0; }
.jp-group-hdr { display: flex; align-items: baseline; justify-content: space-between; padding: 2px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.jp-group-title { font-size: 13px; font-weight: 700; color: var(--text); }
.jp-group-date { color: var(--muted); font-weight: 600; margin-right: 6px; }
.jp-group-svc { font-weight: 500; color: var(--muted); font-size: 12px; }
.jp-group-count { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.jp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); gap: 6px; }
.jp-thumb { position: relative; aspect-ratio: 1/1; border-radius: 7px; overflow: hidden; background: var(--border); cursor: pointer; transition: filter .15s; }
.jp-thumb:hover { filter: brightness(.88); }
.jp-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.jp-tag { position: absolute; bottom: 0; left: 0; right: 0; font-size: 9px; font-weight: 700; text-align: center; padding: 2px 0; letter-spacing: .5px; text-transform: uppercase; color: #fff; }
.jp-thumb.before .jp-tag { background: rgba(29,78,216,.85); }
.jp-thumb.after  .jp-tag { background: rgba(13,105,64,.85); }
.jp-thumb.unknown .jp-tag { background: rgba(75,85,99,.85); }
.jp-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 14px 8px; border: 1px dashed var(--border); border-radius: 8px; }
.jp-error { font-size: 12px; color: #b91c1c; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 8px 12px; }

/* ── Property image cards (Phase 3) ─────────────────────────────────────────
   Two labeled cards: 🛰 Satellite  |  🏠 Front/BCPA
   Pinned above the existing KV job-photo gallery.
   Thumbnails fetched via authenticated fetch → objectURL (no bare <img src> to /admin/*).
 ──────────────────────────────────────────────────────────────────────────── */

               margin-top:5px; text-align:center; }

/* Stat boxes inside Zone 1 — override shared hero-stat to use grid card style */

<script>
const API = 'https://purecleaning-api.tylerfumero.workers.dev';
const RIG_LABELS_P = {rig_1:'Old Tacoma', rig_2:'New Tacoma', rig_3:'Chevy'};
const RIG_COLORS_P = {rig_1:'#1d4ed8', rig_2:'#15803d', rig_3:'#c2410c'};
const RIG_CLASS_P  = {rig_1:'rig-1', rig_2:'rig-2', rig_3:'rig-3'};
let _customer = null;
let _allEvents = [];
let _tlFilter = 'all';

function getEffectiveStats(c) {
  const jh = c.jobHistory || [];
  if (jh.length > 0) {
    const totalJobs     = jh.length;
    const lifetimeSpend = jh.reduce((sum, j) => sum + (j.amount || 0), 0);
    const lastService   = jh.map(j => j.date).filter(Boolean).sort().slice(-1)[0] || null;
    return { totalJobs, lifetimeSpend, lastService };
  }
  return { totalJobs: c.totalJobs || 0, lifetimeSpend: c.lifetimeSpend || 0, lastService: c.lastService || null };
}

const ROOF_RE = /\broof\b/i;
function getRebookWindow(c) {
  const jh = c.jobHistory || [];
  const allSvc = [
    ...jh.map(j => j.services || ''),
    (c.scheduledStatus || {}).jobNotes || '',
    (c.quoteStatus || {}).mainServices || '',
  ].join(' ');
  return ROOF_RE.test(allSvc) ? { lo: 18, hi: 36 } : { lo: 6, hi: 18 };
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtPh(p){ const d=String(p||'').replace(/\D/g,''); return d.length===10?`(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`:d; }
function fmtDate(s){ if(!s)return'—'; const d=new Date(s); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtDateTime(s){ if(!s)return'—'; const d=new Date(s); return d.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}); }
function monthsAgo(dateStr){
  if(!dateStr)return null;
  const d = new Date(dateStr.includes('T')?dateStr:dateStr+'T12:00:00');
  return (Date.now()-d.getTime())/(1000*60*60*24*30);
}
function moAgoLabel(mo){
  if(mo===null)return'—';
  if(mo<1)return'Less than a month ago';
  if(mo<2)return'1 month ago';
  return `${Math.round(mo)} months ago`;
}

function goBack(){
  if(window.history.length>1){ history.back(); }
  else{ location.href='/pure_cleaning_admin.html'; }
}

// ── Tier ─────────────────────────────────────────────────────────────────────
function getTier(c) {
  if (c.optOut)    return { label: 'OPT-OUT', emoji: '⛔', color: '#dc2626', vip: false };
  if (c.movedAway) return { label: 'MOVED',   emoji: '🏠', color: '#64748b', vip: false };

  const { totalJobs, lifetimeSpend, lastService } = getEffectiveStats(c);
  const vip = totalJobs >= 5 || lifetimeSpend >= 2500;

  const ss = c.scheduledStatus || {};
  if (ss.state === 'scheduled' || ss.state === 'needs_scheduling') {
    return { label: 'SCHEDULED', emoji: '📋', color: '#2563eb', vip };
  }

  if (!lastService && totalJobs === 0) {
    return { label: 'NO HISTORY', emoji: '○', color: '#94a3b8', vip: false };
  }

  const mo = monthsAgo(lastService);
  if (mo === null) return { label: 'NO HISTORY', emoji: '○', color: '#94a3b8', vip: false };

  const isRepeat = totalJobs >= 2;
  const { lo, hi } = getRebookWindow(c);
  const inWindow   = mo >= lo && mo <= hi;
  const overdue    = mo > hi;

  if (inWindow && isRepeat)  return { label: 'HOT',      emoji: '🔥', color: '#dc2626', vip };
  if (inWindow && !isRepeat) return { label: 'WARM',     emoji: '🌡️', color: '#f97316', vip };
  if (overdue)               return { label: 'OVERDUE',  emoji: '⏰', color: '#eab308', vip };
  if (isRepeat && mo <= 6)   return { label: 'LOYAL',    emoji: '💚', color: '#16a34a', vip };
  if (!isRepeat && mo <= 6)  return { label: 'NEW',      emoji: '🌱', color: '#10b981', vip };
  return                            { label: 'DORMANT',  emoji: '💤', color: '#8b5cf6', vip };
}

// ── Timeline builder ──────────────────────────────────────────────────────────
function buildTimeline(customer, events){
  const entries=[];
  const ph=customer.phone;
  const qs=customer.quoteStatus||{};
  const ss=customer.scheduledStatus||{};

  if(qs.sentDate)     entries.push({date:qs.sentDate,     type:'quote',      icon:'📋',title:'Digital Quote Sent',       details:[{label:'Status',val:qs.state||'sent'},{label:'Amount',val:qs.approvedAmount?'$'+qs.approvedAmount:'—'}]});
  if(qs.viewedDate)   entries.push({date:qs.viewedDate,   type:'quote',      icon:'👁️',title:'Quote Viewed'});
  if(qs.approvedDate) entries.push({date:qs.approvedDate, type:'quote',      icon:'✅',title:'Quote Approved',            details:[{label:'Amount',val:qs.approvedAmount?'$'+qs.approvedAmount:'—'}]});
  if(qs.quotedDate)   entries.push({date:qs.quotedDate,   type:'call',       icon:'📞',title:'Phone Quote Logged',        details:[{label:'Service',val:qs.mainServices||'—'},{label:'Amount',val:qs.mainAmount?'$'+qs.mainAmount:'—'}]});

  if(ss.scheduledDate&&ss.state==='scheduled') entries.push({date:ss.scheduledDate,type:'job',icon:'📅',title:'Job Scheduled',  details:[{label:'Service',val:ss.jobNotes||'—'},{label:'Amount',val:ss.approvedAmount?'$'+ss.approvedAmount:'—'}]});
  if(ss.scheduledDate&&ss.state==='completed') entries.push({date:ss.scheduledDate,type:'job',icon:'🛠️',title:'Job Completed', details:[{label:'Service',val:ss.jobNotes||'—'},{label:'Total',val:ss.approvedAmount?'$'+ss.approvedAmount:'—'}]});

  const _effStats = getEffectiveStats(customer);
  if(_effStats.lastService&&!(ss.scheduledDate===_effStats.lastService&&ss.state==='completed')){
    entries.push({date:_effStats.lastService+'T12:00:00',type:'job',icon:'🛠️',title:'Most Recent Job',
      note:_effStats.totalJobs>1?`${_effStats.totalJobs} total jobs, $${_effStats.lifetimeSpend.toLocaleString()} lifetime`:null,
      details:[{label:'Lifetime Spend',val:'$'+_effStats.lifetimeSpend.toLocaleString()},{label:'Total Jobs',val:String(_effStats.totalJobs||1)}]});
  }

  events.filter(e=>e.customer?.ph===ph).forEach(e=>{
    const d=e.loggedAt||e.sentAt||e.createdAt;
    switch(e.eventType){
      case 'phone_quote_sms_sent':
        entries.push({date:d,type:'sms',icon:'💬',title:'Confirmation SMS Sent',details:[{label:'Service',val:e.mainServices||e.services||'—'},{label:'Amount',val:(e.mainAmount||e.approvedAmount)?'$'+(e.mainAmount||e.approvedAmount):'—'}]});
        break;
      case 'mini_quote_opened':
        entries.push({date:d,type:'engagement',icon:'👆',title:'Mini Quote Link Opened'});
        break;
      case 'mini_quote_viewed':
        entries.push({date:d,type:'engagement',icon:'👁️',title:'Mini Quote Viewed (5+ sec)'});
        break;
      case 'addon_section_viewed':
        entries.push({date:d,type:'engagement',icon:'📜',title:'Scrolled to Add-On Section'});
        break;
      case 'addon_tap_initiated':
        entries.push({date:d,type:'engagement',icon:'👆',title:`Tapped Add-On: ${e.addonName||''}`,details:[{label:'Price',val:e.bundlePrice?'$'+e.bundlePrice:'—'}]});
        break;
      case 'addon_confirmed':
        entries.push({date:d,type:'win',icon:'✅',title:`Added: ${e.addonName||''}`,details:[{label:'Bundle Price',val:e.bundlePrice?'$'+e.bundlePrice:'—'},{label:'New Total',val:e.newAmount?'$'+e.newAmount:'—'}]});
        break;
      case 'sealing_interest_confirmed':
        entries.push({date:d,type:'win',icon:'💎',title:'Signaled Sealing Interest',details:[{label:'Note',val:'Tony will quote in person'}]});
        break;
      case 'mini_quote_closed':
        entries.push({date:d,type:'engagement',icon:'⏹️',title:'Mini Quote Closed',
          details:e.totalTimeOnPageSeconds?[{label:'Time on Page',val:Math.floor(e.totalTimeOnPageSeconds/60)+'m '+(e.totalTimeOnPageSeconds%60)+'s'}]:[]});
        break;
    }
  });

  if(!customer.lastService&&(customer.lifetimeSpend||0)>0){
    entries.push({date:null,type:'system',icon:'📁',title:'Historical Record',
      note:`${customer.totalJobs||0} jobs, $${(customer.lifetimeSpend||0).toLocaleString()} lifetime (imported from historical records)`});
  }
  entries.push({date:null,type:'system',icon:'➕',title:'Customer Record Created',note:'Added to Pure Cleaning database'});

  const dated   = entries.filter(e=>e.date).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const undated = entries.filter(e=>!e.date);
  return [...dated,...undated];
}

// type → color
const TYPE_COLORS={
  job:'#1d9e75', quote:'#2d7dd2', call:'#2d7dd2', sms:'#f4a620',
  engagement:'#8b5cf6', win:'#1d9e75', system:'#94a3b8'
};
// type → filter category
const TYPE_CAT={
  job:'jobs', quote:'comms', call:'comms', sms:'comms',
  engagement:'engagements', win:'jobs', system:'all'
};

function renderTimeline(entries){
  const filtered = _tlFilter==='all' ? entries : entries.filter(e=>{
    if(_tlFilter==='jobs') return ['job','win'].includes(e.type);
    if(_tlFilter==='comms') return ['quote','call','sms'].includes(e.type);
    if(_tlFilter==='engagements') return e.type==='engagement';
    return true;
  });

  const el=document.getElementById('timeline');
  if(!filtered.length){
    el.innerHTML=`<div class="tl-empty">No entries for this filter.</div>`;
    return;
  }
  el.innerHTML=filtered.map(e=>{
    const color=TYPE_COLORS[e.type]||'#94a3b8';
    const dateStr=e.date?fmtDateTime(e.date):'';
    const rowsHtml=(e.details&&e.details.length)
      ?`<div class="tl-rows">${e.details.filter(r=>r.val&&r.val!=='—').map(r=>`<div class="tl-row"><span class="tl-row-label">${esc(r.label)}</span><span class="tl-row-val">${esc(r.val)}</span></div>`).join('')}</div>`:'';
    return `<div class="tl-entry">
      <div class="tl-dot-wrap">
        <div class="tl-dot" style="border-color:${color};background:${color}10;">${e.icon||'•'}</div>

        ${dateStr?`<div class="tl-date">${dateStr}</div>`:''}

}

// ── Customer Relationship Helpers ─────────────────────────────────────────────
function getCustomerSinceYear(c) {
  const years = [];
  if (c.lastService) years.push(new Date(c.lastService+'T12:00:00').getFullYear());
  if (c.createdAt)   years.push(new Date(c.createdAt).getFullYear());
  return years.length ? Math.min(...years) : null;
}

function getRelationshipBadge(c) {
  const { totalJobs: jobs, lifetimeSpend: spend, lastService } = getEffectiveStats(c);
  if (jobs === 0 && !lastService)
    return { emoji:'🌟', label:'NEW',   style:'background:#f0fdf4;color:#15803d;border:1.5px solid #86efac;' };
  if (spend >= 5000)
    return { emoji:'💎', label:'VIP',   style:'background:#f5f3ff;color:#6d28d9;border:1.5px solid #c4b5fd;' };
  const sinceYr = getCustomerSinceYear(c);
  const yrs = sinceYr ? (new Date().getFullYear() - sinceYr) : 0;
  if (jobs >= 5 || yrs >= 5)
    return { emoji:'⭐', label:'LOYAL', style:'background:#fffbeb;color:#b45309;border:1.5px solid #fde68a;' };
  return null;
}

async function saveEmailField() {
  const input = document.getElementById('heroEmailInput');
  if (!input) return;
  const email = input.value.trim();
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { input.style.borderColor = '#dc2626'; return; }
  input.style.borderColor = '';
  try {
    const resp = await fetch(`${API}/customers`);
    const data = await resp.json();
    const customers = data.customers || [];
    const idx = customers.findIndex(cu => String(cu.phone) === String(_customer.phone));
    if (idx === -1) throw new Error('Customer not found');
    customers[idx].email = email || null;
    await fetch(`${API}/customers`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({customers}) });
    _customer = customers[idx];
    renderHeroBanner(_customer);
    renderSidebar(_customer);   // Fix: refresh sidebar "About" so email shows immediately
    closeEmailEdit();
  } catch(e) { alert('Failed to save: ' + e.message); }
}

function generateCustomerSummary(c) {
  const { totalJobs: jobs, lifetimeSpend: spend, lastService } = getEffectiveStats(c);
  const sinceYr = getCustomerSinceYear(c);
  const mo = lastService ? monthsAgo(lastService) : null;
  const parts = [];

  if (sinceYr) {
    const age = new Date().getFullYear() - sinceYr;
    if (age >= 2) parts.push(`${age}-yr customer`);
    else parts.push(`Customer since ${sinceYr}`);
  }

  if (jobs > 0) {
    const spendStr = spend > 0 ? `  ·  $${spend >= 1000 ? (spend/1000).toFixed(spend>=10000?0:1)+'k' : spend.toLocaleString()} lifetime` : '';
    parts.push(`${jobs} job${jobs>1?'s':''}${spendStr}`);
  }

  if (lastService && mo !== null) {
    const ss = c.scheduledStatus || {};
    const qs = c.quoteStatus || {};
    const raw = (ss.jobNotes || qs.mainServices || '').split(/[,;]/)[0].trim().toLowerCase();
    const descStr = raw ? ` (${raw})` : '';
    parts.push(`Last service ${moAgoLabel(Math.round(mo))}${descStr}`);
  }

  const ss = c.scheduledStatus || {};
  if (ss.state === 'scheduled' && ss.scheduledDate) {
    const d = new Date(ss.scheduledDate + 'T12:00:00');
    parts.push(`Scheduled ${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`);
  }

  if (c.hasSealHistory) parts.push('Seal history ✓');
  else if (c.sealingInterest) parts.push('Sealing interest flagged');

  return parts.length ? parts.join('  ·  ') : null;
}

function _svcAllKey(phone) { return 'pcpc_svc_all_' + (phone || ''); }

function toggleAllJobs(phone, btn) {
  const container = document.getElementById('svc-more-' + phone);

  container.style.display = opening ? 'block' : 'none';

    ? 'Show less ▲'

}

function _buildJobCard(e) {
  // "days ago" chip (only for dated, non-future jobs)
  let daysChip = '';
  if (e.rawDate) {
    const days = Math.round((Date.now() - new Date(e.rawDate + 'T12:00:00').getTime()) / 86400000);
    if (days >= 0) {
      const cls = days <= 30 ? 'green' : days <= 90 ? 'amber' : 'muted';
      const lbl = days === 0 ? 'today' : days === 1 ? '1 day ago' : days + ' days ago';
      daysChip = `<span class="job-days ${cls}">${lbl}</span>`;
    }
  }

  // Status chip (only non-completed jobs)
  const STATUS_LABELS = { scheduled:'Scheduled', needs_scheduling:'Unscheduled', canceled:'Canceled', no_show:'No Show' };
  const statusChip = (e.status && e.status !== 'completed')
    ? `<span class="job-status-chip job-status-${e.status}">${STATUS_LABELS[e.status] || e.status}</span>`
    : '';

  // Services line with optional roof-story badge
  const _isRoofSvc = /roof|soft\s*wash|softwash/i.test(e.services || '');
  const _parseStoriesFromText = svc => {
    if (!svc) return null;
    if (/\b2[\s\-]*stor(y|ies)\b/i.test(svc)) return 2;
    if (/\b1[\s\-]*stor(y|ies)\b/i.test(svc))  return 1;
    return null;
  };
  const _stories = e.roofStories || _parseStoriesFromText(e.services) || null;
  const storyBadge = (_isRoofSvc && _stories) ? `<span class="job-story-badge">${_stories}-story</span>` : '';
  const svcHtml = (e.services && e.services !== '—')
    ? esc(e.services).replace(/ \/ /g, ' · ') + storyBadge
    : `<span style="color:var(--muted);font-style:italic;">No services recorded</span>`;

  // Meta chips
  const chips = [];
  if (e.rigLabel) {
    const rigColors = { rig_1:'color:#1d4ed8;background:#dbeafe;border-color:#bfdbfe;', rig_2:'color:#15803d;background:#dcfce7;border-color:#bbf7d0;', rig_3:'color:#c2410c;background:#ffedd5;border-color:#fed7aa;' };
    const rc = rigColors[e.rigKey] || '';
    chips.push(`<span class="job-meta-chip" style="${rc}"><span class="chip-label">Rig</span> ${esc(e.rigLabel)}</span>`);
  }
  if (e.sqFt) chips.push(`<span class="job-meta-chip"><span class="chip-label">Sqft</span> ${Number(e.sqFt).toLocaleString()}</span>`);
  if (e.crew && e.crew.length) {
    chips.push(`<span class="job-meta-chip"><span class="chip-label">Crew</span> ${esc(e.crew.map(id => id.charAt(0).toUpperCase() + id.slice(1)).join(', '))}</span>`);
  }
  if (e.arrFmt) {
    const window = e.arrFmt + (e.depFmt ? ` – ${e.depFmt}` : '') + (e.durFmt ? ` (${e.durFmt})` : '');
    chips.push(`<span class="job-meta-chip"><span class="chip-label">On-site</span> ${esc(window)}</span>`);
  } else if (e.durFmt) {
    chips.push(`<span class="job-meta-chip"><span class="chip-label">On-site</span> ${esc(e.durFmt)}</span>`);
  }
  if (e.durationConfidence && e.durationConfidence.toLowerCase() !== 'high') {
    chips.push(`<span class="job-meta-chip" style="color:#9ca3af;"><span class="chip-label">GPS</span> ${esc(e.durationConfidence)}</span>`);
  }
  if (e.payment) chips.push(`<span class="job-meta-chip"><span class="chip-label">Paid</span> ${esc(e.payment)}</span>`);
  if (e.tipped)  chips.push(`<span class="job-meta-chip" style="color:#16a34a;background:#f0fdf4;border-color:#bbf7d0;">💚 Tip${e.tipAmount ? ' $' + Number(e.tipAmount).toFixed(0) : ''}</span>`);
  if (e.address) chips.push(`<span class="job-meta-chip"><span class="chip-label">Addr</span> ${esc(e.address)}</span>`);
  if (e.notes) chips.push(`<span class="job-meta-chip" style="font-style:italic;"><span class="chip-label">Note</span> ${esc(e.notes.length > 60 ? e.notes.slice(0,57) + '…' : e.notes)}</span>`);

  const metaHtml = chips.length ? `<div class="job-meta">${chips.join('')}</div>` : '';

  const isUpcoming = e.status === 'scheduled' || e.status === 'needs_scheduling';
  const cardClass = isUpcoming ? ' job-card-upcoming' : (e.status === 'canceled' || e.status === 'no_show') ? ' job-card-canceled' : '';

  return `<div class="job-card${cardClass}">
    <div class="job-card-top">
      <div><span class="job-date">${esc(e.displayDate)}</span>${daysChip}${statusChip}</div>
      <div class="job-amount">${e.amount || ''}</div>
    </div>
    <div class="job-services">${svcHtml}</div>
    ${metaHtml}
  </div>`;
}

  let aggregateHtml = '';
  if (jh.length === 0 && totalJobs > 0) {

      ? new Date(c.lastService + 'T12:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'})

      lastStr ? `<span class="job-meta-chip"><span class="chip-label">Last</span> ${esc(lastStr)}</span>` : null,
    ].filter(Boolean);
    aggregateHtml = `<div class="job-card" style="background:var(--white);">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.75rem;">Historical Summary (Pre-System)</div>
      <div class="job-meta">${aggChips.join('')}</div>

    </div>`;
  }

  // Empty state
  if (jh.length === 0 && totalJobs === 0) {
    el.innerHTML = headingHtml + `<div class="svc-empty">No services on record yet.</div>`;
    return;
  }

  // Pinned upcoming job from scheduledStatus (if not already in jh)
  const cards = [];
  if (ss.state === 'scheduled' || ss.state === 'needs_scheduling') {
    const pmRaw = ss.paymentMethod || null;
    cards.push(_buildJobCard({
      displayDate: ss.scheduledDate
        ? new Date(ss.scheduledDate + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'})
        : 'Date TBD',
      rawDate: ss.scheduledDate || null,
      services: ss.jobNotes || qs.mainServices || 'Services TBD',
      amount: ss.approvedAmount ? '$' + Number(ss.approvedAmount).toLocaleString() : null,
      status: ss.state,
      payment: pmRaw ? ({zelle:'Zelle',cash:'Cash',check:'Check'}[pmRaw.toLowerCase()] || pmRaw) : null,
      sqFt: null, address: null, notes: null,
      rigKey: null, rigLabel: null, rigKey: null,
      durFmt: null, arrFmt: null, depFmt: null, hasGps: false,
      isLegacy: false, durationConfidence: null, crew: [], roofStories: null,
    }));
  }

  // Per-job history cards
  const _isPartnerCust = (c.customerType === 'partner_referral');
  jh.forEach(j => {
    const rigKey = j.actualRig || j.rig || null;
    const durMin = j.actualDuration || 0;
    const pmRaw  = j.paymentMethod || j.payment || null;
    const _jobAddr = (_isPartnerCust && j.workSiteAddress) ? j.workSiteAddress : (j.address || null);
    cards.push(_buildJobCard({
      displayDate: j.date
        ? new Date(j.date + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'})
        : '—',
      rawDate: j.date || null,
      services: j.services || '—',
      amount:   j.amount ? '$' + Number(j.amount).toLocaleString() : null,
      status:   j.status || 'completed',
      payment:  pmRaw ? ({zelle:'Zelle',cash:'Cash',check:'Check'}[pmRaw.toLowerCase()] || pmRaw) : null,
      sqFt:     j.sqFt || null,
      address:  _jobAddr,
      notes:    j.notes || null,
      rigKey,
      rigLabel: RIG_LABELS_P[rigKey] || null,
      durFmt:   durMin > 0 ? `${Math.floor(durMin/60)}h ${durMin%60}m` : null,
      arrFmt:   j.actualArrival ? new Date(j.actualArrival).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : null,
      depFmt:   j.actualDeparture ? new Date(j.actualDeparture).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : null,
      hasGps:   !!(j.actualArrival || j.actualDuration),
      isLegacy: !!(j.date && j.date < '2026-01-01'),
      durationConfidence: j.durationConfidence || null,
      crew:     (j.crew || []).filter(Boolean),
      roofStories: j.roofStories || null,
      tipped:    !!j.tipped,
      tipAmount: j.tipAmount ?? null,
    }));
  });

  const SHOW_INITIAL = 5;
  const isExpanded = (() => { try { return localStorage.getItem(_svcAllKey(phone)) === 'true'; } catch { return false; } })();
  const visibleHtml  = cards.slice(0, SHOW_INITIAL).join('');
  const hiddenCards  = cards.slice(SHOW_INITIAL);
  const remaining    = hiddenCards.length;
  const hiddenHtml   = remaining > 0
    ? `<div id="svc-more-${esc(phone)}" style="display:${isExpanded ? 'block' : 'none'};">${hiddenCards.join('')}</div>
       <button class="show-all-btn${isExpanded ? ' open' : ''}"
               data-label="Show all ${cards.length} jobs ▼"
               onclick="toggleAllJobs('${esc(phone)}', this)">
         ${isExpanded ? 'Show less ▲' : `Show all ${cards.length} jobs ▼`}
       </button>`
    : '';

  const legacyMore = jh.length > 0 ? Math.max(0, totalJobs - jh.length) : 0;
  const legacyNoteHtml = legacyMore > 0
    ? `<div class="svc-legacy-note">Plus ${legacyMore} more job${legacyMore > 1 ? 's' : ''} from pre-system historical records</div>`
    : '';

  el.innerHTML = headingHtml + aggregateHtml + visibleHtml + hiddenHtml + legacyNoteHtml;
}

function renderContextBlocks(c) {
  const el = document.getElementById('ctxBlocks');
  if (!el) return;
  const blocks = [];
  const { lastService: effLastSvc } = getEffectiveStats(c);
  const _moSince = effLastSvc ? Math.round((Date.now() - new Date(effLastSvc+'T12:00:00').getTime()) / (30*24*60*60*1000)) : null;

  // ── At-Risk ──
  if (_moSince !== null && _moSince > 12 && !c.optOut && !c.movedAway) {
    blocks.push({ cls:'ctx-block-red', icon:'🔴', title:'At-Risk Customer',
      text:`Last service was ${_moSince} month${_moSince === 1 ? '' : 's'} ago — overdue for reactivation outreach.`,
      btnCls:null, btnLabel:null, btnHref:null });
  }

  // ── Operational Alerts ──
  const alertLines = [];
  const svcAgreed = (c.quoteStatus||{}).servicesAgreed || {};
  if (svcAgreed.roofType === 'venezuelan_tile') alertLines.push('Venezuelan tile — most fragile, extra care required');
  if (svcAgreed.roofType === 'metal')           alertLines.push('Metal roof — we do not service metal roofs');
  (c.alerts||[]).forEach(a => alertLines.push(a.label||a));
  if (alertLines.length) {
    blocks.push({ cls:'ctx-block-red', icon:'🚨', title:'Heads-up',
      text: alertLines.join('\n'), btnCls:null, btnLabel:null, btnHref:null });
  }

  el.innerHTML = blocks.map(b=>`
    <div class="ctx-block ${b.cls}">
      <div style="font-size:20px;margin-top:1px;flex-shrink:0;">${b.icon}</div>
      <div style="flex:1;min-width:0;">
        <div class="ctx-block-title">${b.title}</div>
        <div class="ctx-block-text">${esc(b.text).replace(/\n/g,'<br>')}</div>
        ${b.btnHref?`<a href="${b.btnHref}" class="ctx-block-btn ${b.btnCls}">${b.btnLabel}</a>`:''}
      </div>
    </div>`).join('');
}

// ── Render Page ───────────────────────────────────────────────────────────────
function renderProfile(customer, events){
  const c=customer;
  _customer=c;
  _allEvents=events;
  try {

  // ── Hero ──
  renderHeroBanner(c);
  document.title=`${((c.firstName||'')+ ' '+(c.lastName||'')).trim()} — Pure Cleaning`;

  // ── Stats (secondary bar) ──
  const tier = getTier(c);
  const { totalJobs: effJobs, lifetimeSpend: effSpend, lastService: effLastSvc } = getEffectiveStats(c);
  const mo = monthsAgo(effLastSvc);
  const avgTicket = (effJobs && effSpend) ? Math.round(effSpend / effJobs) : 0;
  const wh = c.workerHoursStats || null;
  const _fmtWh = min => {
    const h = Math.floor(min / 60), m = min % 60;
    return h > 0 ? (m > 0 ? `${h}h ${m}m` : `${h}h`) : `${m}m`;
  };
  const _fmtWhAvg = hrs => hrs < 10 ? hrs.toFixed(1) + 'h' : Math.round(hrs) + 'h';
  // Track 1 (wall-clock) is always primary. Track 2 (solo-equiv) is secondary line, shown
  // only when avgSoloEquivPerVisit is non-null (requires crewCount on at least one job).
  // Jobs without crew data show wall-clock only — no silent wrong number (Phase 5 rule).
  const _soloEquivLine = (wh && wh.avgSoloEquivPerVisit != null)
    ? `<br><span style="font-size:11px;color:#9333ea;font-weight:600;">Solo-equiv: ${_fmtWhAvg(wh.avgSoloEquivPerVisit)}</span>`
    : '';
  const whVal = wh
    ? `<span style="font-size:13px;line-height:1.35;">Avg ${_fmtWhAvg(wh.avgPerVisit)}${_soloEquivLine}<br><span style="font-size:11px;color:var(--muted);">Last ${_fmtWh(wh.lastVisitMin)} · ${fmtDate(wh.lastVisitDate)}</span></span>`
    : null;

  const statsData=[
    {label:'Avg Ticket',    val:avgTicket?'$'+avgTicket.toLocaleString():'—',                               color:'#1d9e75'},
    {label:'Last Service',  val:mo!==null?moAgoLabel(mo):(effLastSvc?fmtDate(effLastSvc):'—'),              color:'#d97706'},
    {label:'Tier',          val:`<span class="tier-chip" style="--tier-color:${tier.color};">${tier.emoji} ${tier.label}${tier.vip?' ★':''}</span>`, color:tier.color},
    ...(whVal ? [{label:'Job Duration', val:whVal, color:'#7c3aed'}] : []),
  ];
  document.getElementById('statsBar').innerHTML=statsData.map(s=>
    `<div class="stat-cell" style="--cell-color:${s.color};">
      <div class="stat-val">${s.val}</div>
      <div class="stat-label">${s.label}</div>
    </div>`
  ).join('');

  // ── Callouts ──
  const callouts=[];
  // SAFETY — must be first, loudest callout on the page
  if(c.doNotService) callouts.push({cls:'callout-red', text:'⛔ DO NOT SERVICE — this customer is flagged. Do not schedule, quote, or dispatch.'});
  if(c.customerType === 'partner_referral') {
    const partnerJobs = (c.jobHistory||[]).filter(j => j.source !== 'csv_backfill').length;
    const partnerRevenue = (c.jobHistory||[]).filter(j => j.source !== 'csv_backfill').reduce((s,j) => s+(j.amount||0), 0);
    const statsStr = partnerJobs ? ` · ${partnerJobs} job${partnerJobs!==1?'s':''} · $${Math.round(partnerRevenue).toLocaleString()} total` : '';
    callouts.push({cls:'callout-blue', text:`🤝 Referral Partner${statsStr}${c.partnerNotes ? ' — ' + esc(c.partnerNotes) : ''}`});
  }
  if(c.hasComplaints) callouts.push({cls:'callout-red', text:`⚠ ${c.complaintCount||1} logged complaint${(c.complaintCount||1)>1?'s':''}. Review history below before booking.`});
  if(c.optOut) callouts.push({cls:'callout-gray',  text:'⚠️ Opted out of campaigns — do not send bulk SMS'});
  if(c.movedAway) callouts.push({cls:'callout-gray',text:'🏠 Marked as moved away'});
  if(c.reactivationExcluded?.excluded) {
    const EXCL_PROFILE_LABELS = {opted_out:'Opted out',moved_away:'Moved away',deceased:'Deceased',friend_family:'Friend / family',do_not_contact:'Do not contact',commercial:'Commercial account'};
    const ex = c.reactivationExcluded;
    const excDate = ex.excludedAt ? new Date(ex.excludedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    const excLabel = EXCL_PROFILE_LABELS[ex.reason] || ex.reason || 'Excluded';
    callouts.push({cls:'callout-gray', text:`🚫 Excluded from reactivation: ${excLabel}${excDate ? ' · ' + excDate : ''}${ex.reasonNotes ? ' — "' + ex.reasonNotes + '"' : ''}`});
  }
  // ── Google Review status ──
  const gr = c.googleReview || {};
  const grStatus = gr.status || 'never_asked';
  if (grStatus === 'left') {
    const leftFmt = gr.leftAt ? new Date(gr.leftAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    callouts.push({cls:'callout-green', text:`⭐ Left Google review${leftFmt ? ' · ' + leftFmt : ''}${gr.noteAboutReview ? ' — "' + esc(gr.noteAboutReview) + '"' : ''}`});
  } else if (grStatus === 'asked') {
    const days = gr.lastRequestSentAt ? Math.floor((Date.now()-new Date(gr.lastRequestSentAt).getTime())/86400000) : null;
    callouts.push({cls:'callout-amber', text:`📬 Review request sent${days !== null ? ' ' + days + ' days ago' : ''} — awaiting confirmation`});
  } else if (grStatus === 'declined') {
    const eligDate = gr.reaskEligibleAt ? new Date(gr.reaskEligibleAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    callouts.push({cls:'callout-gray', text:`○ Didn't leave review${eligDate ? ' · Re-ask eligible ' + eligDate : ''}`});
  } else if (grStatus === 'do_not_ask') {
    callouts.push({cls:'callout-gray', text:'🚫 Do not ask for Google review'});
  }

  if(c.hasSealHistory&&mo!==null&&mo>=18&&mo<=36) callouts.push({cls:'callout-purple',text:'💎 VIP Seal renewal window — Tony should quote'});
  if(c.sealingInterest) callouts.push({cls:'callout-purple',text:'💎 Signaled sealing interest — bring samples to next job'});
  if(effSpend>=1500) callouts.push({cls:'callout-green', text:'🎯 High-value customer — top tier'});
  const qs=c.quoteStatus||{};
  if(qs.state==='phone_quoted_pending_mini_quote') callouts.push({cls:'callout-amber', text:'📋 Mini quote not built yet — build before texting'});
  (c.alerts||[]).forEach(a=>callouts.push({cls:'callout-blue', text:`🔔 ${esc(a.label||a)}`}));
  document.getElementById('callouts').innerHTML=callouts.map(co=>
    `<div class="callout ${co.cls}">${co.text}</div>`
  ).join('');

  // ── Complaints card (Zone 2 — targets pre-existing #complaintsSection) ──
  const CMPT_TYPES = { quality_issue:'Quality Issue', pricing_dispute:'Pricing Dispute', scheduling_issue:'Scheduling / Timing', crew_behavior:'Crew Behavior', other:'Other' };
  const CMPT_RES   = { resolved_on_site:'Resolved on-site', resolved_refund:'Resolved with refund/discount', resolved_reclean:'Resolved with re-clean', unresolved:'Unresolved', customer_refused:'Customer refused resolution' };
  const cmptSection = document.getElementById('complaintsSection');
  if (cmptSection) {
    if ((c.complaints||[]).length > 0) {
      const n = c.complaints.length;
      const items = c.complaints.map(cp => `
        <div class="complaint-item">
          <div class="complaint-item-row">
            <div class="complaint-type-label">${CMPT_TYPES[cp.type]||cp.type||'Unknown'}</div>
            <div class="complaint-date">${cp.loggedAt ? new Date(cp.loggedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'}</div>
          </div>
          ${cp.description ? `<div class="complaint-desc">${esc(cp.description)}</div>` : ''}
          <div class="complaint-res${['resolved_on_site','resolved_refund','resolved_reclean'].includes(cp.resolution)?' resolved':''}">${CMPT_RES[cp.resolution]||cp.resolution||'Not recorded'} · Job: ${cp.jobDate||'—'}</div>
        </div>`).join('');
      cmptSection.innerHTML = `<div class="complaints-card">
        <div class="complaints-header">
          <div class="complaints-alarm">🚨</div>
          <div>
            <div class="complaints-title">Attention Needed — ${n} Logged Complaint${n>1?'s':''}</div>
            <div class="complaints-subtitle">Review before next service</div>
          </div>
        </div>
        <div class="complaints-body">${items}</div>
      </div>`;
    } else {
      cmptSection.innerHTML = '';
    }
  }

  // ── Service History + Context Blocks (main entry point) ──
  renderServiceHistory(c);
  renderContextBlocks(c);

  // ── Timeline ──
  const entries=buildTimeline(c, events);
  const filters=[
    {key:'all',label:'All'},
    {key:'jobs',label:'Jobs'},
    {key:'comms',label:'Communications'},
    {key:'engagements',label:'Engagements'},
  ];
  document.getElementById('tlFilters').innerHTML=filters.map(f=>
    `<button class="tl-filter-btn${_tlFilter===f.key?' active':''}" onclick="setTlFilter('${f.key}')">${f.label}</button>`
  ).join('');
  renderTimeline(entries);

  // ── Sidebar ──
  renderSidebar(c);

  // ── Notes ──
  renderNotes(c);

  // ── Extended collapsible sections ──
  renderExtendedSections(c, events);
  // Init lazy-load for photo gallery if present
  requestAnimationFrame(initPhotoGallery);
  } catch(err) {
    const pc = document.getElementById('profileContent');
    if (pc) pc.innerHTML = '<div style="padding:2rem;text-align:center;color:#c2410c;font-size:14px;font-weight:600;">⚠️ Profile render failed — check error monitor for details.</div>';
    try { navigator.sendBeacon(API + '/errors/log', JSON.stringify({ source: 'profile_renderProfile', page: 'pure_cleaning_customer_profile.html', errorType: (err && err.name) || 'Error', message: ((err && err.message) || String(err)).slice(0, 500), stack: ((err && err.stack) || '').slice(0, 2000), url: location.href, timestamp: new Date().toISOString() })); } catch {}
    console.error('[renderProfile]', err);
  }
}

  _tlFilter=key;

  if(c.notes&&typeof c.notes==='string'&&c.notes.trim()){
    notes.push({legacy:true,text:c.notes,author:'Team',createdAt:null});

  // profileNotes array

      <div class="note-header">
        <span class="note-author">${esc(n.author||'Tyler')}</span>
        <span class="note-date">${n.createdAt?fmtDate(n.createdAt):(n.legacy?'Legacy note':'')}</span>
      </div>
      <div class="note-text">${esc(n.text||'')}</div>

  ).join('');

function showAddNote(){
  document.getElementById('addNoteArea').style.display='block';
  document.getElementById('addNoteBtn').style.display='none';
  document.getElementById('noteTextarea').focus();
}
function cancelNote(){
  document.getElementById('addNoteArea').style.display='none';
  document.getElementById('addNoteBtn').style.display='';
  document.getElementById('noteTextarea').value='';
}

async function saveNote(){
  const text=(document.getElementById('noteTextarea').value||'').trim();
  if(!text)return;
  const btn=document.querySelector('.btn-save-note');
  btn.disabled=true; btn.textContent='Saving…';
  try{
    // fetch all customers, find ours, update, PUT back
    const resp=await fetch(`${API}/customers`);
    const data=await resp.json();
    const customers=data.customers||[];
    const idx=customers.findIndex(cu=>String(cu.phone)===String(_customer.phone));
    if(idx===-1) throw new Error('Customer not found in DB');
    if(!customers[idx].profileNotes) customers[idx].profileNotes=[];
    const newNote={
      id: Math.random().toString(36).slice(2)+Date.now().toString(36),
      text,
      author:'Tyler',
      createdAt:new Date().toISOString()
    };
    customers[idx].profileNotes.push(newNote);
    await fetch(`${API}/customers`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({customers})});
    _customer=customers[idx];
    renderNotes(_customer);
    cancelNote();
  } catch(err){
    alert('Failed to save note: '+err.message);
  } finally{
    btn.disabled=false; btn.textContent='Save Note';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  const params=new URLSearchParams(location.search);
  const phone=params.get('phone');
  if(!phone){
    showError('No phone number provided','Add ?phone=XXXXXXXXXX to the URL.');
    return;
  }

  try{
    const [custResp, evtResp]=await Promise.all([
      fetch(`${API}/customers`),
      fetch(`${API}/events?phone=${encodeURIComponent(phone)}`)
    ]);
    if(!custResp.ok) throw new Error('Failed to load customers');
    const custData=await custResp.json();
    const evtData=await evtResp.json();
    const customers=custData.customers||[];
    const events=evtData.events||[];

    const _nph = p => String(p||'').replace(/\D/g,'').slice(-10);
    const customer=customers.find(c=>_nph(c.phone)===_nph(phone));
    if(!customer){
      showError('Customer not found',`No record found for phone number ${fmtPh(phone)}.`);
      return;
    }

    document.getElementById('stateLoading').style.display='none';
    document.getElementById('profileContent').style.display='';
    document.title=`${((customer.firstName||'')+' '+(customer.lastName||'')).trim()} — Pure Cleaning`;
    renderProfile(customer, events);
    showAdminZone();

  } catch(err){
    showError('Failed to load data', err.message||'Please check your connection and try again.');
    // Law 9: forward to error tracker — local catch creates window.onerror blind spot
    try { navigator.sendBeacon(API + '/errors/log', JSON.stringify({ source: 'profile_init', page: 'pure_cleaning_customer_profile.html', errorType: (err && err.name) || 'Error', message: ((err && err.message) || String(err)).slice(0, 500), stack: ((err && err.stack) || '').slice(0, 2000), url: location.href, timestamp: new Date().toISOString() })); } catch {}
  }
}

// ── Extended Collapsible Sections ─────────────────────────────────────────────
const XSEC_LS_PREFIX = 'pcpc_profile_xsec_';
function xsecOpen(id) {
  try { return localStorage.getItem(XSEC_LS_PREFIX + id) !== 'closed'; } catch { return true; }
}
function xsecToggle(id, el) {
  try { localStorage.setItem(XSEC_LS_PREFIX + id, el.open ? 'open' : 'closed'); } catch {}
}

function makeXSec(id, icon, title, badge, bodyHtml, defaultOpen = false) {
  const open = xsecOpen(id) !== false ? (localStorage.getItem(XSEC_LS_PREFIX + id) !== 'closed') : defaultOpen;
  return `<details class="xsec" ${open ? 'open' : ''} id="xsec-${id}" ontoggle="xsecToggle('${id}',this)">
    <summary>
      <div class="xsec-title">${icon} ${title}${badge ? ` <span class="xsec-badge">${badge}</span>` : ''}</div>
      <span class="xsec-arrow">›</span>
    </summary>
    <div class="xsec-body">${bodyHtml}</div>
  </details>`;
}

function renderExtendedSections(c, events) {
  const el = document.getElementById('extendedSections');
  if (!el) return;

  const sections = [];

  // ── Quote History ──────────────────────────────────────────────────────────
  const qs = c.quoteStatus || {};
  const quoteRows = [];
  if (qs.sentAt || qs.sentDate || qs.state) {
    const sentDate = qs.sentAt || qs.sentDate;
    const status = qs.state === 'confirmed' ? 'Approved' :
                   qs.state === 'phone_quoted_mini_quote_sent' ? 'Pending' :
                   qs.state ? qs.state.replace(/_/g,' ') : 'Unknown';
    const statusColor = status === 'Approved' ? '#16a34a' : '#d97706';
    const amount = qs.approvedAmount || qs.mainAmount || 0;
    const confirmedAt = qs.confirmedAt ? ` · Confirmed ${fmtDateTime(qs.confirmedAt)}` : '';
    quoteRows.push(`<div class="xsec-row">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--navy);">${esc(qs.mainServices || qs.services || 'Services on file')}</div>
        <div style="font-size:11px;color:var(--muted);">${sentDate ? fmtDate(sentDate) : '—'}${confirmedAt}</div>
      </div>
      <div style="text-align:right;">
        ${amount ? `<div style="font-size:14px;font-weight:700;color:var(--terra);">$${Number(amount).toLocaleString()}</div>` : ''}
        <div style="font-size:11px;font-weight:700;color:${statusColor};">${status}</div>
      </div>
    </div>`);
  }
  // quoteHistory[] — verbal quote lifecycle entries (added May 2026)
  (c.quoteHistory || []).slice().reverse().forEach(qh => {
    const outcomeLabel = qh.outcome === 'confirmed'       ? 'Scheduled' :
                         qh.outcome === 'did_not_service' ? 'Did Not Service' :
                         qh.outcome === 'pending'         ? 'Pending' :
                         (qh.outcome || 'Unknown').replace(/_/g,' ');
    const outcomeColor = qh.outcome === 'confirmed'       ? '#16a34a' :
                         qh.outcome === 'did_not_service' ? '#dc2626' : '#d97706';
    const dateStr  = qh.outcomeAt || qh.createdAt;
    const price    = qh.quotedPrice ? `$${Number(qh.quotedPrice).toLocaleString()}` : '';
    const note     = qh.reason ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;">"${esc(qh.reason.slice(0,80))}"</div>` : '';
    quoteRows.push(`<div class="xsec-row" style="border-left:3px solid ${outcomeColor}22;padding-left:8px;">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--navy);">📞 ${esc(qh.quotedService || 'Verbal Quote')}</div>
        <div style="font-size:11px;color:var(--muted);">${dateStr ? fmtDate(dateStr) : '—'}</div>
        ${note}
      </div>
      <div style="text-align:right;">
        ${price ? `<div style="font-size:14px;font-weight:700;color:var(--terra);">${price}</div>` : ''}
        <div style="font-size:11px;font-weight:700;color:${outcomeColor};">${outcomeLabel}</div>
      </div>
    </div>`);
  });
  const quoteBody = quoteRows.length
    ? quoteRows.join('') + (qs.confirmedAt && qs.confirmedDateDisplay ? `<div style="font-size:12px;color:var(--muted);margin-top:8px;">Scheduled: ${esc(qs.confirmedDateDisplay)}</div>` : '')
    : `<div class="xsec-empty">No quotes on record.</div>`;
  sections.push(makeXSec('quotes', '📋', 'Quote History', quoteRows.length ? String(quoteRows.length) : null, quoteBody, false));

  // ── Property Images (Phase 3: R2 satellite + front/BCPA) ───────────────────
  // Source: c.properties[0].satelliteImageKey / frontImageKey (D1 Property columns).
  // Rendered ABOVE the existing KV job-photo gallery — two separate sections,
  // two separate sources, no collision.
  // Thumbnails loaded via authenticated fetch (GET /admin/photos/key/{key}) →
  // objectURL — not bare <img src> which would 401 on an auth-gated endpoint.
  const _primaryProp   = (c.properties || [])[0] || {};
  const _satKey        = _primaryProp.satelliteImageKey || null;
  const _frontKey      = _primaryProp.frontImageKey     || null;
  const _propImgPhone  = (c.phone || '').replace(/\D/g,'').slice(-10); // stable DOM id suffix

  if (_satKey || _frontKey) {
    const _piCard = (key, icon, label, thumbId) => `
      <div class="pi-card" onclick="_openPropImgLb(${JSON.stringify(key)},${JSON.stringify(icon+' '+label)})">
        <div class="pi-thumb" id="${esc(thumbId)}">
          <div class="pi-icon">${icon}</div>
        </div>
        <div class="pi-lbl">${icon} ${label}</div>
      </div>`;
    const piHtml = `<div class="pi-strip">
      ${_satKey   ? _piCard(_satKey,   '🛰', 'Satellite',   `pi-sat-${_propImgPhone}`)   : ''}
      ${_frontKey ? _piCard(_frontKey, '🏠', 'Front / BCPA', `pi-front-${_propImgPhone}`) : ''}
    </div>`;
    sections.push(makeXSec('property-images', '📸', 'Property Images',
      String((_satKey ? 1 : 0) + (_frontKey ? 1 : 0)), piHtml, true));
    // Kick off thumbnail loads after the section is in the DOM
    requestAnimationFrame(() => {
      if (_satKey)   _loadPropImgThumb(_satKey,   `pi-sat-${_propImgPhone}`);
      if (_frontKey) _loadPropImgThumb(_frontKey, `pi-front-${_propImgPhone}`);
    });
  }
  // ── end Property Images ────────────────────────────────────────────────────

  // ── Property Measurements (Build B — ground-truth vault) ───────────────────
  // Read-only display of Property.measurements (JSON array on D1, mapped to
  // c.properties[0].measurements by the customer payload builder). Source-aware:
  // 'tyler_measured_onsite' badges as "measured", 'traced_satellite' as "traced".
  // Quoting/pricing never consumes these in this batch — display only per scope rule.
  const _measArr = Array.isArray(_primaryProp.measurements) ? _primaryProp.measurements : [];
  if (_measArr.length) {
    const surfLabel = s => ({ driveway:'Driveway', patio:'Patio', pool_deck:'Pool deck', sidewalk:'Sidewalk', walkway:'Walkway', roof:'Roof', other:'Other' }[s] || s);
    const lines = _measArr.map(m => {
      const src = m.source === 'tyler_measured_onsite' ? 'measured' : 'traced';
      const date = m.measuredAt ? new Date(m.measuredAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
      return `<div class="xsec-row">
        <span class="xsec-row-label">📐 ${esc(surfLabel(m.surface))}</span>
        <span class="xsec-row-val">${Number(m.sqft).toLocaleString()} sqft <span style="font-size:11px;font-weight:700;color:${src==='measured'?'#065f46':'#1e40af'};background:${src==='measured'?'#d1fae5':'#dbeafe'};padding:1px 6px;border-radius:4px;margin-left:5px;text-transform:uppercase;letter-spacing:.3px">${src}</span><span style="color:var(--muted);font-size:11px;margin-left:6px">${esc(date)}</span></span>
      </div>`;
    }).join('');
    sections.push(makeXSec('property-measurements', '📐', 'Property Measurements', String(_measArr.length), lines, false));
  }
  // ── end Property Measurements ──────────────────────────────────────────────

  // ── Property Photos (Customer photo upload — lead-captured R2 keys) ───────
  // Display surface for c.properties[0].photoKeys (Property.photoKeys column,
  // populated by /admin/quote-photo-connect on lead→customer conversion).
  // Mirrors the Property Images pattern (auth'd fetch → blob → objectURL) but
  // renders as a thumbnail grid since it's a variable-count JSON array.
  const _propPhotoKeys = Array.isArray(_primaryProp.photoKeys) ? _primaryProp.photoKeys : [];
  if (_propPhotoKeys.length) {
    const _ppHostId = `prop-photos-host-${esc(_propImgPhone)}`;
    const _ppThumbs = _propPhotoKeys.map((k, i) =>
      `<div class="x-prop-photo-thumb" data-key="${esc(k)}" id="${_ppHostId}-${i}"></div>`
    ).join('');
    const _ppHtml = `
      <div id="${_ppHostId}" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:6px">
        ${_ppThumbs}
      </div>`;
    sections.push(makeXSec('property-photos', '📷', 'Property Photos', String(_propPhotoKeys.length), _ppHtml, false));
    requestAnimationFrame(() => {
      document.querySelectorAll(`#${_ppHostId} .x-prop-photo-thumb`).forEach(el => {
        const k = el.dataset.key;
        if (!k) return;
        fetch(`${API}/admin/photos/key/${k}`)
          .then(r => r.ok ? r.blob() : null)
          .then(blob => {
            if (!blob) return;
            const img = document.createElement('img');
            img.alt = 'Property photo';
            img.src = URL.createObjectURL(blob);
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:7px';
            el.appendChild(img);
            el.style.cssText = 'aspect-ratio:1/1;border-radius:7px;overflow:hidden;background:#1f2937;cursor:pointer';
            el.addEventListener('click', () => _openPropImgLb(k, '📷 Property photo'));
          })
          .catch(() => {});
      });
    });
  }
  // ── end Property Photos ────────────────────────────────────────────────────

  // ── Job Photos (R2 / Batch 4 read surface) ────────────────────────────────
  // Job.photoKeys is NOT carried on the customer payload (T1.21 audit confirmed:
  // _d1JobToJhEntry omits it intentionally — adding it would bloat every jh entry
  // across every surface). So we iterate the customer's jobs with real jobIds and
  // call GET /admin/photos/job/:id in parallel. Read-only on the profile per Tyler;
  // uploads stay in the calendar #jobModal where the job context is unambiguous.
  // Separate from the legacy KV "Add Photos" gallery below — different system,
  // two sources, no collision (mirrors the Property Images precedent above).
  const _jpPhone = (c.phone || '').replace(/\D/g,'').slice(-10);
  const _jpCandidates = (c.jobHistory || [])
    .filter(j => j && j.jobId && j.source !== 'csv_backfill' && j.source !== 'rig_segment' && j.source !== 'day_segment')
    .slice()
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));   // newest first
  if (_jpCandidates.length) {
    const _jpHostId = `job-photos-host-${esc(_jpPhone)}`;
    sections.push(makeXSec('job-photos', '📷', 'Job Photos', '…', `
      <div id="${_jpHostId}">
        <div style="font-size:12px;color:var(--muted);padding:6px 2px;">Loading photos…</div>
      </div>`, true));
    requestAnimationFrame(() => _loadJobPhotosSection(_jpHostId, _jpCandidates));
  }

  // Photo gallery (legacy KV system, untouched) — collect IDs from scheduledStatus.photos + jobHistory[].photos
  const photoIds = [];
  (c.scheduledStatus?.photos || []).forEach(id => photoIds.includes(id) || photoIds.push(id));
  (c.jobHistory || []).forEach(j => (j.photos || []).forEach(id => photoIds.includes(id) || photoIds.push(id)));
  if (photoIds.length) {
    const gridItems = photoIds.map((id, i) => `
      <div class="gal-thumb-wrap" data-photo-id="${esc(id)}" data-idx="${i}" onclick="openLightbox(${i})" title="View photo">
        <div class="gal-thumb-inner" id="gthumb-${esc(id)}">
          <div class="gal-thumb-loading">⏳</div>
        </div>
      </div>`).join('');
    const galBody = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;">
        <span style="font-size:12px;color:var(--muted);">${photoIds.length} photo${photoIds.length > 1 ? 's' : ''}</span>
        <label style="background:var(--sky);color:#fff;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">
          + Add Photos
          <input type="file" accept="image/*,image/heic,image/heif" multiple capture style="display:none;" onchange="handleProfilePhotoAdd(this.files,'${esc(c.phone||'')}')">
        </label>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;" id="photoGalGrid">
        ${gridItems}
      </div>`;
    sections.push(makeXSec('photos', '📷', 'Photos', String(photoIds.length), galBody, true));
    // Store IDs for lightbox navigation
    window._galPhotoIds = photoIds;
  } else {
    window._galPhotoIds = [];
  }

  el.innerHTML = sections.join('');
}

}

async function confirmDeleteCustomer() {
  if (!_customer) return;
  const c     = _customer;
  const name  = `${c.firstName||''} ${c.lastName||''}`.trim();
  const phone = (c.phone||'').replace(/\D/g,'').slice(-10);
  const jobCount = (c.jobHistory||[]).length;
  const isVip    = (c.lifetimeSpend||0) >= 5000;

  if (jobCount > 0 || isVip) {
    const typed = (document.getElementById('deleteNameInput').value||'').trim().toLowerCase();
    if (typed !== name.toLowerCase()) {
      document.getElementById('deleteNameInput').style.borderColor = '#dc2626';
      setTimeout(() => { document.getElementById('deleteNameInput').style.borderColor = ''; }, 1500);
      return;
    }
  }

  const btn = document.getElementById('deleteConfirmBtn');
  btn.textContent = 'Deleting…'; btn.disabled = true;

  try {
    const res = await fetch(`${API}/customer/${phone}/delete`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ reason: 'manual_admin_delete', deletedBy: 'tyler' })
    });
    const data = await res.json();
    if (!res.ok) {
      if (data.error === 'protected') { alert(data.message); closeDeleteModal(); return; }
      throw new Error(data.error || 'Delete failed');
    }
    closeDeleteModal();
    showToast(`🗑️ ${name} deleted — restore at Recently Deleted`);
    setTimeout(() => {
      const ref = document.referrer;
      if (ref && ref.includes(window.location.hostname)) history.back();
      else window.location.href = '/pure_cleaning_admin.html';
    }, 1800);
  } catch(e) {
    btn.textContent = 'Delete'; btn.disabled = false;
    alert('Error: ' + e.message);
  }
}

let _lbIdx = 0;
let _lbCache = {}; // photoId → full JPEG data URL

function initPhotoGallery() {
  const thumbs = document.querySelectorAll('.gal-thumb-wrap[data-photo-id]');
  if (!thumbs.length) return;
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const wrap = entry.target;
      const id   = wrap.dataset.photoId;
      obs.unobserve(wrap);
      loadThumb(id);
    });
  }, { rootMargin: '100px' });
  thumbs.forEach(t => obs.observe(t));
}

async function loadThumb(id) {
  const inner = document.getElementById(`gthumb-${id}`);
  if (!inner) return;
  try {
    const res = await fetch(`${API}/photos/${id}/thumb`);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    if (data.jpeg) {
      const src = `data:image/jpeg;base64,${data.jpeg}`;
      inner.innerHTML = `<img src="${src}" alt="Job photo" loading="lazy">`;
    }
  } catch { inner.innerHTML = `<div class="gal-thumb-loading" style="font-size:13px;color:var(--muted);">✕</div>`; }
}

function openLightbox(idx) {
  _lbIdx = idx;
  document.getElementById('photoLightbox').style.display = 'flex';
  _showLbPhoto();
}

function closeLightbox() {
  document.getElementById('photoLightbox').style.display = 'none';
  document.getElementById('lbImg').src = '';
}

function lbNav(dir) {
  const ids = window._galPhotoIds || [];
  _lbIdx = (_lbIdx + dir + ids.length) % ids.length;
  _showLbPhoto();
}

async function _showLbPhoto() {
  const ids = window._galPhotoIds || [];
  if (!ids.length) return;
  const id = ids[_lbIdx];
  const img = document.getElementById('lbImg');
  const meta = document.getElementById('lbMeta');
  const dl = document.getElementById('lbDownload');

  img.style.opacity = '.4';
  meta.textContent = `Photo ${_lbIdx + 1} of ${ids.length}`;

  if (_lbCache[id]) {
    img.src = _lbCache[id];
    img.style.opacity = '1';
    dl.href = _lbCache[id];
    return;
  }
  try {
    const res = await fetch(`${API}/photos/${id}`);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    if (data.jpeg) {
      const src = `data:image/jpeg;base64,${data.jpeg}`;
      _lbCache[id] = src;
      img.src = src;
      dl.href = src;
      if (data.metadata?.jobDate) {
        meta.textContent = `${_lbIdx + 1} / ${ids.length} · ${data.metadata.jobDate}${data.metadata.services ? ' · '+data.metadata.services : ''}`;
      }
    }
  } catch { img.src = ''; meta.textContent = 'Could not load photo'; }
  img.style.opacity = '1';
}

// Keyboard navigation for lightbox
document.addEventListener('keydown', e => {
  if (document.getElementById('photoLightbox').style.display === 'flex') {
    if (e.key === 'ArrowLeft')  lbNav(-1);
