// ── Property image helpers (Phase 3) ─────────────────────────────────────────
//
// _loadPropImgThumb: fetch one R2 image (auth'd) → objectURL → set into thumb container
// _openPropImgLb:    reuse existing #photoLightbox for fullscreen view
//
// Auth: fetch() goes through the page-level interceptor (lines 9-20) which adds
// Authorization: Bearer <token> to all purecleaning-api calls automatically.
// Bare <img src="/admin/photos/key/..."> would 401 — always use fetch here.

async function _loadPropImgThumb(key, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  try {
    const res = await fetch(`${API}/admin/photos/key/${key}`);
    if (!res.ok) { el.innerHTML = ''; return; }  // absent key → show nothing
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    el.innerHTML = `<img src="${url}" alt="Property photo" loading="eager">`;
  } catch(e) { el.innerHTML = ''; }  // network failure → silent (no broken icon)
}

// ── Job Photos (R2 / Batch 4 read surface) ──────────────────────────────────
// Iterates candidate jobs (jh entries with real jobId, not csv_backfill / rig_segment /
// day_segment) and fetches /admin/photos/job/:id in parallel. Builds one group per
// job that has ≥1 photo, hides the section entirely if none has any. Thumbs lazy-load
// via auth'd fetch → objectURL (same pattern as _loadPropImgThumb above).
function _jpKeyType(key) {
  if (/\/before_/.test(key)) return 'before';
  if (/\/after_/.test(key))  return 'after';
  return 'unknown';
}

function _jpFmtDate(iso) {
  if (!iso) return '—';
  // Accepts both YYYY-MM-DD and full ISO timestamps; render as 'Mon, Jun 9'.
  const s = (typeof iso === 'string' && iso.length >= 10) ? iso.slice(0, 10) : null;
  if (!s) return '—';
  const dt = new Date(s + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

async function _loadJobPhotosSection(hostId, candidates) {
  const host = document.getElementById(hostId);
  if (!host) return;

  // Cap parallelism at a sane number — Mom's profiles typically have 1-20 jobs,
  // but a hypothetical 100-job customer shouldn't spawn 100 concurrent fetches.
  const CONCURRENCY = 8;
  const buckets = [];
  for (let i = 0; i < candidates.length; i += CONCURRENCY) {
    buckets.push(candidates.slice(i, i + CONCURRENCY));
  }

  let totalPhotos = 0;
  let anyError = false;
  const groups = [];   // { jh, keys[] } — only jobs with ≥1 photo

  for (const bucket of buckets) {
    const results = await Promise.all(bucket.map(jh =>
      fetch(`${API}/admin/photos/job/${encodeURIComponent(jh.jobId)}`)
        .then(r => r.ok ? r.json() : null)
        .then(d => ({ jh, keys: (d && d.keys) || [], ok: !!d }))
        .catch(() => ({ jh, keys: [], ok: false }))
    ));
    for (const r of results) {
      if (!r.ok) anyError = true;
      if (r.keys.length) {
        groups.push({ jh: r.jh, keys: r.keys });
        totalPhotos += r.keys.length;
      }
    }
  }

  // No photos found — hide the section entirely (Tyler: "compact or hidden, no errors").
  // We hide by removing the .xsec ancestor since renderCustomerProfile already pushed it.
  if (!groups.length) {
    const sec = host.closest('.xsec') || host.parentElement;
    if (sec && sec.classList && sec.classList.contains('xsec')) {
      sec.style.display = 'none';
    } else {
      host.innerHTML = `<div class="jp-empty">${anyError ? 'Could not load job photos.' : 'No job photos yet.'}</div>`;
    }
    return;
  }

  // Patch the badge in the section header (was "…") to the real count.
  const sec = host.closest('.xsec');
  if (sec) {
    const badge = sec.querySelector('.xsec-badge');
    if (badge) badge.textContent = String(totalPhotos);
  }

  // Render groups (one per job, newest first — candidates already sorted DESC by date)
  host.innerHTML = groups.map((g, gi) => {
    const _gid = `jp-group-${gi}`;
    const svc  = (g.jh.services || g.jh.jobNotes || '').trim();
    const thumbs = g.keys.map((k, i) => {
      const t = _jpKeyType(k);
      const label = t === 'before' ? '📷 Before photo' : t === 'after' ? '📷 After photo' : '📷 Photo';
      return `<div class="jp-thumb ${t}" data-key="${esc(k)}" data-label="${esc(label)}"
                onclick="_openJobPhotoLb(this.dataset.key, this.dataset.label)"
                id="${_gid}-t-${i}"><div class="jp-tag">${t}</div></div>`;
    }).join('');
    return `<div class="jp-group">
      <div class="jp-group-hdr">
        <div class="jp-group-title">
          <span class="jp-group-date">${esc(_jpFmtDate(g.jh.date))}</span>
          ${svc ? `<span class="jp-group-svc">· ${esc(svc.length > 64 ? svc.slice(0,64)+'…' : svc)}</span>` : ''}
        </div>
        <div class="jp-group-count">${g.keys.length} photo${g.keys.length===1?'':'s'}</div>
      </div>
      <div class="jp-grid">${thumbs}</div>
    </div>`;
  }).join('');

  // Lazy-load each thumb. Mirrors the calendar's _loadCalPropThumb / Batch 4 pattern.
  // Auth handled by the page's fetch interceptor at lines 16-22.
  Array.from(host.querySelectorAll('.jp-thumb')).forEach(el => {
    const key = el.dataset.key; if (!key) return;
    fetch(`${API}/admin/photos/key/${key}`)
      .then(r => r.ok ? r.blob() : null)
      .then(b => {
        if (!b) return;
        const img = document.createElement('img');
        img.alt = 'Job photo';
        img.src = URL.createObjectURL(b);
        el.insertBefore(img, el.firstChild);
      })
      .catch(() => {});
  });
}

// Reuses the existing #photoLightbox (same one as Property Images), disables KV
// gallery navigation arrows for the duration of the view.
function _openJobPhotoLb(key, label) {
  const lb   = document.getElementById('photoLightbox');
  const img  = document.getElementById('lbImg');
  const meta = document.getElementById('lbMeta');
  const dl   = document.getElementById('lbDownload');
  if (!lb || !img) return;
  img.src = '';
  if (meta) meta.textContent = label + ' — loading…';
  window._galPhotoIds = [];   // disable ‹/› navigation (legacy KV gallery only)
  lb.style.display = 'flex';
  fetch(`${API}/admin/photos/key/${key}`)
    .then(r => r.ok ? r.blob() : null)
    .then(blob => {
      if (!blob) { if (meta) meta.textContent = label + ' — not found'; return; }
      const url = URL.createObjectURL(blob);
      img.src = url;
      if (meta) meta.textContent = label;
      if (dl) { dl.href = url; dl.download = key.split('/').pop() || 'job-photo.jpg'; }
    })
    .catch(() => { if (meta) meta.textContent = label + ' — failed to load'; });
}

function _openPropImgLb(key, label) {
  // Reuse the existing photoLightbox — disable KV gallery navigation (arrows do nothing).
  const lb   = document.getElementById('photoLightbox');
  const img  = document.getElementById('lbImg');

}

// Profile-page photo add button
async function handleProfilePhotoAdd(files, phone) {
  if (!files.length) return;
  const arr = Array.from(files);
  let done = 0;
  const uploadedIds = [];
  for (const file of arr) {
    try {
      const { jpeg, thumb } = await _profileCompressPhoto(file);
      const photoId = `${Date.now().toString(36)}${Math.random().toString(36).slice(2,7)}`;
      const c = _customer;
      const jobDate = (c?.scheduledStatus?.completedDate || c?.scheduledStatus?.scheduledDate || new Date().toISOString().split('T')[0]);
      const services = c?.scheduledStatus?.jobNotes || '';
      const res = await fetch(`${API}/photos`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ photoId, jpeg, thumb, metadata: { phone, jobDate, services, source: 'profile_upload', capturedAt: new Date().toISOString() } })
      });
      if (!res.ok) throw new Error(res.status);
      uploadedIds.push(photoId);
      done++;
    } catch(e) { console.warn('Upload failed:', e); }
  }
  if (!done) return;
  // Persist photo IDs on customer record (fetch-patch-PUT pattern)
  try {
    const resp = await fetch(`${API}/customers`);
    const data = await resp.json();
    const customers = data.customers || [];
    const idx = customers.findIndex(cu => String(cu.phone||'').replace(/\D/g,'').slice(-10) === String(phone||'').replace(/\D/g,'').slice(-10));
    if (idx !== -1) {
      const c = customers[idx];
      if (!c.scheduledStatus) c.scheduledStatus = {};
      if (!c.scheduledStatus.photos) c.scheduledStatus.photos = [];
      c.scheduledStatus.photos.push(...uploadedIds);
      await fetch(`${API}/customers`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ customers }) });
      _customer = customers[idx];
    }
  } catch(e) { console.warn('Failed to persist photo refs:', e); }
  showToast(`✓ ${done} photo${done > 1 ? 's' : ''} uploaded`);
  // Re-render profile sections to show new photos
  if (_customer) renderProfile(_customer, []);
}

function _profileCompressPhoto(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = ev => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const maxPx = 1920;
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else        { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const c1 = document.createElement('canvas'); c1.width = w; c1.height = h;
        c1.getContext('2d').drawImage(img, 0, 0, w, h);
        const jpeg = c1.toDataURL('image/jpeg', 0.8).split(',')[1];
        const tMax = 300;
        let tw = img.width, th = img.height;
        if (tw > tMax || th > tMax) {
          if (tw >= th) { th = Math.round(th * tMax / tw); tw = tMax; }
          else          { tw = Math.round(tw * tMax / th); th = tMax; }
        }
        const c2 = document.createElement('canvas'); c2.width = tw; c2.height = th;
        c2.getContext('2d').drawImage(img, 0, 0, tw, th);
        const thumb = c2.toDataURL('image/jpeg', 0.7).split(',')[1];
        resolve({ jpeg, thumb });
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Property Management Panel ─────────────────────────────────────────────────
// Lists all PersonProperty rows for a customer. Lets Tyler relabel (canonical
// dropdown, saves on change) or set a new primary (radio → confirm → API).
// ── Access Info panel — gateCode + accessNotes (crew-facing, sidebar) ─────────
function _buildAccessPanel(c) {
  if (!c.gateCode && !c.accessNotes) return '';
  const rows = [];
  if (c.gateCode) rows.push(
    `<div class="contact-row">
      <div class="contact-icon">🔑</div>
      <div>
        <div class="contact-label">Gate Code</div>
        <div class="contact-val" style="font-family:monospace;font-size:17px;font-weight:700;letter-spacing:3px;color:var(--navy);">${esc(c.gateCode)}</div>
      </div>
    </div>`
  );
  if (c.accessNotes) rows.push(
    `<div class="contact-row">
      <div class="contact-icon">📋</div>
      <div>
        <div class="contact-label">Access Notes</div>
        <div class="contact-val">${esc(c.accessNotes)}</div>
      </div>
    </div>`
  );
  return `<div class="panel">
    <div class="panel-header"><div class="panel-title">🔑 Access Info</div></div>
    <div class="panel-body">${rows.join('')}</div>
  </div>`;
}

// Entry point: renderSidebar(c) calls _buildPropsPanel(c) for the Properties panel.

const _PROP_CANONICAL = [
  'Main Residence', 'Rental Property', "Friend's Property",
  "Parent's / Relative's", 'Vacation Home', 'Office / Commercial', 'Other',
];

function _buildPropsPanel(c) {
  const props = c.properties || [];
  if (!props.length) return '';
  const ph = (c.phone||'').replace(/\D/g,'').slice(-10);

  const rows = props.map(p => {
    const isPrimary = !!p.primaryContact;
    const addr = [p.streetAddress, p.city].filter(Boolean).join(', ');
    const curLabel = p.propertyLabel || '';
    // If current label is not in canonical list (except 'Other'), treat it as a custom Other value
    const isCustom = curLabel && !_PROP_CANONICAL.slice(0, -1).includes(curLabel) && curLabel !== 'Other';
    const selectVal = isCustom ? 'Other' : curLabel;

    const opts = _PROP_CANONICAL.map(l =>
      `<option value="${esc(l)}"${l === selectVal ? ' selected' : ''}>${esc(l)}</option>`
    ).join('');
    const pid = p.propertyId;

    return `<div style="padding:10px 0;border-bottom:1px solid var(--border);">
  <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;">
    <input type="radio" name="pp_${ph}" value="${esc(pid)}"
           ${isPrimary ? 'checked' : ''}
           style="margin-top:4px;flex-shrink:0;cursor:pointer;"
           onchange="_propSetPrimary('${esc(pid)}','${ph}',this)">
    <div style="flex:1;min-width:0;">
      <div style="font-size:13px;font-weight:600;color:var(--navy);line-height:1.35;">${esc(addr)}</div>
      ${isPrimary
        ? `<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#16a34a;">★ Primary</span>`
        : `<span style="font-size:10px;color:var(--muted);">Secondary</span>`}
    </div>
  </div>
  <select data-pid="${esc(pid)}" data-ph="${ph}"
          style="width:100%;font-size:12px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;"
          onchange="_propLabelChange(this)">
    ${opts}
  </select>
  <div id="ppOtherRow_${esc(pid)}" style="display:${isCustom || curLabel==='Other' ? 'flex' : 'none'};gap:5px;margin-top:5px;">
    <input id="ppOther_${esc(pid)}" type="text"
           value="${esc(isCustom ? curLabel : '')}"
           placeholder="Custom label…"
           style="flex:1;font-size:12px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;">
    <button onclick="_propLabelSaveOther('${esc(pid)}','${ph}')"
            style="font-size:12px;padding:5px 10px;border:none;background:var(--sky);color:#fff;border-radius:6px;cursor:pointer;white-space:nowrap;">Save</button>
  </div>
  <div id="ppMsg_${esc(pid)}" style="font-size:11px;margin-top:3px;display:none;"></div>
</div>`;
  }).join('');

  return `<div class="panel">
  <div class="panel-header"><div class="panel-title">🏠 Properties</div></div>
  <div class="panel-body" style="padding-top:4px;padding-bottom:2px;">${rows}</div>
</div>`;
}

// Label change: canonical dropdown → save immediately; Other → show text input
function _propLabelChange(sel) {
  const pid = sel.getAttribute('data-pid');
  const ph  = sel.getAttribute('data-ph');
  const val = sel.value;
  const otherRow = document.getElementById('ppOtherRow_' + pid);
  if (otherRow) otherRow.style.display = val === 'Other' ? 'flex' : 'none';
  if (val && val !== 'Other') _propLabelSave(pid, ph, val);
}

// Save Other free-text label
function _propLabelSaveOther(pid, ph) {
  const inp = document.getElementById('ppOther_' + pid);
  const label = (inp ? inp.value : '').trim();
  if (!label) return;
  _propLabelSave(pid, ph, label);
}

// Core label save → PATCH /admin/person-property
async function _propLabelSave(pid, ph, label) {
  const personId = 'person_1' + ph;
  const msgEl = document.getElementById('ppMsg_' + pid);
  try {
    const res = await fetch(API + '/admin/person-property', {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ personId, propertyId: pid, propertyLabel: label }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error || 'HTTP ' + res.status);
    if (msgEl) {
      msgEl.textContent = '✓ Saved'; msgEl.style.color = '#16a34a'; msgEl.style.display = '';
      setTimeout(() => { if (msgEl) msgEl.style.display = 'none'; }, 2500);
    }
    // Update local customer properties so re-render is consistent
    const p = (_customer.properties||[]).find(x => x.propertyId === pid);
    if (p) p.propertyLabel = label;
  } catch(e) {
    if (msgEl) { msgEl.textContent = 'Error: ' + e.message; msgEl.style.color = '#dc2626'; msgEl.style.display = ''; }
  }
}

// Set primary → confirm → POST /admin/address-gate {action:'set-primary'} → re-render
async function _propSetPrimary(pid, ph, radioEl) {
  if (!confirm('Set this address as primary?\n\nThe current primary will become secondary. Any scheduled or in-progress jobs will be re-pointed to this address. Completed jobs are untouched.')) {
    // Cancelled — reset radio to reflect actual D1 state
    renderSidebar(_customer);
    return;
  }
  const personId = 'person_1' + ph;
  try {
    const res = await fetch(API + '/admin/address-gate', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ personId, action: 'set-primary', propertyId: pid }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error || 'HTTP ' + res.status);
    // Reload customer from /customer/:phone (returns D1-fresh properties[])
    const cr = await fetch(API + '/customer/' + ph);
    const cd = await cr.json();
    const updated = cd.customer || cd;
    if (updated && updated.phone) { _customer = updated; renderSidebar(_customer); }
  } catch(e) {
    alert('Error: ' + e.message);
    renderSidebar(_customer); // reset radio
  }
}
